<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,doc,setDoc,getDoc}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const cfg={apiKey:"AIzaSyCCl-dmOTiB3FMoavkaA6m_ZAHTPJgxNAs",authDomain:"kumoen.firebaseapp.com",projectId:"kumoen",storageBucket:"kumoen.firebasestorage.app",messagingSenderId:"407042193066",appId:"1:407042193066:web:f48c1b9ce10019437c42d3"};
const app=initializeApp(cfg);
const db=getFirestore(app);
const REF=doc(db,"users","kumo");
async function fbLoad(){
  try{
    const snap=await getDoc(REF);
    if(snap.exists()){
      const d=snap.data();
      window._lib=d.library||[];
      window._st=d.stats||{quiz:0,today:0,date:""};
    }
  }catch(e){console.warn("fbLoad",e);}
}
async function fbSave(){
  try{await setDoc(REF,{library:window._lib||[],stats:window._st||{}},{merge:true});}
  catch(e){console.warn("fbSave",e);}
}
window.fbSave=fbSave;
fbLoad().then(()=>{window._fbReady=true;if(window._onFbReady)window._onFbReady();});
</script>
<style>
:root{
  --bg:#1a1a1a;--s1:#222;--s2:#2a2a2a;--s3:#333;
  --border:#3a3a3a;--border2:#444;
  --accent:#d97706;--al:#f59e0b;--abg:rgba(217,119,6,.1);--aborder:rgba(217,119,6,.3);
  --green:#22c55e;--red:#ef4444;--blue:#60a5fa;--purple:#a78bfa;
  --text:#f5f0eb;--muted:#888880;--muted2:#aaa8a0;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:"Noto Sans TC",sans-serif;overflow:hidden}
button{cursor:pointer;font-family:"Noto Sans TC",sans-serif;border:none}
input,textarea{font-family:"Noto Sans TC",sans-serif;color:var(--text)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
#app{max-width:480px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
nav{display:flex;background:var(--s1);border-top:1px solid var(--border);order:2;flex-shrink:0}
nav button{flex:1;padding:10px 1px 12px;font-size:9px;font-weight:600;background:none;color:var(--muted);text-transform:uppercase;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .2s;letter-spacing:.3px}
nav button .ni{font-size:19px}
nav button.active{color:var(--al)}
.view{flex:1;overflow-y:auto;display:none;flex-direction:column}
.view.show{display:flex}
/* home */
.home-hero{padding:44px 24px 16px}
.app-name{font-family:"Playfair Display",serif;font-size:40px;color:var(--text);letter-spacing:-1px}
.app-name em{color:var(--al);font-style:italic}
.app-sub{font-size:13px;color:var(--muted);margin-top:6px}
.sync-row{display:flex;align-items:center;gap:6px;margin-top:8px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block}
.sync-txt{font-size:11px;color:var(--muted)}
.hdiv{height:1px;background:var(--border);margin:0 24px 16px}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0 24px 16px}
.stat{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:14px 8px;text-align:center}
.stat-n{font-family:"Playfair Display",serif;font-size:32px;color:var(--al)}
.stat-l{font-size:11px;color:var(--muted);margin-top:2px}
.sec-head{padding:0 24px 8px;font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;font-weight:700}
.recent-list{padding:0 24px 20px;display:flex;flex-direction:column;gap:8px}
.ri{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:13px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s}
.ri:active{border-color:var(--accent)}
.ri-word{font-family:"Playfair Display",serif;font-size:20px;flex:1}
.ri-zh{font-size:12px;color:var(--muted);margin-top:2px}
.ri-badge{font-size:11px;color:var(--al);background:var(--abg);border:1px solid var(--aborder);padding:2px 8px;border-radius:20px;white-space:nowrap}
/* add */
.add-wrap{flex:1;display:flex;flex-direction:column;padding:20px 24px;gap:14px;overflow-y:auto}
.sec-label{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;font-weight:700}
.btn-p{background:var(--accent);color:#fff;border-radius:14px;padding:15px;font-size:16px;font-weight:700;width:100%;transition:opacity .15s}
.btn-p:active{opacity:.8}
.btn-p:disabled{opacity:.35;cursor:not-allowed}
.btn-s{background:var(--s2);border:1px solid var(--border2);color:var(--muted2);border-radius:14px;padding:13px;font-size:15px;font-weight:600;width:100%}
.txt-in{background:var(--s1);border:1px solid var(--border2);border-radius:14px;padding:14px 16px;font-size:16px;outline:none;width:100%;transition:border-color .2s}
.txt-in:focus{border-color:var(--accent)}
.spin-wrap{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:28px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px}
.spinner{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spin-msg{font-size:14px;color:var(--muted2)}
.mtabs{display:flex;gap:6px}
.mtab{flex:1;background:var(--s2);border:1px solid var(--border2);color:var(--muted);border-radius:10px;padding:9px 4px;font-size:12px;font-weight:600;transition:all .15s}
.mtab.on{background:var(--abg);border-color:var(--accent);color:var(--al)}
.cam-btns{display:flex;gap:8px}
.cbtn{flex:1;background:var(--s2);border:1px solid var(--border2);color:var(--muted2);border-radius:12px;padding:14px;font-size:15px;font-weight:600}
.cbtn:active{border-color:var(--accent);color:var(--al)}
.img-prev{display:none;flex-direction:column;gap:8px}
.img-prev img{width:100%;border-radius:14px;display:block}
.img-prev.show{display:flex}
.api-box{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:22px;display:flex;flex-direction:column;gap:12px}
.api-label{font-size:13px;color:var(--muted2);line-height:1.7}
.api-input{background:var(--s2);border:1px solid var(--border2);border-radius:12px;padding:12px 14px;font-size:14px;outline:none;width:100%;font-family:"JetBrains Mono",monospace;color:var(--text)}
.api-input:focus{border-color:var(--accent)}
/* result cards */
.res-section{display:flex;flex-direction:column;gap:14px}
.bulk-bar{background:var(--s1);border:1px solid var(--aborder);border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:5}
.bulk-info{flex:1;font-size:14px;font-weight:600;color:var(--al)}
.bulk-info span{font-size:12px;color:var(--muted);font-weight:400}
.btn-bulk{background:var(--accent);color:#fff;border-radius:10px;padding:10px 18px;font-size:14px;font-weight:700;white-space:nowrap}
.word-hdr{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:20px}
.wtag-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.wtag{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.wtag-lvl{color:var(--al);background:var(--abg);border:1px solid var(--aborder)}
.wtag-src{color:var(--purple);background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.25)}
.wtag-dup{color:var(--red);background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3)}
.w-word{font-family:"Playfair Display",serif;font-size:40px;line-height:1;color:var(--text)}
.w-ph{font-family:"JetBrains Mono",monospace;font-size:13px;color:var(--muted);margin-top:5px}
.w-pos{font-size:12px;color:var(--al);font-weight:700;margin-top:12px;letter-spacing:.5px;text-transform:uppercase}
.w-conj{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.conj-tag{background:var(--s2);border:1px solid var(--border2);border-radius:8px;padding:4px 12px;font-size:13px;font-family:"JetBrains Mono",monospace}
.w-zh{font-size:24px;font-weight:700;margin-top:8px;color:var(--text)}
.w-en{font-size:14px;color:var(--muted2);margin-top:3px;line-height:1.5}
.ex-block{background:var(--s2);border-left:3px solid var(--accent);border-radius:0 12px 12px 0;padding:12px 14px;margin-top:14px}
.ex-en{font-size:15px;line-height:1.6;font-style:italic;color:var(--text)}
.ex-zh{font-size:13px;color:var(--muted);margin-top:5px;line-height:1.5}
.speak-row{display:flex;gap:8px;margin-top:12px}
.btn-speak{flex:1;background:rgba(96,165,250,.08);border:1px solid rgba(96,165,250,.2);color:var(--blue);border-radius:11px;padding:10px;font-size:13px;font-weight:600}
.root-card{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:20px;display:flex;flex-direction:column;gap:12px}
.root-title{font-size:11px;color:var(--al);letter-spacing:1px;text-transform:uppercase;font-weight:700}
.root-parts{display:flex;gap:8px;flex-wrap:wrap}
.rp{padding:8px 14px;border-radius:10px;text-align:center}
.rp-val{font-family:"JetBrains Mono",monospace;font-size:16px;font-weight:700}
.rp-mean{font-size:11px;margin-top:3px;opacity:.85}
.rp-prefix{background:rgba(217,119,6,.12);border:1px solid rgba(217,119,6,.35);color:var(--al)}
.rp-root{background:rgba(167,139,250,.12);border:1px solid rgba(167,139,250,.35);color:var(--purple)}
.rp-suffix{background:rgba(96,165,250,.12);border:1px solid rgba(96,165,250,.35);color:var(--blue)}
.tip-box{background:rgba(217,119,6,.06);border:1px solid rgba(217,119,6,.2);border-radius:12px;padding:12px 14px}
.tip-label{font-size:11px;color:var(--al);font-weight:700;letter-spacing:.4px;text-transform:uppercase;margin-bottom:5px}
.tip-text{font-size:14px;color:var(--muted2);line-height:1.6}
.fam-row{display:flex;flex-wrap:wrap;gap:6px}
.fam-label{font-size:12px;color:var(--muted);margin-bottom:6px}
.fw{background:var(--s2);border:1px solid var(--border2);border-radius:8px;padding:5px 10px;font-size:13px;cursor:pointer;color:var(--text)}
.fw:active{border-color:var(--purple)}
.save-row{display:flex;gap:8px;margin-top:10px}
.btn-save{flex:1;background:var(--accent);color:#fff;border-radius:12px;padding:12px;font-size:14px;font-weight:700}
.btn-save:active{opacity:.8}
.already-saved{flex:1;text-align:center;color:var(--muted);font-size:13px;padding:12px;background:var(--s2);border:1px solid var(--border);border-radius:12px}
/* lib */
.lib-toolbar{padding:16px 24px 8px;display:flex;gap:10px}
.search-inp{flex:1;background:var(--s1);border:1px solid var(--border2);border-radius:12px;padding:10px 14px;font-size:14px;outline:none;color:var(--text)}
.search-inp:focus{border-color:var(--accent)}
.lib-count{font-size:12px;color:var(--muted);padding:0 24px 10px}
.lib-list{flex:1;overflow-y:auto;padding:0 24px 24px;display:flex;flex-direction:column;gap:8px}
.lib-item{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s}
.lib-item:active{border-color:var(--accent)}
.li-word{font-family:"Playfair Display",serif;font-size:22px;color:var(--text)}
.li-info{font-size:12px;color:var(--muted);margin-top:2px}
.li-acts{display:flex;gap:4px}
.btn-del{background:none;border:none;font-size:16px;color:var(--red);padding:4px 6px}
.empty-st{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--muted);padding:40px;text-align:center}
/* gram */
.gram-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
.gram-toolbar{padding:12px 20px 0;display:flex;gap:8px}
.gram-search{flex:1;background:var(--s1);border:1px solid var(--border2);border-radius:12px;padding:10px 14px;font-size:14px;outline:none;color:var(--text)}
.gram-search:focus{border-color:var(--accent)}
.gram-cats{display:flex;gap:6px;overflow-x:auto;padding:12px 20px 6px;scrollbar-width:none;flex-shrink:0}
.gram-cats::-webkit-scrollbar{display:none}
.gcat{background:var(--s2);border:1px solid var(--border2);color:var(--muted);padding:7px 14px;border-radius:20px;font-size:13px;white-space:nowrap;flex-shrink:0}
.gcat.on{background:var(--abg);border-color:var(--accent);color:var(--al);font-weight:600}
.gram-list{flex:1;overflow-y:auto;padding:8px 20px 100px;display:flex;flex-direction:column;gap:10px}
.gram-card{background:var(--s1);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.gram-head{padding:16px 16px 12px;cursor:pointer;display:flex;align-items:flex-start;gap:10px}
.gram-badge{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:3px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0;margin-top:2px}
.badge-jh{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.25)}
.badge-sh{background:rgba(96,165,250,.12);color:var(--blue);border:1px solid rgba(96,165,250,.25)}
.badge-ph{background:rgba(217,119,6,.12);color:var(--al);border:1px solid rgba(217,119,6,.3)}
.gram-title{font-size:16px;font-weight:700;color:var(--text);flex:1;line-height:1.4}
.gram-arrow{font-size:14px;color:var(--muted);flex-shrink:0;transition:transform .2s}
.gram-arrow.open{transform:rotate(180deg)}
.gram-body{padding:0 16px 16px;display:none;flex-direction:column;gap:10px}
.gram-body.open{display:flex}
.gram-formula{background:var(--s2);border-radius:10px;padding:10px 14px;font-family:"JetBrains Mono",monospace;font-size:14px;color:var(--al);line-height:1.6}
.gram-note{font-size:13px;color:var(--muted2);line-height:1.7}
.gram-exs{display:flex;flex-direction:column;gap:6px}
.gram-ex{background:var(--s2);border-left:3px solid var(--accent);border-radius:0 10px 10px 0;padding:10px 12px}
.gram-ex-en{font-size:14px;font-style:italic;color:var(--text);line-height:1.5}
.gram-ex-zh{font-size:12px;color:var(--muted);margin-top:4px}
.gram-speak-btn{background:none;border:none;color:var(--blue);font-size:12px;padding:4px 0;text-align:left;text-decoration:underline;cursor:pointer}
/* quiz */
.quiz-wrap{flex:1;display:flex;flex-direction:column;padding:20px 24px 32px;gap:12px;overflow-y:auto}
.qprog{height:3px;background:var(--border);border-radius:99px;overflow:hidden}
.qprog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--al));border-radius:99px;transition:width .4s}
.q-card{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:22px}
.q-label{font-size:11px;color:var(--muted2);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.q-word{font-family:"Playfair Display",serif;color:var(--text);margin-bottom:5px}
.q-ph{font-family:"JetBrains Mono",monospace;font-size:13px;color:var(--muted)}
.opts{display:flex;flex-direction:column;gap:9px}
.opt{background:var(--s1);border:1px solid var(--border2);border-radius:14px;padding:15px 16px;font-size:15px;color:var(--text);text-align:left;transition:all .12s}
.opt:active{transform:scale(.98)}
.opt.ok{background:rgba(34,197,94,.1);border-color:var(--green);color:var(--green)}
.opt.no{background:rgba(239,68,68,.1);border-color:var(--red);color:var(--red)}
.expl-box{background:var(--s2);border-radius:14px;padding:14px;font-size:14px;color:var(--muted2);line-height:1.6;border-left:3px solid var(--green)}
.btn-nq{background:var(--accent);color:#fff;border-radius:14px;padding:15px;font-size:16px;font-weight:700;width:100%}
.score-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;gap:14px}
.score-n{font-family:"Playfair Display",serif;font-size:56px;color:var(--al)}
.btn-retry{background:var(--accent);color:#fff;border-radius:14px;padding:14px 40px;font-size:16px;font-weight:700;margin-top:8px}
/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:flex-end;max-width:480px;margin:0 auto}
.modal{background:var(--s1);border-radius:24px 24px 0 0;padding:24px;width:100%;max-height:88dvh;overflow-y:auto;display:flex;flex-direction:column;gap:14px}
.modal-word{font-family:"Playfair Display",serif;font-size:32px;color:var(--text)}
.modal-close{background:var(--s2);border:1px solid var(--border2);color:var(--muted2);border-radius:12px;padding:12px;font-size:15px;font-weight:600;width:100%}
/* toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--s2);border:1px solid var(--border2);color:var(--text);padding:10px 20px;border-radius:20px;font-size:14px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;max-width:320px;text-align:center;white-space:pre-line}
.toast.show{opacity:1}
/* fb loading */
#fb-load{position:fixed;inset:0;background:#1a1a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999}
</style>
</head>
<body>
<div id="fb-load" style="display: none;">
  <div style="font-family:serif;font-size:36px;color:#f59e0b">Word<em>Lens</em></div>
  <div class="spinner"></div>
  <div style="font-size:13px;color:#888">載入中...</div>
</div>
<div id="app">
  <!-- HOME -->
  <div class="view show" id="v-home">
    <div class="home-hero">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div class="app-name">Word<em>Lens</em></div>
        <div class="sync-row"><span class="sync-dot" id="sync-dot" style="background: rgb(34, 197, 94);"></span><span class="sync-txt" id="sync-txt">已同步</span></div>
      </div>
      <div class="app-sub">拍照 · AI字根字首 · 雲端同步 · SRS測驗</div>
    </div>
    <div class="hdiv"></div>
    <div class="stats-grid">
      <div class="stat"><div class="stat-n" id="h-total">32</div><div class="stat-l">我的單字</div></div>
      <div class="stat"><div class="stat-n" id="h-today">0</div><div class="stat-l">今日新增</div></div>
      <div class="stat"><div class="stat-n" id="h-quiz">8</div><div class="stat-l">測驗次數</div></div>
    </div>
    <div class="sec-head">最近新增</div>
    <div class="recent-list" id="recent-list"><div class="ri" onclick="openModal(&#39;effective&#39;)"><div style="flex:1"><div class="ri-word">effective</div><div class="ri-zh">有效的</div></div><span class="ri-badge">手動</span></div><div class="ri" onclick="openModal(&#39;audience&#39;)"><div style="flex:1"><div class="ri-word">audience</div><div class="ri-zh">觀眾</div></div><span class="ri-badge">手動</span></div><div class="ri" onclick="openModal(&#39;confident&#39;)"><div style="flex:1"><div class="ri-word">confident</div><div class="ri-zh">自信的</div></div><span class="ri-badge">手動</span></div><div class="ri" onclick="openModal(&#39;encourage&#39;)"><div style="flex:1"><div class="ri-word">encourage</div><div class="ri-zh">鼓勵</div></div><span class="ri-badge">手動</span></div><div class="ri" onclick="openModal(&#39;persuade&#39;)"><div style="flex:1"><div class="ri-word">persuade</div><div class="ri-zh">說服</div></div><span class="ri-badge">手動</span></div><div class="ri" onclick="openModal(&#39;hesitate&#39;)"><div style="flex:1"><div class="ri-word">hesitate</div><div class="ri-zh">猶豫</div></div><span class="ri-badge">拍照</span></div></div>
  </div>
  <!-- ADD -->
  <div class="view" id="v-add"><div class="add-wrap" id="add-wrap"></div></div>
  <!-- LIB -->
  <div class="view" id="v-lib">
    <div class="lib-toolbar"><input class="search-inp" id="lib-search" placeholder="搜尋單字..." oninput="filterLib(this.value)"></div>
    <div class="lib-count" id="lib-count"></div>
    <div class="lib-list" id="lib-list"></div>
  </div>
  <!-- GRAM -->
  <div class="view" id="v-gram">
    <div class="gram-wrap">
      <div class="gram-toolbar"><input class="gram-search" id="gram-search" placeholder="搜尋文法..." oninput="filterGram(this.value)"></div>
      <div class="gram-cats" id="gram-cats"></div>
      <div class="gram-list" id="gram-list"></div>
    </div>
  </div>
  <!-- QUIZ -->
  <div class="view" id="v-quiz"><div class="quiz-wrap" id="quiz-content"></div></div>
  <nav>
    <button class="active" onclick="goTab(&#39;home&#39;)"><span class="ni">🏠</span>首頁</button>
    <button onclick="goTab(&#39;add&#39;)"><span class="ni">📸</span>新增</button>
    <button onclick="goTab(&#39;lib&#39;)"><span class="ni">📚</span>單字庫</button>
    <button onclick="goTab(&#39;gram&#39;)"><span class="ni">📖</span>文法</button>
    <button onclick="goTab(&#39;quiz&#39;)"><span class="ni">✏️</span>測驗</button>
  </nav>
</div>
<div class="modal-bg" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-body"></div>
</div>
<div class="toast" id="toast"></div>
<script>
// ===== STATE =====
var library = [];
var stats = {quiz:0, today:0, date:""};
var apiKey = localStorage.getItem("wl-key") || "";
var pending = [];
var quizSt = {questions:[], idx:0, score:0, ans:false, wrong:[], curOpts:[], curWord:""};
var saveTimer = null;

function syncFromFb() {
  if (window._lib) library = window._lib;
  if (window._st) stats = window._st;
}

function setSyncUI(syncing) {
  var dot = document.getElementById("sync-dot");
  var txt = document.getElementById("sync-txt");
  if (!dot || !txt) return;
  dot.style.background = syncing ? "#f59e0b" : "#22c55e";
  txt.textContent = syncing ? "同步中..." : "已同步";
}

function save() {
  window._lib = library;
  setSyncUI(true);
  clearTimeout(saveTimer);
  saveTimer = setTimeout(function() {
    if (window.fbSave) window.fbSave().then(function() { setSyncUI(false); });
  }, 800);
}

function saveSt() {
  window._st = stats;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(function() {
    if (window.fbSave) window.fbSave();
  }, 800);
}

function saveKey(k) { apiKey = k; localStorage.setItem("wl-key", k); }

function todayStr() { return new Date().toDateString(); }
function ensureToday() {
  if (stats.date !== todayStr()) { stats.today = 0; stats.date = todayStr(); saveSt(); }
}

function toast(msg, dur) {
  dur = dur || 2400;
  var el = document.getElementById("toast");
  el.textContent = msg; el.classList.add("show");
  setTimeout(function() { el.classList.remove("show"); }, dur);
}

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US"; u.rate = 0.82;
  window.speechSynthesis.speak(u);
}

function shuffle(a) { return a.slice().sort(function() { return Math.random() - .5; }); }

// ===== NAV =====
function goTab(tab) {
  document.querySelectorAll(".view").forEach(function(v) { v.classList.remove("show"); });
  document.querySelectorAll("nav button").forEach(function(b, i) {
    b.classList.toggle("active", ["home","add","lib","gram","quiz"][i] === tab);
  });
  document.getElementById("v-" + tab).classList.add("show");
  if (tab === "home") renderHome();
  if (tab === "add")  renderAdd();
  if (tab === "lib")  renderLib();
  if (tab === "gram") renderGram();
  if (tab === "quiz") renderQuiz();
}

// ===== HOME =====
function renderHome() {
  ensureToday();
  document.getElementById("h-total").textContent = library.length;
  document.getElementById("h-today").textContent = stats.today;
  document.getElementById("h-quiz").textContent  = stats.quiz;
  var el = document.getElementById("recent-list");
  var rec = library.slice().reverse().slice(0, 6);
  if (!rec.length) {
    el.innerHTML = '<div style="text-align:center;color:var(--muted);padding:24px;font-size:14px">還沒有單字，去拍照新增吧！</div>';
    return;
  }
  el.innerHTML = rec.map(function(w) {
    return '<div class="ri" onclick="openModal(\'' + esc(w.word) + '\')">' +
      '<div style="flex:1"><div class="ri-word">' + w.word + '</div><div class="ri-zh">' + w.zh + '</div></div>' +
      '<span class="ri-badge">' + (w.source || "手動") + '</span></div>';
  }).join("");
}

function esc(s) { return (s || "").replace(/\\/g, "\\\\").replace(/'/g, "\\'"); }

// ===== API =====
function callAI(messages) {
  return fetch("https://api.openai.com/v1/chat/completions", {
    method: "POST",
    headers: {"Content-Type":"application/json","Authorization":"Bearer " + apiKey},
    body: JSON.stringify({model:"gpt-4o", max_tokens:3000, response_format:{type:"json_object"}, messages:messages})
  }).then(function(r) {
    if (!r.ok) return r.json().then(function(e) { throw new Error((e.error && e.error.message) || "API error " + r.status); });
    return r.json();
  }).then(function(d) { return d.choices[0].message.content; });
}

function fileToB64(file) {
  return new Promise(function(res, rej) {
    var reader = new FileReader();
    reader.onload = function(e) {
      var img = new Image();
      img.onload = function() {
        var MAX = 2048;
        var w = img.width, h = img.height;
        if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
        var c = document.createElement("canvas");
        c.width = w; c.height = h;
        c.getContext("2d").drawImage(img, 0, 0, w, h);
        res(c.toDataURL("image/jpeg", 0.95).split(",")[1]);
      };
      img.onerror = rej;
      img.src = e.target.result;
    };
    reader.onerror = rej;
    reader.readAsDataURL(file);
  });
}

var SYS = "You are an English vocabulary and etymology expert. Respond ONLY with valid JSON, no markdown. CRITICAL: In roots array, the 'part' field must be the ACTUAL morpheme letters (e.g. at-, tract, -ive), NOT the meaning.";

function wordPrompt(word) {
  return "Analyse the English word \"" + word + "\". Return JSON: {\"words\":[{" +
    "\"word\":\"" + word + "\"," +
    "\"phonetic\":\"IPA\"," +
    "\"pos\":\"part of speech e.g. v. n. adj.\"," +
    "\"conjugation\":{\"present\":\"base form or null\",\"past\":\"past tense or null\",\"pp\":\"past participle or null\",\"ing\":\"present participle or null\"}," +
    "\"zh\":\"Chinese meaning 2-5 chars\"," +
    "\"en_def\":\"one English definition\"," +
    "\"example_en\":\"TOEIC example sentence\"," +
    "\"example_zh\":\"Chinese translation\"," +
    "\"roots\":[{\"part\":\"actual morpheme e.g. re- or dict or -tion\",\"type\":\"prefix or root or suffix\",\"meaning\":\"Chinese meaning\"}]," +
    "\"root_tip\":\"how to remember using roots (Traditional Chinese 1-2 sentences)\"," +
    "\"family_words\":[\"related1\",\"related2\",\"related3\",\"related4\"]," +
    "\"memory_tip\":\"memory tip (Traditional Chinese 1 sentence)\"," +
    "\"level\":\"TOEIC score range\"" +
    "}]}";
}

function passagePrompt(txt) {
  return "From this text, find all vocabulary worth learning (TOEIC 800 level, max 10 words): \"" + txt + "\". " +
    "Return JSON: {\"words\":[{\"word\":\"\",\"phonetic\":\"\",\"pos\":\"\",\"conjugation\":{\"present\":null,\"past\":null,\"pp\":null,\"ing\":null}," +
    "\"zh\":\"\",\"en_def\":\"\",\"example_en\":\"\",\"example_zh\":\"\"," +
    "\"roots\":[{\"part\":\"actual morpheme\",\"type\":\"prefix or root or suffix\",\"meaning\":\"\"}]," +
    "\"root_tip\":\"\",\"family_words\":[],\"memory_tip\":\"\",\"level\":\"\"}]}";
}

var IMG_PROMPT = "This image likely contains English vocabulary. STEP 1: Read ALL English words visible (bold, larger font, vocabulary entries). STEP 2: Filter out articles, prepositions, conjunctions. STEP 3: Analyse each remaining word. Return JSON: {\"words\":[{\"word\":\"\",\"phonetic\":\"\",\"pos\":\"\",\"conjugation\":{\"present\":null,\"past\":null,\"pp\":null,\"ing\":null},\"zh\":\"\",\"en_def\":\"\",\"example_en\":\"\",\"example_zh\":\"\",\"roots\":[{\"part\":\"actual morpheme\",\"type\":\"prefix or root or suffix\",\"meaning\":\"\"}],\"root_tip\":\"\",\"family_words\":[],\"memory_tip\":\"\",\"level\":\"\"}]}";

var TB_OCR = "This is a textbook vocabulary page. List EVERY English headword (bold/larger font/numbered entries). Do NOT filter. Return JSON: {\"detected_words\":[\"word1\",\"word2\"]}";

function batchPrompt(words) {
  return "Analyse each of these " + words.length + " English words: [" + words.join(", ") + "]. " +
    "Return JSON for ALL of them: {\"words\":[{\"word\":\"\",\"phonetic\":\"\",\"pos\":\"\",\"conjugation\":{\"present\":null,\"past\":null,\"pp\":null,\"ing\":null}," +
    "\"zh\":\"\",\"en_def\":\"\",\"example_en\":\"\",\"example_zh\":\"\"," +
    "\"roots\":[{\"part\":\"actual morpheme\",\"type\":\"prefix or root or suffix\",\"meaning\":\"\"}]," +
    "\"root_tip\":\"\",\"family_words\":[],\"memory_tip\":\"\",\"level\":\"\"}]}";
}

// ===== ADD PAGE =====
var previewFile = null;
var addMode = "cam";

function renderAdd() {
  var wrap = document.getElementById("add-wrap");
  if (!apiKey) {
    wrap.innerHTML = '<div class="sec-label">設定 API Key</div>' +
      '<div class="api-box">' +
        '<div class="api-label">輸入你的 <strong style="color:var(--al)">OpenAI API Key</strong>（sk-...）<br><br>前往 platform.openai.com/api-keys 取得</div>' +
        '<input class="api-input" id="key-inp" placeholder="sk-..." type="password"/>' +
        '<button class="btn-p" onclick="submitKey()">儲存並開始</button>' +
      '</div>';
    return;
  }
  wrap.innerHTML =
    '<div style="display:flex;justify-content:space-between;align-items:center">' +
      '<div class="sec-label">新增單字</div>' +
      '<button onclick="resetKey()" style="background:none;border:none;color:var(--muted);font-size:12px;text-decoration:underline">重設Key</button>' +
    '</div>' +
    '<div class="mtabs">' +
      '<button id="mt-cam" class="mtab on" onclick="switchMode(\'cam\')">📷 拍照/相簿</button>' +
      '<button id="mt-word" class="mtab" onclick="switchMode(\'word\')">✍️ 單字</button>' +
      '<button id="mt-passage" class="mtab" onclick="switchMode(\'passage\')">📝 文章</button>' +
    '</div>' +
    '<div id="m-cam" style="display:flex;flex-direction:column;gap:10px">' +
      '<div class="cam-btns">' +
        '<button class="cbtn" onclick="document.getElementById(\'f-cam\').click()">📷 拍照</button>' +
        '<button class="cbtn" onclick="document.getElementById(\'f-alb\').click()">🖼 相簿</button>' +
      '</div>' +
      '<input type="file" id="f-cam" accept="image/*" capture="environment" style="display:none" onchange="onImg(event)"/>' +
      '<input type="file" id="f-alb" accept="image/*" style="display:none" onchange="onImg(event)"/>' +
      '<div class="img-prev" id="img-prev"><img id="prev-img" src=""/><button class="btn-s" onclick="clearImg()">✕ 清除圖片</button></div>' +
      '<div style="background:var(--s2);border:1px solid var(--border2);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px">' +
        '<div style="flex:1"><div style="font-size:13px;font-weight:600;color:var(--text)">📚 課本單字頁模式</div><div style="font-size:11px;color:var(--muted);margin-top:2px">掃描所有粗體單字</div></div>' +
        '<label style="position:relative;width:44px;height:24px;flex-shrink:0">' +
          '<input type="checkbox" id="tb-mode" style="opacity:0;width:0;height:0" onchange="updateToggle()"/>' +
          '<span id="tog-track" style="position:absolute;inset:0;background:var(--border2);border-radius:12px;transition:.2s;cursor:pointer"></span>' +
          '<span id="tog-thumb" style="position:absolute;top:3px;left:3px;width:18px;height:18px;background:#fff;border-radius:50%;transition:.2s;pointer-events:none"></span>' +
        '</label>' +
      '</div>' +
      '<button class="btn-p" id="btn-img" onclick="doImg()" disabled>🔍 AI 辨識圖片單字</button>' +
    '</div>' +
    '<div id="m-word" style="display:none;flex-direction:column;gap:10px">' +
      '<input class="txt-in" id="word-inp" placeholder="輸入英文單字，多個用逗號隔開" oninput="toggleBtn(\'btn-word\',\'word-inp\')"/>' +
      '<button class="btn-p" id="btn-word" onclick="doWord()" disabled>🤖 AI 分析單字</button>' +
    '</div>' +
    '<div id="m-passage" style="display:none;flex-direction:column;gap:10px">' +
      '<textarea class="txt-in" id="pass-inp" placeholder="貼上英文文章、逐字稿..." rows="5" style="resize:vertical" oninput="toggleBtn(\'btn-pass\',\'pass-inp\')"></textarea>' +
      '<button class="btn-p" id="btn-pass" onclick="doPassage()" disabled>🤖 擷取重要單字</button>' +
    '</div>' +
    '<div id="result-area"></div>';
  previewFile = null;
}

function updateToggle() {
  var cb = document.getElementById("tb-mode");
  var track = document.getElementById("tog-track");
  var thumb = document.getElementById("tog-thumb");
  if (!cb || !track || !thumb) return;
  track.style.background = cb.checked ? "var(--accent)" : "var(--border2)";
  thumb.style.left = cb.checked ? "23px" : "3px";
}

function switchMode(m) {
  addMode = m;
  ["cam","word","passage"].forEach(function(x) {
    document.getElementById("m-" + x).style.display = x === m ? "flex" : "none";
    document.getElementById("m-" + x).style.flexDirection = "column";
    document.getElementById("m-" + x).style.gap = "10px";
    document.getElementById("mt-" + x).classList.toggle("on", x === m);
  });
}

function toggleBtn(btnId, inputId) {
  document.getElementById(btnId).disabled = !document.getElementById(inputId).value.trim();
}

function submitKey() {
  var k = document.getElementById("key-inp").value.trim();
  if (!k.startsWith("sk-")) { toast("Key 格式不正確"); return; }
  saveKey(k); toast("✅ API Key 已儲存！"); renderAdd();
}

function resetKey() {
  if (!confirm("確定重設 API Key？")) return;
  localStorage.removeItem("wl-key"); apiKey = ""; renderAdd();
}

function onImg(e) {
  var f = e.target.files[0]; if (!f) return;
  previewFile = f;
  document.getElementById("prev-img").src = URL.createObjectURL(f);
  document.getElementById("img-prev").classList.add("show");
  document.getElementById("btn-img").disabled = false;
  e.target.value = "";
}

function clearImg() {
  previewFile = null;
  document.getElementById("img-prev").classList.remove("show");
  document.getElementById("btn-img").disabled = true;
}

function loading(msg) {
  document.getElementById("result-area").innerHTML =
    '<div class="spin-wrap"><div class="spinner"></div><div class="spin-msg">' + msg + "</div></div>";
}

function parseWords(raw) {
  var d = JSON.parse(raw.replace(/```json|```/g, "").trim());
  return d.words || d;
}

function doImg() {
  if (!previewFile) return;
  var isTB = document.getElementById("tb-mode") && document.getElementById("tb-mode").checked;
  var btn = document.getElementById("btn-img");
  btn.disabled = true; btn.textContent = "⏳ 分析中...";
  fileToB64(previewFile).then(function(b64) {
    if (isTB) {
      loading("第1步：辨識課本粗體單字...");
      return callAI([
        {role:"system", content:"You are an OCR expert. Extract text precisely."},
        {role:"user", content:[
          {type:"image_url", image_url:{url:"data:image/jpeg;base64," + b64}},
          {type:"text", text:TB_OCR}
        ]}
      ]).then(function(raw) {
        var d = JSON.parse(raw.replace(/```json|```/g,"").trim());
        var words = d.detected_words || [];
        if (!words.length) throw new Error("找不到單字，請確認圖片清晰");
        loading("第2步：分析 " + words.length + " 個單字（約15秒）...");
        return callAI([{role:"system",content:SYS},{role:"user",content:batchPrompt(words)}]);
      }).then(function(raw) { showResults(parseWords(raw), "課本"); });
    } else {
      loading("AI 辨識圖片單字...");
      return callAI([
        {role:"system", content:SYS},
        {role:"user", content:[
          {type:"image_url", image_url:{url:"data:image/jpeg;base64," + b64}},
          {type:"text", text:IMG_PROMPT}
        ]}
      ]).then(function(raw) { showResults(parseWords(raw), "拍照"); });
    }
  }).catch(function(e) {
    document.getElementById("result-area").innerHTML =
      '<div class="api-box"><div class="api-label">❌ ' + e.message + '</div><button class="btn-s" onclick="renderAdd()">重試</button></div>';
  }).finally(function() {
    btn.disabled = false; btn.textContent = "🔍 AI 辨識圖片單字";
  });
}

function doWord() {
  var inp = document.getElementById("word-inp").value.trim(); if (!inp) return;
  var words = inp.split(/[,，、\s]+/).map(function(w){return w.trim();}).filter(Boolean);
  var btn = document.getElementById("btn-word");
  btn.disabled = true; btn.textContent = "⏳ 分析中...";
  loading("分析 " + words.length + " 個單字的字根字首...");
  var prompt = words.length === 1 ? wordPrompt(words[0]) : passagePrompt(words.join(", "));
  callAI([{role:"system",content:SYS},{role:"user",content:prompt}])
    .then(function(raw) { showResults(parseWords(raw), "手動"); })
    .catch(function(e) {
      document.getElementById("result-area").innerHTML = '<div class="api-box"><div class="api-label">❌ ' + e.message + "</div></div>";
    })
    .finally(function() { btn.disabled = false; btn.textContent = "🤖 AI 分析單字"; });
}

function doPassage() {
  var txt = document.getElementById("pass-inp").value.trim(); if (!txt) return;
  var btn = document.getElementById("btn-pass");
  btn.disabled = true; btn.textContent = "⏳ 分析中...";
  loading("擷取文章重要單字...");
  callAI([{role:"system",content:SYS},{role:"user",content:passagePrompt(txt)}])
    .then(function(raw) { showResults(parseWords(raw), "文章"); })
    .catch(function(e) {
      document.getElementById("result-area").innerHTML = '<div class="api-box"><div class="api-label">❌ ' + e.message + "</div></div>";
    })
    .finally(function() { btn.disabled = false; btn.textContent = "🤖 擷取重要單字"; });
}

// ===== RESULTS =====
function showResults(words, source) {
  pending = words.map(function(w) { return Object.assign({}, w, {source:source}); });
  var newCount = pending.filter(function(w) {
    return !library.some(function(l) { return l.word.toLowerCase() === w.word.toLowerCase(); });
  }).length;
  var dupCount = pending.length - newCount;
  var bulkBar = pending.length > 1 ?
    '<div class="bulk-bar"><div class="bulk-info">找到 ' + pending.length + ' 個單字 <span>（' + newCount + ' 新 · ' + dupCount + ' 重複）</span></div>' +
    '<button class="btn-bulk" onclick="saveAll()">全部加入 ＋</button></div>' : "";
  document.getElementById("result-area").innerHTML =
    '<div class="res-section">' + bulkBar + pending.map(function(w, i) { return wordCard(w, i); }).join("") + "</div>";
}

function wordCard(w, idx) {
  var dup = library.some(function(l) { return l.word.toLowerCase() === w.word.toLowerCase(); });
  var rootParts = (w.roots || []).map(function(r) {
    var cls = r.type === "prefix" ? "rp-prefix" : r.type === "suffix" ? "rp-suffix" : "rp-root";
    return '<div class="rp ' + cls + '"><div class="rp-val">' + r.part + '</div><div class="rp-mean">' + r.meaning + "</div></div>";
  }).join("");
  var famWords = (w.family_words || []).map(function(fw) {
    return '<span class="fw" onclick="lookupWord(\'' + esc(fw) + '\')">' + fw + "</span>";
  }).join("");
  var hasRoots = rootParts || w.root_tip || famWords;
  var conj = w.conjugation;
  var hasConj = conj && (conj.past || conj.pp);
  var conjHtml = hasConj ?
    '<div style="margin-top:8px"><div style="font-size:11px;color:var(--muted);text-transform:uppercase;font-weight:700;letter-spacing:.5px;margin-bottom:6px">動詞三態</div>' +
    '<div class="w-conj">' +
      '<span class="conj-tag" style="color:var(--al)">原 ' + (conj.present || w.word) + "</span>" +
      '<span class="conj-tag" style="color:var(--blue)">過 ' + (conj.past || "-") + "</span>" +
      '<span class="conj-tag" style="color:var(--purple)">p.p. ' + (conj.pp || "-") + "</span>" +
      '<span class="conj-tag" style="color:var(--muted2)">-ing ' + (conj.ing || "-") + "</span>" +
    "</div></div>" : "";
  return '<div id="wc-' + idx + '" style="display:flex;flex-direction:column;gap:10px">' +
    '<div class="word-hdr">' +
      '<div class="wtag-row">' +
        '<span class="wtag wtag-lvl">' + (w.level || "TOEIC") + "</span>" +
        '<span class="wtag wtag-src">' + w.source + "</span>" +
        (dup ? '<span class="wtag wtag-dup">⚠️ 重複</span>' : "") +
      "</div>" +
      '<div class="w-word">' + w.word + "</div>" +
      '<div class="w-ph">' + (w.phonetic || "") + "</div>" +
      '<div class="w-pos">' + (w.pos || "") + "</div>" +
      conjHtml +
      '<div class="w-zh">' + w.zh + "</div>" +
      '<div class="w-en">' + (w.en_def || "") + "</div>" +
      '<div class="ex-block"><div class="ex-en">' + (w.example_en || "") + '</div><div class="ex-zh">' + (w.example_zh || "") + "</div></div>" +
      '<div class="speak-row">' +
        '<button class="btn-speak" onclick="speak(\'' + esc(w.word) + '\')">🔊 單字</button>' +
        '<button class="btn-speak" onclick="speak(\'' + esc(w.example_en || "") + '\')">🔊 例句</button>' +
      "</div>" +
      '<div class="save-row" id="sr-' + idx + '">' +
        (dup ? '<div class="already-saved">✅ 已在單字庫</div>' : '<button class="btn-save" onclick="saveOne(' + idx + ')">＋ 加入單字庫</button>') +
      "</div>" +
    "</div>" +
    (hasRoots ?
      '<div class="root-card">' +
        '<div class="root-title">🔤 字根字首分析</div>' +
        (rootParts ? '<div class="root-parts">' + rootParts + "</div>" : "") +
        (w.root_tip ? '<div class="tip-box"><div class="tip-label">字根記憶法</div><div class="tip-text">' + w.root_tip + "</div></div>" : "") +
        (famWords ? '<div><div class="fam-label">同族單字（點擊查詢）</div><div class="fam-row">' + famWords + "</div></div>" : "") +
      "</div>" : "") +
    (w.memory_tip ? '<div class="tip-box"><div class="tip-label">💡 記憶技巧</div><div class="tip-text">' + w.memory_tip + "</div></div>" : "") +
    "</div>";
}

function saveOne(idx) {
  var w = pending[idx]; if (!w) return;
  if (library.some(function(l) { return l.word.toLowerCase() === w.word.toLowerCase(); })) {
    toast("已在單字庫中"); return;
  }
  pushToLib(w);
  var row = document.getElementById("sr-" + idx);
  if (row) row.innerHTML = '<div class="already-saved">✅ 已儲存</div>';
  toast("✅「" + w.word + "」已加入！");
}

function saveAll() {
  ensureToday();
  var added = 0, skipped = [];
  pending.forEach(function(w) {
    if (library.some(function(l) { return l.word.toLowerCase() === w.word.toLowerCase(); })) {
      skipped.push(w.word);
    } else { pushToLib(w); added++; }
  });
  pending.forEach(function(w, i) {
    var row = document.getElementById("sr-" + i);
    if (row) row.innerHTML = '<div class="already-saved">✅ 已儲存</div>';
  });
  var msg = "✅ 已加入 " + added + " 個單字！";
  if (skipped.length) msg += "\n⚠️ 跳過重複：" + skipped.join("、");
  toast(msg, 3500);
  renderHome();
}

function pushToLib(w) {
  ensureToday();
  library.push({
    word:w.word, phonetic:w.phonetic||"", pos:w.pos||"",
    conjugation:w.conjugation||null,
    zh:w.zh, en_def:w.en_def||"",
    example_en:w.example_en||"", example_zh:w.example_zh||"",
    roots:w.roots||[], root_tip:w.root_tip||"",
    family_words:w.family_words||[], memory_tip:w.memory_tip||"",
    level:w.level||"", source:w.source, addedAt:Date.now()
  });
  stats.today++; save(); saveSt();
}

function lookupWord(word) {
  document.getElementById("result-area").innerHTML =
    '<div class="spin-wrap"><div class="spinner"></div><div class="spin-msg">查詢「' + word + '」...</div></div>';
  callAI([{role:"system",content:SYS},{role:"user",content:wordPrompt(word)}])
    .then(function(raw) {
      showResults(parseWords(raw), "查詢");
      document.getElementById("add-wrap").scrollTo({top:99999, behavior:"smooth"});
    })
    .catch(function(e) { toast("查詢失敗：" + e.message); });
}

// ===== LIBRARY =====
function renderLib() { filterLib(document.getElementById("lib-search").value || ""); }

function filterLib(q) {
  var list = q ? library.filter(function(w) {
    return w.word.toLowerCase().includes(q.toLowerCase()) || w.zh.includes(q);
  }) : library;
  document.getElementById("lib-count").textContent = "共 " + library.length + " 個單字" + (q ? " · 顯示 " + list.length + " 個" : "");
  var el = document.getElementById("lib-list");
  if (!list.length) {
    el.innerHTML = '<div class="empty-st"><div style="font-size:48px">' + (library.length ? "🔍" : "📚") + "</div><div>" + (library.length ? "找不到符合的單字" : "單字庫是空的") + "</div></div>";
    return;
  }
  el.innerHTML = list.slice().reverse().map(function(w) {
    return '<div class="lib-item" onclick="openModal(\'' + esc(w.word) + '\')">' +
      '<div style="flex:1"><div class="li-word">' + w.word + '</div><div class="li-info">' + (w.phonetic || "") + " · " + w.zh + " · " + (w.source || "") + "</div></div>" +
      '<div class="li-acts" onclick="event.stopPropagation()">' +
        '<button class="btn-del" onclick="delWord(\'' + esc(w.word) + '\')">🗑</button>' +
        '<button style="background:none;border:none;font-size:20px;padding:4px 6px" onclick="speak(\'' + esc(w.word) + '\')">🔊</button>' +
      "</div></div>";
  }).join("");
}

function delWord(word) {
  if (!confirm("確定刪除「" + word + "」？")) return;
  library = library.filter(function(w) { return w.word !== word; });
  save(); renderLib(); renderHome();
  toast("🗑 已刪除「" + word + "」");
}

// ===== MODAL =====
function openModal(word) {
  var w = library.find(function(x) { return x.word === word; }); if (!w) return;
  var rootParts = (w.roots || []).map(function(r) {
    var cls = r.type === "prefix" ? "rp-prefix" : r.type === "suffix" ? "rp-suffix" : "rp-root";
    return '<div class="rp ' + cls + '"><div class="rp-val">' + r.part + '</div><div class="rp-mean">' + r.meaning + "</div></div>";
  }).join("");
  var famWords = (w.family_words || []).map(function(fw) { return '<span class="fw">' + fw + "</span>"; }).join("");
  var conj = w.conjugation;
  var hasConj = conj && (conj.past || conj.pp);
  var conjHtml = hasConj ?
    '<div style="margin-top:8px"><div style="font-size:11px;color:var(--muted);text-transform:uppercase;font-weight:700;margin-bottom:6px">動詞三態</div>' +
    '<div class="w-conj">' +
      '<span class="conj-tag" style="color:var(--al)">原 ' + (conj.present || w.word) + "</span>" +
      '<span class="conj-tag" style="color:var(--blue)">過 ' + (conj.past || "-") + "</span>" +
      '<span class="conj-tag" style="color:var(--purple)">p.p. ' + (conj.pp || "-") + "</span>" +
      '<span class="conj-tag" style="color:var(--muted2)">-ing ' + (conj.ing || "-") + "</span>" +
    "</div></div>" : "";
  document.getElementById("modal-body").innerHTML =
    '<div class="modal-word">' + w.word + "</div>" +
    '<div class="w-ph">' + (w.phonetic || "") + "</div>" +
    '<div class="w-pos" style="margin-top:10px">' + (w.pos || "") + "</div>" +
    conjHtml +
    '<div class="w-zh">' + w.zh + "</div>" +
    '<div class="w-en">' + (w.en_def || "") + "</div>" +
    '<div class="ex-block"><div class="ex-en">' + (w.example_en || "") + '</div><div class="ex-zh">' + (w.example_zh || "") + "</div></div>" +
    '<div class="speak-row">' +
      '<button class="btn-speak" onclick="speak(\'' + esc(w.word) + '\')">🔊 朗讀單字</button>' +
      '<button class="btn-speak" onclick="speak(\'' + esc(w.example_en || "") + '\')">🔊 朗讀例句</button>' +
    "</div>" +
    (rootParts || w.root_tip || famWords ?
      '<div class="root-card">' +
        '<div class="root-title">🔤 字根字首分析</div>' +
        (rootParts ? '<div class="root-parts">' + rootParts + "</div>" : "") +
        (w.root_tip ? '<div class="tip-box"><div class="tip-label">字根記憶法</div><div class="tip-text">' + w.root_tip + "</div></div>" : "") +
        (famWords ? '<div><div class="fam-label" style="margin-bottom:6px">同族單字</div><div class="fam-row">' + famWords + "</div></div>" : "") +
      "</div>" : "") +
    (w.memory_tip ? '<div class="tip-box"><div class="tip-label">💡 記憶技巧</div><div class="tip-text">' + w.memory_tip + "</div></div>" : "") +
    '<button class="modal-close" onclick="closeModal()">關閉</button>';
  document.getElementById("modal").style.display = "flex";
}

function closeModal() { document.getElementById("modal").style.display = "none"; }

}

function renderGramList() {
  var items = GRAM_DB;

    return g.title.toLowerCase().includes(gramSearch) || g.note.toLowerCase().includes(gramSearch) ||
      g.formula.toLowerCase().includes(gramSearch) ||
      g.examples.some(function(e) { return e.en.toLowerCase().includes(gramSearch) || e.zh.includes(gramSearch); });
  });
  var el = document.getElementById("gram-list");
  if (!items.length) { el.innerHTML = '<div class="empty-st"><div style="font-size:40px">🔍</div><div>找不到符合的文法</div></div>'; return; }
  el.innerHTML = items.map(function(g) {
    var bc = g.level === "jh" ? "badge-jh" : g.level === "sh" ? "badge-sh" : "badge-ph";
    var bt = g.level === "jh" ? "國中" : g.level === "sh" ? "高中" : "片語";
    return '<div class="gram-card">' +
      '<div class="gram-head" onclick="toggleGram(\'' + g.id + '\')">' +

        '<span class="gram-arrow" id="arr-' + g.id + '">▼</span>' +
      "</div>" +

            '<button class="gram-speak-btn" onclick="speak(\'' + safeen + '\')">🔊 朗讀</button></div>';

function getSRS(w) { return w.srs || {level:0, due:0, skip:false}; }

function setSRS(word, correct) {
  var w = library.find(function(x) { return x.word === word; }); if (!w) return;
  if (!w.srs) w.srs = {level:0, due:0, skip:false};
  var gaps = [0,3600,28800,86400,259200,604800,1209600,2592000,7776000];
  if (correct) {
    w.srs.level = Math.min(w.srs.level + 1, 8);
    w.srs.due = Date.now() + (gaps[w.srs.level] || 86400) * 1000;
  } else {
    w.srs.level = Math.max(0, w.srs.level - 2);
    w.srs.due = Date.now() + 300000;
  }
  save();
}

function setWordFreq(word, action) {
  var w = library.find(function(x) { return x.word === word; }); if (!w) return;
  if (!w.srs) w.srs = {level:0, due:0, skip:false};
  if (action === "boost") { w.srs.level=0; w.srs.due=0; w.srs.skip=false; toast("🔥「" + word + "」已設為優先複習"); }
  else if (action === "reduce") { w.srs.level=6; w.srs.due=Date.now()+604800000; w.srs.skip=false; toast("😌「" + word + "」已設為減少出現"); }
  else if (action === "skip") { w.srs.skip=true; toast("⏸️「" + word + "」已停用"); }
  save();
}

function getPool() {
  var now = Date.now();
  var due = library.filter(function(w) { return !getSRS(w).skip && getSRS(w).due <= now; });
  var fresh = library.filter(function(w) { var s=getSRS(w); return !s.skip && s.level===0 && s.due>now; });
  var rest = library.filter(function(w) { var s=getSRS(w); return !s.skip && s.level>0 && s.due>now; });
  return shuffle(due).concat(shuffle(fresh)).concat(shuffle(rest)).slice(0, Math.min(15, library.length));
}

function getDistractors(excludeWords, count) {
  var libWords = {};
  library.forEach(function(w) { libWords[w.word.toLowerCase()] = true; });
  var pool = DISTRACTORS.filter(function(d) {
    return !libWords[d.word.toLowerCase()] && excludeWords.indexOf(d.word) === -1;
  });
  return shuffle(pool).slice(0, count);
}

function makeQ(w, lib) {
  var types = ["en2zh","zh2en","example"];
  var type = types[Math.floor(Math.random() * types.length)];
  if (type === "example" && !w.example_en) type = "en2zh";
  var libPool = shuffle(lib.filter(function(x) { return x.word !== w.word; }));

  function buildOpts(correctObj, libWrongs) {
    var need = 3 - libWrongs.length;
    var distr = getDistractors([correctObj.word].concat(libWrongs.map(function(x){return x.word;})), need)
      .map(function(d) { return {word:d.word, zh:d.zh, inLib:false}; });
    return shuffle([correctObj].concat(libWrongs).concat(distr)).slice(0,4);
  }

  if (type === "en2zh") {
    var lw = libPool.filter(function(x){return x.zh!==w.zh;}).slice(0,2).map(function(x){return {word:x.word,zh:x.zh,inLib:true};});
    var allOpts = buildOpts({word:w.word,zh:w.zh,inLib:true}, lw);
    return {type:type, word:w.word, prompt:w.word, sublabel:w.phonetic||"", question:"這個單字的中文意思是？",
      correct:w.zh, allOpts:allOpts, opts:allOpts.map(function(o){return o.zh;}), ex:w.example_en, exzh:w.example_zh};
  }
  if (type === "zh2en") {
    var lw2 = libPool.slice(0,2).map(function(x){return {word:x.word,zh:x.zh,inLib:true};});
    var allOpts2 = buildOpts({word:w.word,zh:w.zh,inLib:true}, lw2);
    return {type:type, word:w.word, prompt:w.zh, sublabel:w.en_def||"", question:"哪個英文單字符合這個意思？",
      correct:w.word, allOpts:allOpts2, opts:allOpts2.map(function(o){return o.word;}), ex:w.example_en, exzh:w.example_zh};
  }
  if (type === "example") {
    var blank = (w.example_en||"").replace(new RegExp(w.word,"gi"),"_____");
    var lw3 = libPool.slice(0,2).map(function(x){return {word:x.word,zh:x.zh,inLib:true};});
    var allOpts3 = buildOpts({word:w.word,zh:w.zh,inLib:true}, lw3);
    return {type:type, word:w.word, prompt:blank, sublabel:w.example_zh||"", question:"填入正確的單字：",
      correct:w.word, allOpts:allOpts3, opts:allOpts3.map(function(o){return o.word;}), ex:w.example_en, exzh:w.example_zh};
  }
}

function renderQuiz() {
  var el = document.getElementById("quiz-content");
  var pool = getPool();
  if (pool.length < 4) {
    el.innerHTML = '<div class="empty-st"><div style="font-size:48px">📚</div><div style="font-size:18px;font-weight:700">單字不夠</div>' +
      '<div style="font-size:14px;color:var(--muted)">至少需要 4 個單字<br>目前有 ' + library.length + ' 個</div>' +
      '<button class="btn-p" style="margin-top:12px" onclick="goTab(\'add\')">去新增單字</button></div>';
    return;
  }
  quizSt.questions = pool.map(function(w) { return makeQ(w, library); }).filter(Boolean);
  quizSt.idx = 0; quizSt.score = 0; quizSt.ans = false; quizSt.wrong = [];
  renderQ();
}

function renderQ() {
  var q = quizSt.questions[quizSt.idx];
  if (!q) { renderScore(); return; }
  var pct = (quizSt.idx / quizSt.questions.length) * 100;
  var typeLabel = q.type==="en2zh" ? "英文→中文" : q.type==="zh2en" ? "中文→英文" : "例句填空";
  var typeColor = q.type==="en2zh" ? "var(--al)" : q.type==="zh2en" ? "var(--blue)" : "var(--purple)";
  var fontSize = q.type === "example" ? "17px" : "34px";
  document.getElementById("quiz-content").innerHTML =

    '<div style="display:flex;justify-content:space-between;align-items:center">' +
      '<span style="font-size:11px;font-weight:700;color:' + typeColor + ';letter-spacing:.5px">' + typeLabel + "</span>" +
      '<span style="font-size:12px;color:var(--muted)">第 ' + (quizSt.idx+1) + " / " + quizSt.questions.length + " 題</span>" +
    "</div>" +
    '<div class="q-card">' +
      '<div class="q-label">' + q.question + "</div>" +
      '<div class="q-word" style="font-size:' + fontSize + ';line-height:1.4">' + q.prompt + "</div>" +

    "</div>" +
    '<div class="opts">' +

        return '<button class="opt" onclick="ansQ(this,\'' + esc(o) + '\',\'' + esc(q.correct) + '\',\'' + esc(q.word) + '\',\'' + esc(q.ex||"") + '\',\'' + esc(q.exzh||"") + '\')">' + o + "</button>";
      }).join("") +
    "</div>" +
    '<div id="qfb" style="display:none"></div>' +
    '<div id="qnxt" style="display:none"><button class="btn-nq" onclick="nextQ()">' + (quizSt.idx+1 < quizSt.questions.length ? "下一題 →" : "查看結果 🎯") + "</button></div>";
}

function ansQ(btn, chosen, correct, word, ex, exzh) {
  if (quizSt.ans) return;
  quizSt.ans = true;
  quizSt.curWord = word;
  var q = quizSt.questions[quizSt.idx];
  quizSt.curOpts = (q && q.allOpts) || [];
  document.querySelectorAll(".opt").forEach(function(b) { b.disabled = true; });
  var ok = chosen === correct;
  if (ok) { btn.classList.add("ok"); quizSt.score++; }
  else {
    btn.classList.add("no");
    document.querySelectorAll(".opt").forEach(function(b) { if (b.textContent.trim() === correct) b.classList.add("ok"); });
    quizSt.wrong.push(word);
  }
  setSRS(word, ok);
  speak(word);
  var wObj = library.find(function(x) { return x.word === word; }) || {};
  var srsLv = getSRS(wObj).level;
  var lvlColor = ok ? "var(--green)" : "var(--red)";
  var lvlTxt = (ok ? "✅ 熟悉度 +1" : "❌ 熟悉度 -2") + "（Lv." + srsLv + "）";
  var optsHtml = '<div style="font-size:11px;color:var(--muted);text-transform:uppercase;font-weight:700;margin-bottom:8px">所有選項</div>';
  quizSt.curOpts.forEach(function(opt, i) {
    var isCorrect = (q && q.type === "en2zh") ? opt.zh === correct : opt.word === correct;
    var inLib = opt.inLib || library.some(function(l) { return l.word.toLowerCase() === opt.word.toLowerCase(); });
    var border = isCorrect ? "var(--green)" : "var(--border2)";
    var wc = isCorrect ? "var(--green)" : "var(--text)";
    var newBadge = !inLib ? '<span style="font-size:10px;color:var(--blue);background:rgba(96,165,250,.1);border:1px solid rgba(96,165,250,.25);border-radius:10px;padding:1px 6px;margin-left:5px">新</span>' : "";
    var addBtn = !inLib ? '<button onclick="quickAdd(' + i + ',this)" style="background:var(--accent);color:#fff;border:none;border-radius:8px;padding:4px 10px;font-size:12px;white-space:nowrap;flex-shrink:0">＋加入</button>' : "";
    optsHtml += '<div style="background:var(--s2);border:1px solid ' + border + ';border-radius:10px;padding:9px 12px;display:flex;align-items:center;gap:8px;margin-bottom:6px">' +
      '<div style="flex:1"><span style="font-family:serif;font-size:16px;color:' + wc + '">' + opt.word + '</span><span style="font-size:12px;color:var(--muted);margin-left:8px">' + opt.zh + "</span>" + newBadge + "</div>" + addBtn + "</div>";
  });
  var exHtml = ex ? '<div style="background:var(--s2);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:10px 12px;margin-top:8px"><div style="font-style:italic;color:var(--text);font-size:14px">' + ex + '</div><div style="font-size:12px;color:var(--muted);margin-top:4px">' + exzh + "</div></div>" : "";
  var freqHtml = '<div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap">' +
    '<button onclick="setWordFreq(quizSt.curWord,\'boost\')" style="background:rgba(217,119,6,.15);border:1px solid var(--aborder);color:var(--al);border-radius:8px;padding:5px 10px;font-size:12px">🔥 加強複習</button>' +
    '<button onclick="setWordFreq(quizSt.curWord,\'reduce\')" style="background:var(--s2);border:1px solid var(--border2);color:var(--muted2);border-radius:8px;padding:5px 10px;font-size:12px">😌 減少出現</button>' +
    '<button onclick="setWordFreq(quizSt.curWord,\'skip\')" style="background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);color:var(--red);border-radius:8px;padding:5px 10px;font-size:12px">⏸️ 不再出題</button>' +
    "</div>";
  var fb = document.getElementById("qfb");
  fb.style.display = "block";
  fb.innerHTML = '<div class="expl-box"><div style="font-size:12px;color:' + lvlColor + ';margin-bottom:10px;font-weight:600">' + lvlTxt + "</div>" + optsHtml + exHtml + freqHtml + "</div>";
  document.getElementById("qnxt").style.display = "block";
}

function quickAdd(idx, btn) {
  var opt = quizSt.curOpts[idx]; if (!opt) return;
  if (library.some(function(l) { return l.word.toLowerCase() === opt.word.toLowerCase(); })) { toast("已在單字庫中"); return; }
  ensureToday();
  library.push({word:opt.word, phonetic:"", pos:"", zh:opt.zh, en_def:"",
    example_en:"", example_zh:"", roots:[], root_tip:"", family_words:[], memory_tip:"",
    level:"", source:"測驗新增", addedAt:Date.now()});
  stats.today++; save(); saveSt();
  btn.textContent = "✅"; btn.style.background = "var(--green)"; btn.disabled = true;
  toast("✅「" + opt.word + "」已加入！\n去新增頁可取得完整分析");
}

function nextQ() { quizSt.idx++; quizSt.ans = false; renderQ(); }

function renderScore() {
  stats.quiz++; saveSt();
  var total = quizSt.questions.length;
  var pct = Math.round((quizSt.score / total) * 100);
  var e = pct>=80 ? "🏆" : pct>=60 ? "💪" : "📚";
  var m = pct>=80 ? "太棒了！繼續保持！" : pct>=60 ? "不錯！繼續加油！" : "答錯的單字會優先出現！";
  var dueNow = library.filter(function(w) { return !getSRS(w).skip && getSRS(w).due <= Date.now(); }).length;
  var dueToday = library.filter(function(w) { var s=getSRS(w); return !s.skip && s.due>Date.now() && s.due<=Date.now()+86400000; }).length;
  document.getElementById("quiz-content").innerHTML =
    '<div class="score-screen">' +
      '<div style="font-size:64px">' + e + "</div>" +
      '<div class="score-n">' + pct + "%</div>" +
      '<div style="font-size:15px;color:var(--muted)">' + quizSt.score + " / " + total + " 答對</div>" +
      (quizSt.wrong.length ? '<div style="font-size:13px;color:var(--red)">答錯：' + quizSt.wrong.join("、") + "</div>" : "") +
      '<div style="font-size:17px;font-weight:700">' + m + "</div>" +
      '<div style="background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:14px 20px;width:100%;text-align:left">' +
        '<div style="font-size:11px;color:var(--muted);margin-bottom:8px;font-weight:700;text-transform:uppercase">複習排程</div>' +
        '<div style="font-size:14px">🔴 現在待複習：<strong style="color:var(--al)">' + dueNow + "</strong> 個</div>" +
        '<div style="font-size:14px;margin-top:4px">🟡 今日內到期：<strong style="color:var(--blue)">' + dueToday + "</strong> 個</div>" +
        '<div style="font-size:14px;margin-top:4px">📚 可測驗單字：<strong>' + library.filter(function(w){return !getSRS(w).skip;}).length + "</strong> 個</div>" +
      "</div>" +
      '<button class="btn-retry" onclick="renderQuiz()">繼續測驗</button>' +
    "</div>";
  renderHome();
}

// ===== INIT =====
function startApp() {
  syncFromFb();
  var ld = document.getElementById("fb-load");
  if (ld) ld.style.display = "none";
  setSyncUI(false);
  renderHome();
}

if (window._fbReady) {
  startApp();
} else {
  window._onFbReady = startApp;
  setTimeout(function() { if (!window._fbReady) { console.warn("Firebase timeout"); startApp(); } }, 3000);
}
</script>


</body></html>
