<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="WordLens"/>
<meta name="theme-color" content="#1a1a1a"/>
<title>WordLens</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Noto+Sans+TC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const cfg = {
  apiKey: "AIzaSyCCl-dmOTiB3FMoavkaA6m_ZAHTPJgxNAs",
  authDomain: "kumoen.firebaseapp.com",
  projectId: "kumoen",
  storageBucket: "kumoen.firebasestorage.app",
  messagingSenderId: "407042193066",
  appId: "1:407042193066:web:f48c1b9ce10019437c42d3"
};
const fbApp = initializeApp(cfg);
const db = getFirestore(fbApp);
const REF = doc(db, "users", "kumo");

async function fbLoad() {
  try {
    const snap = await getDoc(REF);
    if (snap.exists()) {
      const d = snap.data();
      // 重要修正：確保全域變數 LIB 被正確賦值
      window.LIB = d.library || [];
      window._st = d.stats || { quiz: 0, today: 0, date: "" };
    } else {
      window.LIB = [];
      window._st = { quiz: 0, today: 0, date: "" };
    }
    window._lib = window.LIB; // 相容性
  } catch (e) {
    console.error("Firebase Load Error:", e);
  }
}

async function fbSave() {
  try {
    await setDoc(REF, {
      library: window.LIB || [],
      stats: window._st || {}
    }, { merge: true });
  } catch (e) {
    console.error("Firebase Save Error:", e);
  }
}

window.fbSave = fbSave;

// 頁面啟動流程
fbLoad().then(() => {
  window._fbReady = true;
  console.log("Firebase Data Loaded. Library size:", window.LIB.length);
  // 載入完成後執行初始化渲染
  if (typeof renderHome === "function") renderHome();
  if (window._onFbReady) window._onFbReady();
});
</script>

<style>
:root{--bg:#1a1a1a;--s1:#222;--s2:#2a2a2a;--border:#3a3a3a;--border2:#444;--accent:#d97706;--al:#f59e0b;--abg:rgba(217,119,6,.1);--aborder:rgba(217,119,6,.3);--green:#22c55e;--red:#ef4444;--blue:#60a5fa;--purple:#a78bfa;--text:#f5f0eb;--muted:#888;--muted2:#aaa;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:"Noto Sans TC",sans-serif;overflow:hidden}
button{cursor:pointer;font-family:inherit;border:none;background:none}
input,textarea{font-family:inherit;color:var(--text)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
#app{max-width:480px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
nav{display:flex;background:var(--s1);border-top:1px solid var(--border);order:2;flex-shrink:0}
nav button{flex:1;padding:10px 1px 12px;font-size:9px;font-weight:600;color:var(--muted);text-transform:uppercase;display:flex;flex-direction:column;align-items:center;gap:3px;letter-spacing:.3px}
nav button .ni{font-size:19px}
nav button.active{color:var(--al)}
.view{flex:1;overflow-y:auto;display:none;flex-direction:column}.view.show{display:flex}
/* home */
.hero{padding:44px 24px 16px}
.app-name{font-family:"Playfair Display",serif;font-size:40px;letter-spacing:-1px}
.app-name em{color:var(--al);font-style:italic}
.app-sub{font-size:13px;color:var(--muted);margin-top:6px}
.sync-row{display:flex;align-items:center;gap:6px;margin-top:8px}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}
.stxt{font-size:11px;color:var(--muted)}
.hdiv{height:1px;background:var(--border);margin:0 24px 16px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0 24px 16px}
.stat{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:14px 8px;text-align:center}
.stat-n{font-family:"Playfair Display",serif;font-size:32px;color:var(--al)}
.stat-l{font-size:11px;color:var(--muted);margin-top:2px}
.sec-h{padding:0 24px 8px;font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;font-weight:700}
.rec-list{padding:0 24px 20px;display:flex;flex-direction:column;gap:8px}
.ri{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:13px 16px;display:flex;align-items:center;gap:12px;cursor:pointer}
.ri:active{border-color:var(--accent)}
.ri-word{font-family:"Playfair Display",serif;font-size:20px;flex:1}
.ri-zh{font-size:12px;color:var(--muted);margin-top:2px}
.ri-badge{font-size:11px;color:var(--al);background:var(--abg);border:1px solid var(--aborder);padding:2px 8px;border-radius:20px;white-space:nowrap}
/* add */
.add-wrap{flex:1;display:flex;flex-direction:column;padding:20px 24px;gap:14px;overflow-y:auto}
.sec-label{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;font-weight:700}
.btn-p{background:var(--accent);color:#fff;border-radius:14px;padding:15px;font-size:16px;font-weight:700;width:100%}
.btn-p:active{opacity:.8}.btn-p:disabled{opacity:.35;cursor:not-allowed}
.btn-s{background:var(--s2);border:1px solid var(--border2);color:var(--muted2);border-radius:14px;padding:13px;font-size:15px;font-weight:600;width:100%}
.inp{background:var(--s1);border:1px solid var(--border2);border-radius:14px;padding:14px 16px;font-size:16px;outline:none;width:100%}
.inp:focus{border-color:var(--accent)}
.spin-box{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:28px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px}
.spin{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spin-msg{font-size:14px;color:var(--muted2)}
.mtabs{display:flex;gap:6px}
.mtab{flex:1;background:var(--s2);border:1px solid var(--border2);color:var(--muted);border-radius:10px;padding:9px 4px;font-size:12px;font-weight:600}
.mtab.on{background:var(--abg);border-color:var(--accent);color:var(--al)}
.cam-btns{display:flex;gap:8px}
.cbtn{flex:1;background:var(--s2);border:1px solid var(--border2);color:var(--muted2);border-radius:12px;padding:14px;font-size:15px;font-weight:600}
.cbtn:active{border-color:var(--accent)}
.api-box{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:22px;display:flex;flex-direction:column;gap:12px}
.api-label{font-size:13px;color:var(--muted2);line-height:1.7}
.api-inp{background:var(--s2);border:1px solid var(--border2);border-radius:12px;padding:12px 14px;font-size:14px;outline:none;width:100%;font-family:"JetBrains Mono",monospace}
.api-inp:focus{border-color:var(--accent)}
/* result cards */
.res-wrap{display:flex;flex-direction:column;gap:14px}
.bulk-bar{background:var(--s1);border:1px solid var(--aborder);border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:5}
.bulk-info{flex:1;font-size:14px;font-weight:600;color:var(--al)}
.bulk-sub{font-size:12px;color:var(--muted);font-weight:400}
.btn-bulk{background:var(--accent);color:#fff;border-radius:10px;padding:10px 18px;font-size:14px;font-weight:700;white-space:nowrap}
.word-card{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:20px;display:flex;flex-direction:column;gap:10px}
.wtags{display:flex;gap:6px;flex-wrap:wrap}
.wtag{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;border:1px solid}
.wtag-lvl{color:var(--al);background:var(--abg);border-color:var(--aborder)}
.wtag-src{color:var(--purple);background:rgba(167,139,250,.1);border-color:rgba(167,139,250,.25)}
.wtag-dup{color:var(--red);background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3)}
.w-word{font-family:"Playfair Display",serif;font-size:40px;line-height:1}
.w-ph{font-family:"JetBrains Mono",monospace;font-size:13px;color:var(--muted);margin-top:4px}
.w-pos{font-size:12px;color:var(--al);font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.conj-row{display:flex;gap:6px;flex-wrap:wrap}
.ctag{background:var(--s2);border:1px solid var(--border2);border-radius:8px;padding:4px 10px;font-size:12px;font-family:"JetBrains Mono",monospace}
.w-zh{font-size:24px;font-weight:700}
.w-en{font-size:14px;color:var(--muted2);line-height:1.5}
.ex-block{background:var(--s2);border-left:3px solid var(--accent);border-radius:0 10px 10px 0;padding:12px 14px}
.ex-en{font-size:15px;font-style:italic;line-height:1.6}
.ex-zh{font-size:13px;color:var(--muted);margin-top:4px}
.speak-row{display:flex;gap:8px}
.btn-speak{flex:1;background:rgba(96,165,250,.08);border:1px solid rgba(96,165,250,.2);color:var(--blue);border-radius:11px;padding:10px;font-size:13px;font-weight:600}
.save-row{display:flex;gap:8px}
.btn-save{flex:1;background:var(--accent);color:#fff;border-radius:12px;padding:12px;font-size:14px;font-weight:700}
.btn-save:active{opacity:.8}
.saved-note{flex:1;text-align:center;color:var(--muted);font-size:13px;padding:12px;background:var(--s2);border:1px solid var(--border);border-radius:12px}
.root-card{background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:18px;display:flex;flex-direction:column;gap:10px}
.root-title{font-size:11px;color:var(--al);letter-spacing:1px;text-transform:uppercase;font-weight:700}
.rp-row{display:flex;gap:8px;flex-wrap:wrap}
.rp{padding:8px 14px;border-radius:10px;text-align:center;border:1px solid}
.rp-val{font-family:"JetBrains Mono",monospace;font-size:15px;font-weight:700}
.rp-mean{font-size:11px;margin-top:3px;opacity:.85}
.rp-pre{background:rgba(217,119,6,.12);border-color:rgba(217,119,6,.35);color:var(--al)}
.rp-rt{background:rgba(167,139,250,.12);border-color:rgba(167,139,250,.35);color:var(--purple)}
.rp-suf{background:rgba(96,165,250,.12);border-color:rgba(96,165,250,.35);color:var(--blue)}
.tip-box{background:rgba(217,119,6,.06);border:1px solid rgba(217,119,6,.2);border-radius:12px;padding:12px 14px}
.tip-label{font-size:11px;color:var(--al);font-weight:700;letter-spacing:.4px;text-transform:uppercase;margin-bottom:5px}
.tip-text{font-size:14px;color:var(--muted2);line-height:1.6}
.fam-row{display:flex;flex-wrap:wrap;gap:6px}
.fam-label{font-size:12px;color:var(--muted);margin-bottom:6px}
.fw{background:var(--s2);border:1px solid var(--border2);border-radius:8px;padding:5px 10px;font-size:13px;cursor:pointer}
.fw:active{border-color:var(--purple)}
/* lib */
.lib-tb{padding:16px 24px 8px;display:flex;gap:10px}
.search{flex:1;background:var(--s1);border:1px solid var(--border2);border-radius:12px;padding:10px 14px;font-size:14px;outline:none}
.search:focus{border-color:var(--accent)}
.lib-count{font-size:12px;color:var(--muted);padding:0 24px 10px}
.lib-list{flex:1;overflow-y:auto;padding:0 24px 24px;display:flex;flex-direction:column;gap:8px}
.lib-item{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer}
.lib-item:active{border-color:var(--accent)}
.li-word{font-family:"Playfair Display",serif;font-size:22px}
.li-info{font-size:12px;color:var(--muted);margin-top:2px}
.li-acts{display:flex;gap:4px}
.btn-del{font-size:16px;color:var(--red);padding:4px 6px}
.btn-spk{font-size:20px;padding:4px 6px}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--muted);padding:40px;text-align:center}
/* gram */
.gram-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
.gram-tb{padding:12px 20px 0;display:flex;gap:8px}
.gram-search{flex:1;background:var(--s1);border:1px solid var(--border2);border-radius:12px;padding:10px 14px;font-size:14px;outline:none}
.gram-search:focus{border-color:var(--accent)}
.gram-cats{display:flex;gap:6px;overflow-x:auto;padding:12px 20px 6px;scrollbar-width:none;flex-shrink:0}
.gram-cats::-webkit-scrollbar{display:none}
.gcat{background:var(--s2);border:1px solid var(--border2);color:var(--muted);padding:7px 14px;border-radius:20px;font-size:13px;white-space:nowrap;flex-shrink:0}
.gcat.on{background:var(--abg);border-color:var(--accent);color:var(--al);font-weight:600}
.gram-list{flex:1;overflow-y:auto;padding:8px 20px 100px;display:flex;flex-direction:column;gap:10px}
.gc{background:var(--s1);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.gc-head{padding:14px 16px;cursor:pointer;display:flex;align-items:flex-start;gap:10px}
.gc-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0;margin-top:2px;border:1px solid}
.bjh{background:rgba(34,197,94,.12);color:var(--green);border-color:rgba(34,197,94,.25)}
.bsh{background:rgba(96,165,250,.12);color:var(--blue);border-color:rgba(96,165,250,.25)}
.bph{background:rgba(217,119,6,.12);color:var(--al);border-color:rgba(217,119,6,.3)}
.gc-title{font-size:16px;font-weight:700;flex:1;line-height:1.4}
.gc-arr{font-size:14px;color:var(--muted);flex-shrink:0;transition:transform .2s}
.gc-arr.open{transform:rotate(180deg)}
.gc-body{padding:0 16px 16px;display:none;flex-direction:column;gap:10px}
.gc-body.open{display:flex}
.gc-formula{background:var(--s2);border-radius:10px;padding:10px 14px;font-family:"JetBrains Mono",monospace;font-size:14px;color:var(--al);line-height:1.6}
.gc-note{font-size:13px;color:var(--muted2);line-height:1.7}
.gc-exs{display:flex;flex-direction:column;gap:6px}
.gc-ex{background:var(--s2);border-left:3px solid var(--accent);border-radius:0 10px 10px 0;padding:10px 12px}
.gc-ex-en{font-size:14px;font-style:italic;line-height:1.5}
.gc-ex-zh{font-size:12px;color:var(--muted);margin-top:4px}
.gc-spk{color:var(--blue);font-size:12px;padding:4px 0;text-align:left;text-decoration:underline;cursor:pointer}
/* quiz */
.quiz-wrap{flex:1;display:flex;flex-direction:column;padding:20px 24px 32px;gap:12px;overflow-y:auto}
.qprog{height:3px;background:var(--border);border-radius:99px;overflow:hidden}
.qfill{height:100%;background:linear-gradient(90deg,var(--accent),var(--al));border-radius:99px;transition:width .4s}
.q-card{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:22px}
.q-label{font-size:11px;color:var(--muted2);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.q-word{font-family:"Playfair Display",serif;margin-bottom:5px}
.q-ph{font-family:"JetBrains Mono",monospace;font-size:13px;color:var(--muted)}
.opts{display:flex;flex-direction:column;gap:9px}
.opt{background:var(--s1);border:1px solid var(--border2);border-radius:14px;padding:15px 16px;font-size:15px;text-align:left}
.opt:active{transform:scale(.98)}
.opt.ok{background:rgba(34,197,94,.1);border-color:var(--green);color:var(--green)}
.opt.no{background:rgba(239,68,68,.1);border-color:var(--red);color:var(--red)}
.expl{background:var(--s2);border-radius:14px;padding:14px;font-size:14px;color:var(--muted2);line-height:1.6;border-left:3px solid var(--green)}
.btn-nq{background:var(--accent);color:#fff;border-radius:14px;padding:15px;font-size:16px;font-weight:700;width:100%}
.score{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;gap:14px}
.score-n{font-family:"Playfair Display",serif;font-size:56px;color:var(--al)}
.btn-retry{background:var(--accent);color:#fff;border-radius:14px;padding:14px 40px;font-size:16px;font-weight:700;margin-top:8px}
.sched-box{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:14px 20px;width:100%;text-align:left}
/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:flex-end;max-width:480px;margin:0 auto}
.modal{background:var(--s1);border-radius:24px 24px 0 0;padding:24px;width:100%;max-height:88dvh;overflow-y:auto;display:flex;flex-direction:column;gap:14px}
.m-word{font-family:"Playfair Display",serif;font-size:32px}
.m-close{background:var(--s2);border:1px solid var(--border2);color:var(--muted2);border-radius:12px;padding:12px;font-size:15px;font-weight:600;width:100%}
/* toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--s2);border:1px solid var(--border2);padding:10px 20px;border-radius:20px;font-size:14px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;max-width:320px;text-align:center;white-space:pre-line}
.toast.show{opacity:1}
#fb-load{position:fixed;inset:0;background:#1a1a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999}
</style>
</head>
<body>
<div id="fb-load">
  <div style="font-family:serif;font-size:36px;color:#f59e0b">Word<em>Lens</em></div>
  <div class="spin"></div>
  <div style="font-size:13px;color:#888">Loading...</div>
</div>
<div id="app">
  <div class="view show" id="v-home">
    <div class="hero">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div class="app-name">Word<em>Lens</em></div>
        <div class="sync-row"><span class="sdot" id="sdot"></span><span class="stxt" id="stxt">Loading</span></div>
      </div>
      <div class="app-sub">Photo · AI Etymology · Cloud Sync · SRS Quiz</div>
    </div>
    <div class="hdiv"></div>
    <div class="stats">
      <div class="stat"><div class="stat-n" id="h-total">0</div><div class="stat-l">Words</div></div>
      <div class="stat"><div class="stat-n" id="h-today">0</div><div class="stat-l">Today</div></div>
      <div class="stat"><div class="stat-n" id="h-quiz">0</div><div class="stat-l">Quizzes</div></div>
    </div>
    <div class="sec-h">Recent</div>
    <div class="rec-list" id="rec-list"></div>
  </div>
  <div class="view" id="v-add"><div class="add-wrap" id="add-wrap"></div></div>
  <div class="view" id="v-lib">
    <div class="lib-tb"><input class="search" id="lib-search" placeholder="Search..." oninput="filterLib(this.value)"/></div>
    <div class="lib-count" id="lib-count"></div>
    <div class="lib-list" id="lib-list"></div>
  </div>
  <div class="view" id="v-gram">
    <div class="gram-wrap">
      <div class="gram-tb"><input class="gram-search" id="gram-search" placeholder="Search grammar..." oninput="filterGram(this.value)"/></div>
      <div class="gram-cats" id="gram-cats"></div>
      <div class="gram-list" id="gram-list"></div>
    </div>
  </div>
  <div class="view" id="v-quiz"><div class="quiz-wrap" id="qc"></div></div>
  <nav>
    <button class="active" id="nb-home" onclick="goTab('home')"><span class="ni">&#127968;</span>Home</button>
    <button id="nb-add" onclick="goTab('add')"><span class="ni">&#128247;</span>Add</button>
    <button id="nb-lib" onclick="goTab('lib')"><span class="ni">&#128218;</span>Words</button>
    <button id="nb-gram" onclick="goTab('gram')"><span class="ni">&#128214;</span>Grammar</button>
    <button id="nb-quiz" onclick="goTab('quiz')"><span class="ni">&#9999;&#65039;</span>Quiz</button>
  </nav>
</div>
<div class="modal-bg" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-body"></div>
</div>
<div class="toast" id="toast"></div>
<script>
var LIB = window.LIB || [];

// ===== GRAMMAR DB =====
var GDB=[
{id:"g001",cat:"Tense",lv:"jh",title:"Simple Present",formula:"S + V(s/es) / S + am/is/are",note:"Habits, facts, routines. Add s/es for 3rd person singular.",
ex:[{en:"She drinks coffee every morning.",zh:""},{en:"The sun rises in the east.",zh:""},{en:"He does not like spicy food.",zh:""}]},
{id:"g002",cat:"Tense",lv:"jh",title:"Simple Past",formula:"S + V-ed / S + was/were",note:"Completed actions in the past.",
ex:[{en:"She visited her grandparents last weekend.",zh:""},{en:"He was very tired after the game.",zh:""},{en:"They did not come to the party.",zh:""}]},
{id:"g003",cat:"Tense",lv:"jh",title:"Future",formula:"S + will + V / S + be going to + V",note:"will: spontaneous/predictions. be going to: plans or evidence.",
ex:[{en:"I will call you later.",zh:""},{en:"She is going to study abroad next year.",zh:""},{en:"It is going to rain.",zh:""}]},
{id:"g004",cat:"Tense",lv:"jh",title:"Present Continuous",formula:"S + am/is/are + V-ing",note:"Actions happening now, or near-future plans.",
ex:[{en:"She is talking on the phone right now.",zh:""},{en:"They are watching a movie tonight.",zh:""}]},
{id:"g005",cat:"Tense",lv:"jh",title:"Present Perfect",formula:"S + have/has + p.p.",note:"Past actions with present relevance. Used with already, yet, ever, never, since, for.",
ex:[{en:"I have already finished my homework.",zh:""},{en:"She has never been to Japan.",zh:""},{en:"He has lived here for ten years.",zh:""}]},
{id:"g006",cat:"Tense",lv:"sh",title:"Past Perfect",formula:"S + had + p.p.",note:"Action completed before another past action.",
ex:[{en:"When I arrived, she had already left.",zh:""},{en:"He had never eaten sushi before that day.",zh:""}]},
{id:"g007",cat:"Tense",lv:"sh",title:"Future Perfect",formula:"S + will have + p.p.",note:"Action completed before a future point.",
ex:[{en:"By next year, I will have graduated.",zh:""},{en:"She will have finished the report by Monday.",zh:""}]},
{id:"g010",cat:"Passive",lv:"jh",title:"Present Passive",formula:"S + am/is/are + p.p. (+ by ...)",note:"Emphasises the receiver. Agent introduced by by (optional).",
ex:[{en:"English is spoken all over the world.",zh:""},{en:"The windows are cleaned every week.",zh:""}]},
{id:"g011",cat:"Passive",lv:"jh",title:"Past Passive",formula:"S + was/were + p.p. (+ by ...)",note:"Passive action in the past.",
ex:[{en:"The letter was sent yesterday.",zh:""},{en:"The building was destroyed by the earthquake.",zh:""}]},
{id:"g012",cat:"Passive",lv:"sh",title:"Perfect Passive",formula:"S + have/has/had + been + p.p.",note:"Present perfect passive or past perfect passive.",
ex:[{en:"The project has been completed.",zh:""},{en:"The message had been sent before he arrived.",zh:""}]},
{id:"g020",cat:"Comparative",lv:"jh",title:"Comparative",formula:"A + adj-er + than B / A + more + adj + than B",note:"Short adj: -er. Long adj: more. Irregular: good>better, bad>worse.",
ex:[{en:"She is taller than her brother.",zh:""},{en:"This exam is more difficult than the last one.",zh:""}]},
{id:"g021",cat:"Comparative",lv:"jh",title:"Superlative",formula:"the + adj-est / the most + adj",note:"Must use the. Expresses highest degree within a group.",
ex:[{en:"Mount Everest is the highest mountain in the world.",zh:""},{en:"She is the most talented student in our class.",zh:""}]},
{id:"g022",cat:"Comparative",lv:"jh",title:"Equative",formula:"as + adj/adv + as",note:"Equal degree. Negative: not as...as.",
ex:[{en:"He is as tall as his father.",zh:""},{en:"This movie is not as boring as I thought.",zh:""}]},
{id:"g030",cat:"Inf/Gerund",lv:"jh",title:"Infinitive to V",formula:"to + base verb",note:"After: want, hope, plan, decide, need, agree, refuse, promise.",
ex:[{en:"She wants to become a doctor.",zh:""},{en:"He decided to quit his job.",zh:""}]},
{id:"g031",cat:"Inf/Gerund",lv:"jh",title:"Gerund V-ing",formula:"V-ing (used as noun)",note:"After: enjoy, finish, keep, mind, avoid, suggest, practice, consider.",
ex:[{en:"She enjoys reading novels.",zh:""},{en:"He finished writing the essay.",zh:""}]},
{id:"g032",cat:"Inf/Gerund",lv:"sh",title:"Inf vs Gerund (different meaning)",formula:"remember/stop/try + to V or V-ing",note:"remember to V (to do) vs remember V-ing (recall doing). stop to V (in order to) vs stop V-ing (cease).",
ex:[{en:"Remember to lock the door.",zh:""},{en:"He stopped to rest. / He stopped smoking.",zh:""}]},
{id:"g040",cat:"Relative",lv:"jh",title:"who / which / that",formula:"antecedent + who/which/that + clause",note:"who: person. which: thing. that: person or thing (defining).",
ex:[{en:"The man who called you is my uncle.",zh:""},{en:"This is the book which changed my life.",zh:""}]},
{id:"g041",cat:"Relative",lv:"jh",title:"whose / whom",formula:"antecedent + whose + noun / antecedent + whom + clause",note:"whose: possessive. whom: objective case (formal).",
ex:[{en:"The girl whose bag was stolen called the police.",zh:""}]},
{id:"g042",cat:"Relative",lv:"sh",title:"Non-defining Relative",formula:"antecedent, which/who + clause",note:"Comma added. Adds extra info. which can refer to whole preceding clause.",
ex:[{en:"My sister, who lives in Tokyo, is a nurse.",zh:""},{en:"He passed the exam, which surprised everyone.",zh:""}]},
{id:"g050",cat:"Subjunctive",lv:"sh",title:"Unreal Present",formula:"If S + V-ed/were, S + would/could + V",note:"Contrary to present fact. be always uses were.",
ex:[{en:"If I were you, I would apologize.",zh:""},{en:"If she had more time, she could travel more.",zh:""}]},
{id:"g051",cat:"Subjunctive",lv:"sh",title:"Unreal Past",formula:"If S + had + p.p., S + would have + p.p.",note:"Contrary to past fact. Expresses regret.",
ex:[{en:"If I had studied harder, I would have passed.",zh:""}]},
{id:"g060",cat:"Participle",lv:"sh",title:"Present Participial",formula:"V-ing..., S + V",note:"Subject must match main clause. Simultaneous action or cause.",
ex:[{en:"Walking down the street, she met an old friend.",zh:""},{en:"Feeling tired, he went to bed early.",zh:""}]},
{id:"g061",cat:"Participle",lv:"sh",title:"Past Participial",formula:"p.p...., S + V",note:"Implies passive or completed meaning.",
ex:[{en:"Exhausted from the long journey, he fell asleep immediately.",zh:""}]},
{id:"g070",cat:"Inversion",lv:"sh",title:"Negative Adverb Inversion",formula:"Negative adverb + auxiliary + S + V",note:"never, seldom, hardly, not only at start: subject and auxiliary invert.",
ex:[{en:"Never have I seen such a beautiful sunset.",zh:""},{en:"Seldom does she complain about her work.",zh:""}]},
{id:"g071",cat:"Inversion",lv:"sh",title:"Only Inversion",formula:"Only + adverbial + auxiliary + S + V",note:"When only modifies adverbial at start, main clause inverts.",
ex:[{en:"Only then did I realize my mistake.",zh:""},{en:"Only by working hard can you succeed.",zh:""}]},
{id:"g080",cat:"Cleft",lv:"sh",title:"It is...that Cleft",formula:"It is/was + focus + that/who + rest",note:"Emphasises subject, object, or adverbial. Use who for person.",
ex:[{en:"It was Tom who broke the window.",zh:""},{en:"It is here that the accident happened.",zh:""}]},
{id:"g090",cat:"Causative",lv:"sh",title:"make / let / have",formula:"make/let/have + O + base verb",note:"make (force), let (allow), have (arrange for).",
ex:[{en:"She made him apologize to everyone.",zh:""},{en:"He let his children stay up late.",zh:""},{en:"She had her car repaired.",zh:""}]},
{id:"g091",cat:"Causative",lv:"sh",title:"get",formula:"get + O + to V / get + O + p.p.",note:"Active: to V. Passive: past participle.",
ex:[{en:"I got him to help me move the furniture.",zh:""},{en:"She got her hair cut yesterday.",zh:""}]},
{id:"g100",cat:"Sensory",lv:"sh",title:"Sensory Verb Pattern",formula:"see/hear/watch/feel + O + base V or V-ing",note:"Base verb: complete action. V-ing: in progress. Passive: to V.",
ex:[{en:"I saw him cross the road.",zh:""},{en:"She heard someone singing in the room.",zh:""}]},
{id:"g110",cat:"Conditional",lv:"jh",title:"Real Conditional (Type 1)",formula:"If S + V (present), S + will + V",note:"Possible real condition. No future tense in if-clause.",
ex:[{en:"If it rains tomorrow, we will cancel the trip.",zh:""},{en:"If you study hard, you will pass the exam.",zh:""}]},
{id:"g120",cat:"Tense Seq",lv:"sh",title:"Reported Speech Backshift",formula:"present -> past; will -> would; can -> could",note:"When main verb is past, that-clause verbs backshift. Scientific facts do not.",
ex:[{en:"I am tired. -> She said that she was tired.",zh:""},{en:"I will help. -> He promised that he would help.",zh:""}]},
{id:"p001",cat:"Phrasal",lv:"ph",title:"look: up/out/for/after/forward to",formula:"look up / look out / look for / look after / look forward to",note:"Common phrasal verbs with look.",
ex:[{en:"Look up the word in the dictionary. (search)",zh:""},{en:"Look out! (be careful)",zh:""},{en:"She looked after her sick mother. (care for)",zh:""},{en:"I am looking forward to seeing you. (anticipate)",zh:""}]},
{id:"p002",cat:"Phrasal",lv:"ph",title:"give: up/in/away/back",formula:"give up / give in / give away / give back",note:"Common phrasal verbs with give.",
ex:[{en:"Never give up on your dreams. (quit)",zh:""},{en:"He finally gave in to their demands. (yield)",zh:""},{en:"She gave away all her old clothes. (donate)",zh:""}]},
{id:"p003",cat:"Phrasal",lv:"ph",title:"take: off/over/up/care of",formula:"take off / take over / take up / take care of",note:"Common phrasal verbs with take.",
ex:[{en:"The plane takes off at 8 a.m. (depart)",zh:""},{en:"She took over the company. (assume control)",zh:""},{en:"He took up painting as a hobby. (begin)",zh:""}]},
{id:"p004",cat:"Phrasal",lv:"ph",title:"put: on/off/up with/away",formula:"put on / put off / put up with / put away",note:"Common phrasal verbs with put.",
ex:[{en:"Put on your coat. (wear)",zh:""},{en:"Do not put off what you can do today. (postpone)",zh:""},{en:"How can you put up with such noise? (tolerate)",zh:""}]},
{id:"p005",cat:"Phrasal",lv:"ph",title:"come: up with/across/down with",formula:"come up with / come across / come down with",note:"Common phrasal verbs with come.",
ex:[{en:"She came up with a brilliant idea. (think of)",zh:""},{en:"I came across an old friend. (encounter by chance)",zh:""},{en:"He came down with the flu. (become ill)",zh:""}]},
{id:"p006",cat:"Phrasal",lv:"ph",title:"get: along/over/rid of",formula:"get along with / get over / get rid of",note:"Common phrasal verbs with get.",
ex:[{en:"She gets along well with her colleagues. (have good relations)",zh:""},{en:"It took months to get over the breakup. (recover)",zh:""},{en:"We need to get rid of these old files. (eliminate)",zh:""}]},
{id:"p007",cat:"Phrasal",lv:"ph",title:"run: out of/into/for",formula:"run out of / run into / run for",note:"Common phrasal verbs with run.",
ex:[{en:"We have run out of sugar. (deplete)",zh:""},{en:"I ran into my old teacher. (meet by chance)",zh:""},{en:"She is running for president. (campaign)",zh:""}]},
{id:"p008",cat:"Phrasal",lv:"ph",title:"turn: on/off/down/out",formula:"turn on / turn off / turn down / turn out",note:"Common phrasal verbs with turn.",
ex:[{en:"Turn on the lights. (switch on)",zh:""},{en:"She turned down the job offer. (reject)",zh:""},{en:"Everything turned out well. (result)",zh:""}]},
{id:"p009",cat:"Phrasal",lv:"ph",title:"break: down/up/out",formula:"break down / break up / break out",note:"Common phrasal verbs with break.",
ex:[{en:"My car broke down on the highway. (malfunction)",zh:""},{en:"They broke up after three years. (end relationship)",zh:""},{en:"A fire broke out in the building. (start suddenly)",zh:""}]},
{id:"g130",cat:"Conjunction",lv:"jh",title:"Coordinating (FANBOYS)",formula:"for / and / nor / but / or / yet / so",note:"Connect equal words, phrases, or clauses.",
ex:[{en:"She is smart and hardworking.",zh:""},{en:"He tried hard, but he failed.",zh:""},{en:"Hurry up, or you will be late.",zh:""}]},
{id:"g131",cat:"Conjunction",lv:"jh",title:"Subordinating (Time)",formula:"when / while / before / after / since / until / as soon as",note:"Introduce adverbial clauses. No future tense in time clauses.",
ex:[{en:"Call me as soon as you arrive.",zh:""},{en:"While she was cooking, he was watching TV.",zh:""}]},
{id:"g132",cat:"Conjunction",lv:"sh",title:"Subordinating (Concession)",formula:"although / even though / even if / whereas",note:"Express concession or contrast. Cannot use although and but together.",
ex:[{en:"Although it was raining, she went for a run.",zh:""},{en:"Even if I had the money, I would not buy it.",zh:""}]},
{id:"g140",cat:"Special",lv:"jh",title:"so...that / such...that",formula:"so + adj + that / such + (a) + adj + N + that",note:"Express result consequence.",
ex:[{en:"She was so tired that she fell asleep immediately.",zh:""},{en:"It was such a hot day that we stayed indoors.",zh:""}]},
{id:"g141",cat:"Special",lv:"sh",title:"no sooner...than",formula:"No sooner had S + p.p. than... / Hardly had S + p.p. when...",note:"As soon as. Main clause inverts.",
ex:[{en:"No sooner had she sat down than the phone rang.",zh:""}]},
{id:"g142",cat:"Special",lv:"sh",title:"with + O + Participle",formula:"with + O + V-ing / p.p.",note:"Accompanying state. Active: V-ing. Passive: p.p.",
ex:[{en:"She sat there with her eyes closed.",zh:""},{en:"He walked into the room with music playing.",zh:""}]}
];

var GCATS=["All","Tense","Passive","Comparative","Inf/Gerund","Relative","Subjunctive","Participle","Inversion","Cleft","Causative","Sensory","Conditional","Tense Seq","Phrasal","Conjunction","Special"];
var gCat="All",gQ="";

function renderGram(){
  var cats=document.getElementById("gram-cats");cats.innerHTML="";
  GCATS.forEach(function(c){
    var b=document.createElement("button");b.className="gcat"+(c===gCat?" on":"");b.textContent=c;
    b.onclick=function(){gCat=c;document.querySelectorAll(".gcat").forEach(function(x){x.classList.toggle("on",x.textContent===c);});renderGList();};
    cats.appendChild(b);
  });
  renderGList();
}

function filterGram(q){gQ=q.toLowerCase();renderGList();}

function renderGList(){
  var items=GDB;
  if(gCat!=="All")items=items.filter(function(g){return g.cat===gCat;});
  if(gQ)items=items.filter(function(g){return g.title.toLowerCase().includes(gQ)||g.note.toLowerCase().includes(gQ)||g.formula.toLowerCase().includes(gQ)||g.ex.some(function(e){return e.en.toLowerCase().includes(gQ);});});
  var el=document.getElementById("gram-list");el.innerHTML="";
  if(!items.length){var emp=document.createElement("div");emp.className="empty";emp.textContent="No matches";el.appendChild(emp);return;}
  items.forEach(function(g){
    var card=document.createElement("div");card.className="gc";
    var head=document.createElement("div");head.className="gc-head";
    var bc=g.lv==="jh"?"bjh":g.lv==="sh"?"bsh":"bph";
    var bt=g.lv==="jh"?"JH":g.lv==="sh"?"SH":"PV";
    var badge=document.createElement("span");badge.className="gc-badge "+bc;badge.textContent=bt;
    var title=document.createElement("div");title.className="gc-title";title.textContent=g.title;
    var arr=document.createElement("span");arr.className="gc-arr";arr.id="ga-"+g.id;arr.textContent="▼";
    head.appendChild(badge);head.appendChild(title);head.appendChild(arr);
    var body=document.createElement("div");body.className="gc-body";body.id="gb-"+g.id;
    var form=document.createElement("div");form.className="gc-formula";form.textContent=g.formula;
    var note=document.createElement("div");note.className="gc-note";note.textContent=g.note;
    var exs=document.createElement("div");exs.className="gc-exs";
    g.ex.forEach(function(e){
      var ex=document.createElement("div");ex.className="gc-ex";
      var en=document.createElement("div");en.className="gc-ex-en";en.textContent=e.en;
      var spk=document.createElement("button");spk.className="gc-spk";spk.textContent="🔊 Listen";
      var enText=e.en.split("->")[0].split("(")[0].trim();
      spk.onclick=function(){speak(enText);};
      ex.appendChild(en);ex.appendChild(spk);
      exs.appendChild(ex);
    });
    body.appendChild(form);body.appendChild(note);body.appendChild(exs);
    head.onclick=function(){
      var open=body.classList.toggle("open");
      arr.classList.toggle("open",open);
    };
    card.appendChild(head);card.appendChild(body);
    el.appendChild(card);
  });
}

function getSRS(w){return w.srs||{level:0,due:0,skip:false};}
function setSRS(word,ok){
  var w=LIB.find(function(x){return x.word===word;});if(!w)return;
  if(!w.srs)w.srs={level:0,due:0,skip:false};
  var gaps=[0,3600,28800,86400,259200,604800,1209600,2592000,7776000];
  if(ok){w.srs.level=Math.min(w.srs.level+1,8);w.srs.due=Date.now()+(gaps[w.srs.level]||86400)*1000;}
  else{w.srs.level=Math.max(0,w.srs.level-2);w.srs.due=Date.now()+300000;}
  saveData();
}
function setFreq(word,action){
  var w=LIB.find(function(x){return x.word===word;});if(!w)return;
  if(!w.srs)w.srs={level:0,due:0,skip:false};
  if(action==="boost"){w.srs.level=0;w.srs.due=0;w.srs.skip=false;toast("Boosted: "+word);}
  else if(action==="reduce"){w.srs.level=6;w.srs.due=Date.now()+604800000;w.srs.skip=false;toast("Reduced: "+word);}
  else{w.srs.skip=true;toast("Paused: "+word);}
  saveData();
}
function getPool(){
  var now=Date.now();
  var due=LIB.filter(function(w){return!getSRS(w).skip&&getSRS(w).due<=now;});
  var fresh=LIB.filter(function(w){var s=getSRS(w);return!s.skip&&s.level===0&&s.due>now;});
  var rest=LIB.filter(function(w){var s=getSRS(w);return!s.skip&&s.level>0&&s.due>now;});
  return shuffle(due).concat(shuffle(fresh)).concat(shuffle(rest)).slice(0,Math.min(15,LIB.length));
}
function getDist(excl,count){
  var lw={};LIB.forEach(function(w){lw[w.word.toLowerCase()]=true;});
  var pool=DIST.filter(function(d){return!lw[d.word.toLowerCase()]&&excl.indexOf(d.word)===-1;});
  return shuffle(pool).slice(0,count);
}
function makeQ(w){
  var types=["en2zh","zh2en","example"];
  var type=types[Math.floor(Math.random()*types.length)];
  if(type==="example"&&!w.example_en)type="en2zh";
  var lp=shuffle(LIB.filter(function(x){return x.word!==w.word;}));
  function buildOpts(correct,libW){
    var need=3-libW.length;
    var d=getDist([correct.word].concat(libW.map(function(x){return x.word;})),need).map(function(x){return{word:x.word,zh:x.zh,inLib:false};});
    return shuffle([correct].concat(libW).concat(d)).slice(0,4);
  }
  if(type==="en2zh"){
    var lw=lp.filter(function(x){return x.zh!==w.zh;}).slice(0,2).map(function(x){return{word:x.word,zh:x.zh,inLib:true};});
    var ao=buildOpts({word:w.word,zh:w.zh,inLib:true},lw);
    return{type:type,word:w.word,prompt:w.word,sub:w.phonetic||"",q:"What does this word mean?",correct:w.zh,ao:ao,opts:ao.map(function(o){return o.zh;}),ex:w.example_en||"",exzh:w.example_zh||""};
  }
  if(type==="zh2en"){
    var lw2=lp.slice(0,2).map(function(x){return{word:x.word,zh:x.zh,inLib:true};});
    var ao2=buildOpts({word:w.word,zh:w.zh,inLib:true},lw2);
    return{type:type,word:w.word,prompt:w.zh,sub:w.en_def||"",q:"Which English word matches?",correct:w.word,ao:ao2,opts:ao2.map(function(o){return o.word;}),ex:w.example_en||"",exzh:w.example_zh||""};
  }
  var blank=(w.example_en||"").replace(new RegExp(w.word,"gi"),"_____");
  var lw3=lp.slice(0,2).map(function(x){return{word:x.word,zh:x.zh,inLib:true};});
  var ao3=buildOpts({word:w.word,zh:w.zh,inLib:true},lw3);
  return{type:type,word:w.word,prompt:blank,sub:w.example_zh||"",q:"Fill in the blank:",correct:w.word,ao:ao3,opts:ao3.map(function(o){return o.word;}),ex:w.example_en||"",exzh:w.example_zh||""};
}

function renderQuiz(){
  var qc=document.getElementById("qc");qc.innerHTML="";
  var pool=getPool();
  if(pool.length<4){
    var emp=document.createElement("div");emp.className="empty";
    emp.innerHTML="<div style='font-size:48px'>📚</div><div style='font-size:18px;font-weight:700'>Not enough words</div><div style='font-size:14px'>Need 4+. Have "+LIB.length+".</div>";
    var ab=document.createElement("button");ab.className="btn-p";ab.textContent="Add Words";ab.style.marginTop="12px";ab.onclick=function(){goTab("add");};
    emp.appendChild(ab);qc.appendChild(emp);return;
  }
  QST.qs=pool.map(function(w){return makeQ(w);}).filter(Boolean);
  QST.idx=0;QST.score=0;QST.ans=false;QST.wrong=[];renderQ();
}

function renderQ(){
  var qc=document.getElementById("qc");qc.innerHTML="";
  var q=QST.qs[QST.idx];if(!q){renderScore();return;}
  var pct=(QST.idx/QST.qs.length)*100;
  var tc=q.type==="en2zh"?"var(--al)":q.type==="zh2en"?"var(--blue)":"var(--purple)";
  var tl=q.type==="en2zh"?"EN -> Meaning":q.type==="zh2en"?"Meaning -> EN":"Fill Blank";
  var fs=q.type==="example"?"17px":"34px";

  var prog=document.createElement("div");prog.className="qprog";
  var fill=document.createElement("div");fill.className="qfill";fill.style.width=pct+"%";prog.appendChild(fill);

  var info=document.createElement("div");info.style.cssText="display:flex;justify-content:space-between;align-items:center";
  var tspan=document.createElement("span");tspan.style.cssText="font-size:11px;font-weight:700;letter-spacing:.5px;color:"+tc;tspan.textContent=tl;
  var nspan=document.createElement("span");nspan.style.cssText="font-size:12px;color:var(--muted)";nspan.textContent=(QST.idx+1)+" / "+QST.qs.length;
  info.appendChild(tspan);info.appendChild(nspan);

  var card=document.createElement("div");card.className="q-card";
  var qlabel=document.createElement("div");qlabel.className="q-label";qlabel.textContent=q.q;
  var qword=document.createElement("div");qword.className="q-word";qword.style.fontSize=fs;qword.style.lineHeight="1.4";qword.textContent=q.prompt;
  card.appendChild(qlabel);card.appendChild(qword);
  if(q.sub){var qph=document.createElement("div");qph.className="q-ph";qph.style.marginTop="6px";qph.textContent=q.sub;card.appendChild(qph);}

  var opts=document.createElement("div");opts.className="opts";
  q.opts.forEach(function(o){
    var ob=document.createElement("button");ob.className="opt";ob.textContent=o;
    ob.onclick=function(){ansQ(ob,o,q);};
    opts.appendChild(ob);
  });

  var fb=document.createElement("div");fb.id="qfb";fb.style.display="none";
  var nxt=document.createElement("div");nxt.id="qnxt";nxt.style.display="none";
  var nb=document.createElement("button");nb.className="btn-nq";nb.textContent=QST.idx+1<QST.qs.length?"Next ->":"See Results";nb.onclick=function(){QST.idx++;QST.ans=false;renderQ();};
  nxt.appendChild(nb);

  qc.appendChild(prog);qc.appendChild(info);qc.appendChild(card);qc.appendChild(opts);qc.appendChild(fb);qc.appendChild(nxt);
}

function ansQ(btn,chosen,q){
  if(QST.ans)return;QST.ans=true;QST.word=q.word;QST.opts=q.ao||[];
  document.querySelectorAll(".opt").forEach(function(b){b.disabled=true;});
  var ok=chosen===q.correct;
  if(ok){btn.classList.add("ok");QST.score++;}
  else{btn.classList.add("no");document.querySelectorAll(".opt").forEach(function(b){if(b.textContent.trim()===q.correct)b.classList.add("ok");});QST.wrong.push(q.word);}
  setSRS(q.word,ok);speak(q.word);
  var wObj=LIB.find(function(x){return x.word===q.word;})||{};
  var lv=getSRS(wObj).level;
  var lc=ok?"var(--green)":"var(--red)";
  var lt=(ok?"Correct +1":"Wrong -2")+" (Lv."+lv+")";

  var fb=document.getElementById("qfb");fb.style.display="block";
  var expl=document.createElement("div");expl.className="expl";

  var lvDiv=document.createElement("div");lvDiv.style.cssText="font-size:12px;font-weight:600;margin-bottom:10px;color:"+lc;lvDiv.textContent=lt;expl.appendChild(lvDiv);

  var allLabel=document.createElement("div");allLabel.style.cssText="font-size:11px;color:var(--muted);text-transform:uppercase;font-weight:700;margin-bottom:8px";allLabel.textContent="All Options";expl.appendChild(allLabel);

  QST.opts.forEach(function(opt,i){
    var ic=(q.type==="en2zh")?opt.zh===q.correct:opt.word===q.correct;
    var inLib=opt.inLib||LIB.some(function(l){return l.word.toLowerCase()===opt.word.toLowerCase();});
    var row=document.createElement("div");row.style.cssText="background:var(--s2);border:1px solid "+(ic?"var(--green)":"var(--border2)")+";border-radius:10px;padding:9px 12px;display:flex;align-items:center;gap:8px;margin-bottom:6px";
    var info=document.createElement("div");info.style.flex="1";
    var wspan=document.createElement("span");wspan.style.cssText="font-family:serif;font-size:16px;color:"+(ic?"var(--green)":"var(--text)");wspan.textContent=opt.word;
    var zspan=document.createElement("span");zspan.style.cssText="font-size:12px;color:var(--muted);margin-left:8px";zspan.textContent=opt.zh;
    info.appendChild(wspan);info.appendChild(zspan);
    if(!inLib){var nb=document.createElement("span");nb.style.cssText="font-size:10px;color:var(--blue);background:rgba(96,165,250,.1);border:1px solid rgba(96,165,250,.25);border-radius:10px;padding:1px 6px;margin-left:5px";nb.textContent="New";info.appendChild(nb);}
    row.appendChild(info);
    if(!inLib){
      var ab=document.createElement("button");ab.style.cssText="background:var(--accent);color:#fff;border:none;border-radius:8px;padding:4px 10px;font-size:12px;white-space:nowrap;flex-shrink:0;cursor:pointer";ab.textContent="+ Add";
      (function(idx,b){b.onclick=function(){quickAdd(idx,b);};})(i,ab);
      row.appendChild(ab);
    }
    expl.appendChild(row);
  });

  if(q.ex){var exb=document.createElement("div");exb.style.cssText="background:var(--s2);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:10px 12px;margin-top:8px";var exen=document.createElement("div");exen.style.cssText="font-style:italic;font-size:14px";exen.textContent=q.ex;var exzh=document.createElement("div");exzh.style.cssText="font-size:12px;color:var(--muted);margin-top:4px";exzh.textContent=q.exzh;exb.appendChild(exen);exb.appendChild(exzh);expl.appendChild(exb);}

  var freqRow=document.createElement("div");freqRow.style.cssText="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap";
  var freqBtns=[["Boost","boost","rgba(217,119,6,.15)","var(--al)"],["Reduce","reduce","var(--s2)","var(--muted2)"],["Pause","skip","rgba(239,68,68,.08)","var(--red)"]];
  freqBtns.forEach(function(f){
    var fb2=document.createElement("button");fb2.style.cssText="background:"+f[2]+";border:1px solid var(--border2);color:"+f[3]+";border-radius:8px;padding:5px 10px;font-size:12px;cursor:pointer";
    fb2.textContent=f[0];
    (function(action){fb2.onclick=function(){setFreq(QST.word,action);};})(f[1]);
    freqRow.appendChild(fb2);
  });
  expl.appendChild(freqRow);

  fb.appendChild(expl);
  document.getElementById("qnxt").style.display="block";
}

function quickAdd(idx,btn){
  var opt=QST.opts[idx];if(!opt)return;
  if(LIB.some(function(l){return l.word.toLowerCase()===opt.word.toLowerCase();})){toast("Already in library");return;}
  checkDay();
  LIB.push({word:opt.word,phonetic:"",pos:"",zh:opt.zh,en_def:"",example_en:"",example_zh:"",roots:[],root_tip:"",family_words:[],memory_tip:"",level:"",source:"quiz",addedAt:Date.now()});
  ST.today++;saveData();saveSt();
  btn.textContent="Done!";btn.style.background="var(--green)";btn.disabled=true;
  toast("Added: "+opt.word+"\nGo to Add tab for full analysis");
}

function renderScore(){
  ST.quiz++;saveSt();
  var total=QST.qs.length;var pct=Math.round((QST.score/total)*100);
  var emoji=pct>=80?"🏆":pct>=60?"💪":"📚";
  var msg=pct>=80?"Excellent!":pct>=60?"Good job!":"Keep practising!";
  var dn=LIB.filter(function(w){return!getSRS(w).skip&&getSRS(w).due<=Date.now();}).length;
  var dt=LIB.filter(function(w){var s=getSRS(w);return!s.skip&&s.due>Date.now()&&s.due<=Date.now()+86400000;}).length;
  var qc=document.getElementById("qc");qc.innerHTML="";
  var sc=document.createElement("div");sc.className="score";
  var em=document.createElement("div");em.style.fontSize="64px";em.textContent=emoji;
  var sn=document.createElement("div");sn.className="score-n";sn.textContent=pct+"%";
  var ss=document.createElement("div");ss.style.cssText="font-size:15px;color:var(--muted)";ss.textContent=QST.score+" / "+total+" correct";
  var sm=document.createElement("div");sm.style.cssText="font-size:17px;font-weight:700";sm.textContent=msg;
  sc.appendChild(em);sc.appendChild(sn);sc.appendChild(ss);
  if(QST.wrong.length){var wr=document.createElement("div");wr.style.cssText="font-size:13px;color:var(--red)";wr.textContent="Wrong: "+QST.wrong.join(", ");sc.appendChild(wr);}
  sc.appendChild(sm);
  var sbox=document.createElement("div");sbox.className="sched-box";
  var slbl=document.createElement("div");slbl.style.cssText="font-size:11px;color:var(--muted);margin-bottom:8px;font-weight:700;text-transform:uppercase";slbl.textContent="Review Schedule";
  var s1=document.createElement("div");s1.style.fontSize="14px";s1.textContent="🔴 Due now: "+dn;
  var s2=document.createElement("div");s2.style.cssText="font-size:14px;margin-top:4px";s2.textContent="🟡 Due today: "+dt;
  var s3=document.createElement("div");s3.style.cssText="font-size:14px;margin-top:4px";s3.textContent="📚 Active: "+LIB.filter(function(w){return!getSRS(w).skip;}).length;
  sbox.appendChild(slbl);sbox.appendChild(s1);sbox.appendChild(s2);sbox.appendChild(s3);
  var rb=document.createElement("button");rb.className="btn-retry";rb.textContent="Continue Quiz";rb.onclick=renderQuiz;
  sc.appendChild(sbox);sc.appendChild(rb);
  qc.appendChild(sc);renderHome();
}

// ===== INIT =====
function startApp(){
  if(window._lib)LIB=window._lib;
  if(window._st)ST=window._st;
  var ld=document.getElementById("fb-load");if(ld)ld.style.display="none";
  syncUI(false);renderHome();
}
if(window._fbReady){startApp();}
else{window._onFbReady=startApp;setTimeout(function(){if(!window._fbReady){console.warn("Firebase timeout");startApp();}},3000);}
</script>
</body>
</html>
