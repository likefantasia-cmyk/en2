<!DOCTYPE html>

<html lang="zh-TW"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="WordLens">
<meta name="theme-color" content="#0d0f14">
<title>WordLens</title>
<link href="./index_files/css2" rel="stylesheet">
<style>
:root{
  --bg:#0d0f14; --s1:#13161e; --s2:#191d28; --s3:#1f2435;
  --border:#272c3d; --border2:#32394f;
  --accent:#e8a020; --accent2:#3d9fff; --green:#2ecc71; --red:#e74c3c; --purple:#9b59b6;
  --text:#f0eff4; --muted:#8892a4; --muted2:#b0bac8;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;overflow:hidden}
button{cursor:pointer;font-family:'Noto Sans TC',sans-serif;border:none}
input,textarea{font-family:'Noto Sans TC',sans-serif}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}

/* ── Shell ── */
#app{max-width:480px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* ── Nav ── */
nav{display:flex;background:var(--s1);border-top:1px solid var(--border);order:2;flex-shrink:0}
nav button{flex:1;padding:10px 2px 12px;font-size:10px;font-weight:600;background:none;color:var(--muted);letter-spacing:.3px;text-transform:uppercase;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .2s}
nav button .ni{font-size:20px}
nav button.active{color:var(--accent)}

/* ── Views ── */
.view{flex:1;overflow-y:auto;display:none;flex-direction:column}
.view.show{display:flex}

/* ── Home ── */
.home-hero{padding:48px 24px 20px;background:linear-gradient(160deg,#0d0f14 0%,#13161e 60%,#191520 100%)}
.app-name{font-family:'Playfair Display',serif;font-size:42px;color:var(--text);letter-spacing:-1px}
.app-name span{color:var(--accent);font-style:italic}
.app-sub{font-size:13px;color:var(--muted);margin-top:6px}

.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:16px 24px}
.stat{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:14px 10px;text-align:center}
.stat-n{font-family:'Playfair Display',serif;font-size:32px;color:var(--accent)}
.stat-l{font-size:11px;color:var(--muted);margin-top:2px}

.home-section{padding:0 24px 8px;font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;font-weight:700}
.recent-list{padding:0 24px 16px;display:flex;flex-direction:column;gap:8px}
.recent-item{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:13px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s}
.recent-item:active{border-color:var(--accent)}
.ri-word{font-family:'Playfair Display',serif;font-size:20px;flex:1}
.ri-zh{font-size:12px;color:var(--muted);margin-top:2px}
.ri-badge{font-size:11px;color:var(--accent);background:rgba(232,160,32,.12);border:1px solid rgba(232,160,32,.25);padding:2px 8px;border-radius:20px;white-space:nowrap}

/* ── Camera / Add ── */
.add-wrap{flex:1;display:flex;flex-direction:column;padding:20px 24px;gap:14px;overflow-y:auto}
.section-label{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;font-weight:700;margin-bottom:6px}

.camera-zone{background:var(--s1);border:2px dashed var(--border2);border-radius:20px;padding:0;overflow:hidden;position:relative;cursor:pointer;min-height:180px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;transition:border-color .2s}
.camera-zone:active{border-color:var(--accent)}
.camera-zone img{width:100%;height:auto;display:block;border-radius:18px}
.camera-zone.has-img{border-style:solid;border-color:var(--border2)}
#cam-input{position:absolute;inset:0;opacity:0;cursor:pointer}
.cam-hint{font-size:14px;color:var(--muted);text-align:center}
.cam-icon{font-size:40px}

.btn-primary{background:var(--accent);color:#0d0f14;border-radius:14px;padding:15px;font-size:16px;font-weight:700;width:100%;transition:opacity .15s}
.btn-primary:active{opacity:.8}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}

.btn-secondary{background:var(--s2);border:1px solid var(--border2);color:var(--muted2);border-radius:14px;padding:13px;font-size:15px;font-weight:600;width:100%}

.manual-input{background:var(--s1);border:1px solid var(--border2);border-radius:14px;padding:14px 16px;font-size:16px;color:var(--text);outline:none;width:100%;transition:border-color .2s}
.manual-input:focus{border-color:var(--accent)}

.loading-card{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:28px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px}
.spinner{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-msg{font-size:14px;color:var(--muted2)}

/* ── Word Detail Card ── */
.word-detail{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:22px;display:flex;flex-direction:column;gap:0}
.wd-tag{display:inline-flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.tag{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;letter-spacing:.4px;text-transform:uppercase}
.tag-cat{color:var(--accent2);background:rgba(61,159,255,.12);border:1px solid rgba(61,159,255,.25)}
.tag-src{color:var(--purple);background:rgba(155,89,182,.12);border:1px solid rgba(155,89,182,.25)}
.wd-word{font-family:'Playfair Display',serif;font-size:40px;line-height:1}
.wd-ph{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--muted);margin-top:5px}
.wd-pos{font-size:12px;color:var(--accent);font-weight:700;margin-top:12px;letter-spacing:.5px;text-transform:uppercase}
.wd-zh{font-size:24px;font-weight:700;margin-top:4px}
.wd-en{font-size:14px;color:var(--muted2);margin-top:3px;line-height:1.5}

.ex-block{background:var(--s2);border-left:3px solid var(--accent2);border-radius:0 12px 12px 0;padding:12px 14px;margin-top:14px}
.ex-en{font-size:15px;line-height:1.6;font-style:italic}
.ex-zh{font-size:13px;color:var(--muted);margin-top:5px;line-height:1.5}

/* ── Root Analysis ── */
.root-card{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:22px}
.root-title{font-size:11px;color:var(--purple);letter-spacing:1px;text-transform:uppercase;font-weight:700;margin-bottom:14px}
.root-parts{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.root-part{padding:8px 14px;border-radius:10px;text-align:center}
.root-part .rp-val{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600}
.root-part .rp-mean{font-size:11px;margin-top:3px;opacity:.8}
.root-prefix{background:rgba(232,160,32,.1);border:1px solid rgba(232,160,32,.3);color:var(--accent)}
.root-root{background:rgba(155,89,182,.1);border:1px solid rgba(155,89,182,.3);color:var(--purple)}
.root-suffix{background:rgba(61,159,255,.1);border:1px solid rgba(61,159,255,.3);color:var(--accent2)}

.root-family{margin-top:4px}
.root-family-title{font-size:12px;color:var(--muted);margin-bottom:8px}
.root-family-words{display:flex;flex-wrap:wrap;gap:6px}
.family-word{background:var(--s2);border:1px solid var(--border2);border-radius:8px;padding:5px 10px;font-size:13px;cursor:pointer;transition:border-color .15s}
.family-word:active{border-color:var(--purple)}

.tip-card{background:rgba(232,160,32,.06);border:1px solid rgba(232,160,32,.2);border-radius:16px;padding:14px 16px}
.tip-label{font-size:11px;color:var(--accent);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px}
.tip-text{font-size:14px;color:var(--muted2);line-height:1.6}

.word-actions{display:flex;gap:10px;margin-top:4px}
.btn-speak{flex:1;background:rgba(61,159,255,.1);border:1px solid rgba(61,159,255,.25);color:var(--accent2);border-radius:12px;padding:11px;font-size:14px;font-weight:600}
.btn-star{width:46px;background:rgba(232,160,32,.1);border:1px solid rgba(232,160,32,.25);color:var(--accent);border-radius:12px;font-size:18px}
.btn-star.on{background:rgba(232,160,32,.25)}
.btn-save-word{flex:1;background:var(--green);color:#fff;border-radius:12px;padding:11px;font-size:14px;font-weight:700}

/* ── Library ── */
.lib-toolbar{padding:14px 24px 8px;display:flex;gap:10px;align-items:center}
.search-input{flex:1;background:var(--s1);border:1px solid var(--border2);border-radius:12px;padding:10px 14px;font-size:14px;color:var(--text);outline:none}
.search-input:focus{border-color:var(--accent)}
.lib-count{font-size:12px;color:var(--muted);padding:0 24px 10px}
.lib-list{flex:1;overflow-y:auto;padding:0 24px 24px;display:flex;flex-direction:column;gap:8px}
.lib-item{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s}
.lib-item:active{border-color:var(--accent)}
.li-word{font-family:'Playfair Display',serif;font-size:22px;flex:1}
.li-info{font-size:12px;color:var(--muted);margin-top:2px}
.li-actions{display:flex;gap:6px}
.btn-li-speak{background:none;border:none;font-size:20px;padding:4px 6px}
.btn-li-del{background:none;border:none;font-size:16px;color:var(--red);padding:4px 6px}
.empty-lib{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--muted);padding:40px;text-align:center}

/* ── Quiz ── */
.quiz-wrap{flex:1;display:flex;flex-direction:column;padding:20px 24px 32px;gap:12px;overflow-y:auto}
.quiz-prog-bar{height:3px;background:var(--border);border-radius:99px;overflow:hidden}
.quiz-prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width .4s}
.quiz-q-card{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:22px}
.quiz-ql{font-size:11px;color:var(--muted2);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.quiz-word{font-family:'Playfair Display',serif;font-size:36px;margin-bottom:5px}
.quiz-ph{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--muted)}
.opts{display:flex;flex-direction:column;gap:9px}
.opt{background:var(--s1);border:1px solid var(--border2);border-radius:14px;padding:15px 16px;font-size:15px;color:var(--text);text-align:left;transition:all .12s}
.opt:active{transform:scale(.98)}
.opt.ok{background:rgba(46,204,113,.1);border-color:var(--green);color:var(--green)}
.opt.no{background:rgba(231,76,60,.1);border-color:var(--red);color:var(--red)}
.explain-box{background:var(--s2);border-radius:14px;padding:14px;font-size:14px;color:var(--muted2);line-height:1.6;border-left:3px solid var(--green)}
.explain-box .exq{font-style:italic;color:var(--text);margin-bottom:5px}
.btn-nq{background:var(--accent);color:#0d0f14;border-radius:14px;padding:15px;font-size:16px;font-weight:700;width:100%}
.score-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;gap:14px}
.score-emoji{font-size:64px}
.score-n{font-family:'Playfair Display',serif;font-size:56px;color:var(--accent)}
.score-sub{font-size:15px;color:var(--muted)}
.score-msg{font-size:17px;font-weight:700}
.btn-retry{background:var(--accent);color:#0d0f14;border-radius:14px;padding:14px 40px;font-size:16px;font-weight:700;margin-top:8px}
.quiz-need-more{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:40px;text-align:center}

/* ── Modal overlay ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:flex-end;max-width:480px;margin:0 auto}
.modal{background:var(--s1);border-radius:24px 24px 0 0;padding:24px;width:100%;max-height:85dvh;overflow-y:auto;display:flex;flex-direction:column;gap:14px}
.modal-title{font-family:'Playfair Display',serif;font-size:26px}
.modal-close{background:var(--s2);border:1px solid var(--border2);color:var(--muted2);border-radius:12px;padding:12px;font-size:15px;font-weight:600;width:100%}

/* ── Notify toast ── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--s2);border:1px solid var(--border2);color:var(--text);padding:10px 20px;border-radius:20px;font-size:14px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;max-width:320px;text-align:center}
.toast.show{opacity:1}

/* ── API key prompt ── */
.api-prompt{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:22px;display:flex;flex-direction:column;gap:12px}
.api-label{font-size:13px;color:var(--muted2);line-height:1.6}
.api-input{background:var(--s2);border:1px solid var(--border2);border-radius:12px;padding:12px 14px;font-size:14px;color:var(--text);outline:none;width:100%;font-family:'JetBrains Mono',monospace}
.api-input:focus{border-color:var(--accent)}
.mode-tab{flex:1;background:var(--s2);border:1px solid var(--border2);color:var(--muted);border-radius:10px;padding:9px 6px;font-size:13px;font-weight:600;transition:all .15s}
.mode-tab.active-tab{background:rgba(232,160,32,.12);border-color:var(--accent);color:var(--accent)}
.cam-btn{flex:1;background:var(--s2);border:1px solid var(--border2);color:var(--muted2);border-radius:12px;padding:13px;font-size:15px;font-weight:600;transition:all .15s}
.cam-btn:active{border-color:var(--accent);color:var(--accent)}
</style>
</head>
<body>
<div id="app">

  <!-- ── HOME ── -->
  <div class="view show" id="v-home">
    <div class="home-hero">
      <div class="app-name">Word<span>Lens</span></div>
      <div class="app-sub">拍照・AI 分析・字根字首・個人單字庫</div>
    </div>
    <div class="stats-grid">
      <div class="stat"><div class="stat-n" id="h-total">0</div><div class="stat-l">我的單字</div></div>
      <div class="stat"><div class="stat-n" id="h-today">0</div><div class="stat-l">今日新增</div></div>
      <div class="stat"><div class="stat-n" id="h-quiz">0</div><div class="stat-l">測驗次數</div></div>
    </div>
    <div class="home-section">最近新增</div>
    <div class="recent-list" id="recent-list"><div style="text-align:center;color:var(--muted);padding:24px;font-size:14px">還沒有單字，去拍照新增吧！📸</div></div>
  </div>

  <!-- ── ADD / CAMERA ── -->
  <div class="view" id="v-add">
    <div class="add-wrap" id="add-wrap">
      <!-- API Key check rendered here -->
    </div>
  </div>

  <!-- ── LIBRARY ── -->
  <div class="view" id="v-lib">
    <div class="lib-toolbar">
      <input class="search-input" placeholder="🔍 搜尋單字..." oninput="filterLib(this.value)" id="lib-search">
    </div>
    <div class="lib-count" id="lib-count"></div>
    <div class="lib-list" id="lib-list"></div>
  </div>

  <!-- ── QUIZ ── -->
  <div class="view" id="v-quiz">
    <div id="quiz-content" class="quiz-wrap"></div>
  </div>

  <!-- ── NAV ── -->
  <nav>
    <button class="active" onclick="goTab(&#39;home&#39;)"><span class="ni">🏠</span>首頁</button>
    <button onclick="goTab(&#39;add&#39;)"><span class="ni">📸</span>新增</button>
    <button onclick="goTab(&#39;lib&#39;)"><span class="ni">📚</span>單字庫</button>
    <button onclick="goTab(&#39;quiz&#39;)"><span class="ni">✏️</span>測驗</button>
  </nav>
</div>

<!-- Modal -->
<div class="modal-bg" id="modal" style="display:none" onclick="closeModal(event)">
  <div class="modal" id="modal-body"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════
//  State & Storage
// ══════════════════════════════
let library = JSON.parse(localStorage.getItem('wl-lib') || '[]');
let stats   = JSON.parse(localStorage.getItem('wl-stats') || '{"quiz":0,"today":0,"date":""}');
let apiKey  = localStorage.getItem('wl-key') || '';
let currentWord = null; // word being previewed before saving
let quizState = { words:[], idx:0, score:0, answered:false };

function saveLib(){ localStorage.setItem('wl-lib', JSON.stringify(library)); }
function saveSt() { localStorage.setItem('wl-stats', JSON.stringify(stats)); }
function saveKey(k){ apiKey=k; localStorage.setItem('wl-key', k); }

function todayStr(){ return new Date().toDateString(); }
function ensureToday(){ if(stats.date !== todayStr()){ stats.today=0; stats.date=todayStr(); saveSt(); } }

function toast(msg, dur=2200){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), dur);
}

function speak(text){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = 0.82;
  window.speechSynthesis.speak(u);
}

function shuffle(a){ return [...a].sort(()=>Math.random()-.5); }

// ══════════════════════════════
//  Tab navigation
// ══════════════════════════════
function goTab(tab){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('show'));
  document.querySelectorAll('nav button').forEach((b,i)=>b.classList.toggle('active',['home','add','lib','quiz'][i]===tab));
  document.getElementById('v-'+tab).classList.add('show');
  if(tab==='home') renderHome();
  if(tab==='add')  renderAdd();
  if(tab==='lib')  renderLib();
  if(tab==='quiz') renderQuiz();
}

// ══════════════════════════════
//  API Call — OpenAI
// ══════════════════════════════
async function callOpenAI(messages){
  const res = await fetch('https://api.openai.com/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
    body: JSON.stringify({
      model:'gpt-4o-mini',
      max_tokens:1500,
      response_format:{type:'json_object'},
      messages
    })
  });
  if(!res.ok){
    const err = await res.json().catch(()=>({}));
    throw new Error((err&&err.error&&err.error.message)||'API error '+res.status);
  }
  const d = await res.json();
  return d.choices[0].message.content;
}

// ══════════════════════════════
//  Image → base64
// ══════════════════════════════
function fileToBase64(file){
  return new Promise((res,rej)=>{
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

// ══════════════════════════════
//  Home
// ══════════════════════════════
function renderHome(){
  ensureToday();
  document.getElementById('h-total').textContent = library.length;
  document.getElementById('h-today').textContent = stats.today;
  document.getElementById('h-quiz').textContent  = stats.quiz;
  const recent = [...library].reverse().slice(0,6);
  const el = document.getElementById('recent-list');
  if(!recent.length){
    el.innerHTML = '<div style="text-align:center;color:var(--muted);padding:24px;font-size:14px">還沒有單字，去拍照新增吧！📸</div>';
    return;
  }
  el.innerHTML = recent.map(w=>`
    <div class="recent-item" onclick="openWordModal('${w.word}')">
      <div style="flex:1">
        <div class="ri-word">${w.word}</div>
        <div class="ri-zh">${w.zh}</div>
      </div>
      <span class="ri-badge">${w.source||'手動'}</span>
    </div>
  `).join('');
}

// ══════════════════════════════
//  Add / Camera  (v2 — fixed)
// ══════════════════════════════
let previewImg = null;
const WORD_PROMPT = '請分析圖片/文字中所有值得學習的英文單字（優先多益800分等級），每個單字輸出完整分析。輸出純JSON，格式：{"words":[{"word":"單字","phonetic":"音標","pos":"詞性","zh":"中文意思(2-5字)","en_def":"英文定義","example_en":"TOEIC例句","example_zh":"例句中譯","roots":[{"part":"字根","type":"prefix|root|suffix","meaning":"意思"}],"root_tip":"字根記憶法(繁中)","family_words":["同族1","同族2","同族3"],"memory_tip":"記憶技巧(繁中)","level":"TOEIC分數範圍"}]}';
const TEXT_PROMPT = (word) => `請分析英文單字「${word}」，輸出純JSON：{"words":[{"word":"${word}","phonetic":"音標","pos":"詞性","zh":"中文意思(2-5字)","en_def":"英文定義","example_en":"TOEIC例句","example_zh":"例句中譯","roots":[{"part":"字根","type":"prefix|root|suffix","meaning":"意思"}],"root_tip":"字根記憶法(繁中)","family_words":["同族1","同族2","同族3","同族4"],"memory_tip":"記憶技巧(繁中)","level":"TOEIC分數範圍"}]}`;
const PASSAGE_PROMPT = (text) => `以下是一段英文文字，請找出所有值得學習的英文單字（優先多益800分等級，最多10個），每個單字輸出完整分析。文字內容：「${text}」。輸出純JSON：{"words":[{"word":"單字","phonetic":"音標","pos":"詞性","zh":"中文意思(2-5字)","en_def":"英文定義","example_en":"TOEIC例句","example_zh":"例句中譯","roots":[{"part":"字根","type":"prefix|root|suffix","meaning":"意思"}],"root_tip":"字根記憶法(繁中)","family_words":["同族1","同族2","同族3"],"memory_tip":"記憶技巧(繁中)","level":"TOEIC分數範圍"}]}`;

function resetKey(){
  if(!confirm('確定要重設 API Key？')) return;
  localStorage.removeItem('wl-key');
  apiKey = '';
  renderAdd();
}

function renderAdd(){
  const wrap = document.getElementById('add-wrap');
  if(!apiKey){
    wrap.innerHTML = `
      <div class="section-label">設定 API Key</div>
      <div class="api-prompt">
        <div class="api-label">
          輸入你的 <strong>OpenAI API Key</strong> 才能使用 AI 分析功能。<br><br>
          前往 <strong>platform.openai.com/api-keys</strong> 取得（需儲值 $5，每次分析約 $0.001）。
        </div>
        <input class="api-input" id="key-input" placeholder="sk-..." type="password"/>
        <button class="btn-primary" onclick="submitKey()">儲存並開始使用</button>
      </div>
    `;
    return;
  }

  // 3 input modes: camera, text, passage
  wrap.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div class="section-label" style="margin-bottom:0">新增單字</div>
      <button onclick="resetKey()" style="background:none;border:none;color:var(--muted);font-size:12px;text-decoration:underline">重設 Key</button>
    </div>

    <!-- Mode tabs -->
    <div style="display:flex;gap:6px">
      <button id="tab-cam" class="mode-tab active-tab" onclick="switchMode('cam')">📷 拍照/相簿</button>
      <button id="tab-word" class="mode-tab" onclick="switchMode('word')">✍️ 單字</button>
      <button id="tab-passage" class="mode-tab" onclick="switchMode('passage')">📝 文章段落</button>
    </div>

    <!-- Camera mode -->
    <div id="mode-cam">
      <div style="display:flex;gap:8px;margin-bottom:10px">
        <button class="cam-btn" onclick="triggerCamera()">📷 拍照</button>
        <button class="cam-btn" onclick="triggerAlbum()">🖼 相簿</button>
      </div>
      <div id="img-preview" style="display:none;margin-bottom:10px">
        <img id="preview-img" style="width:100%;border-radius:14px;display:block"/>
        <button class="btn-secondary" style="margin-top:8px" onclick="clearImg()">✕ 清除圖片</button>
      </div>
      <input type="file" id="cam-shoot" accept="image/*" capture="environment" style="display:none" onchange="onImgSelect(event)"/>
      <input type="file" id="cam-album" accept="image/*" style="display:none" onchange="onImgSelect(event)"/>
      <button class="btn-primary" id="btn-analyze" onclick="analyzeImage()" disabled>🔍 AI 辨識並分析單字</button>
    </div>

    <!-- Word mode -->
    <div id="mode-word" style="display:none">
      <input class="manual-input" id="manual-word" placeholder="輸入英文單字，可用逗號分隔多個（negotiate, leverage）" oninput="syncWordBtn()"/>
      <button class="btn-primary" id="btn-manual" onclick="analyzeManual()" disabled style="margin-top:8px">🤖 AI 分析單字</button>
    </div>

    <!-- Passage mode -->
    <div id="mode-passage" style="display:none">
      <textarea class="manual-input" id="passage-text" placeholder="貼上英文文章、逐字稿、句子... AI 自動擷取重要單字" rows="5" style="resize:vertical" oninput="syncPassageBtn()"></textarea>
      <button class="btn-primary" id="btn-passage" onclick="analyzePassage()" disabled style="margin-top:8px">🤖 擷取並分析所有單字</button>
    </div>

    <div id="result-area"></div>
  `;
  previewImg = null;
}

function switchMode(mode){
  ['cam','word','passage'].forEach(m=>{
    document.getElementById('mode-'+m).style.display = m===mode?'flex':'none';
    document.getElementById('mode-'+m).style.flexDirection = 'column';
    document.getElementById('mode-'+m).style.gap = '0';
    document.getElementById('tab-'+m).classList.toggle('active-tab', m===mode);
  });
  document.getElementById('mode-'+mode).style.display='flex';
}

function triggerCamera(){ document.getElementById('cam-shoot').click(); }
function triggerAlbum(){  document.getElementById('cam-album').click(); }
function clearImg(){
  previewImg=null;
  document.getElementById('img-preview').style.display='none';
  document.getElementById('btn-analyze').disabled=true;
}
function syncWordBtn(){
  const v=document.getElementById('manual-word').value.trim();
  document.getElementById('btn-manual').disabled=!v;
}
function syncPassageBtn(){
  const v=document.getElementById('passage-text').value.trim();
  document.getElementById('btn-passage').disabled=!v;
}

function submitKey(){
  const k = document.getElementById('key-input').value.trim();
  if(!k.startsWith('sk-')) return toast('⚠️ Key 格式不正確，應以 sk- 開頭');
  saveKey(k);
  toast('✅ API Key 已儲存！');
  renderAdd();
}

function onImgSelect(e){
  const file = e.target.files[0];
  if(!file) return;
  previewImg = file;
  const url = URL.createObjectURL(file);
  document.getElementById('preview-img').src = url;
  document.getElementById('img-preview').style.display = 'block';
  document.getElementById('btn-analyze').disabled = false;
  // reset input so same file can be re-selected
  e.target.value = '';
}

async function analyzeImage(){
  if(!previewImg) return;
  const btn = document.getElementById('btn-analyze');
  btn.disabled=true; btn.textContent='⏳ 分析中...';
  document.getElementById('result-area').innerHTML = renderLoading('AI 正在辨識圖片中的英文單字...');
  try {
    const b64 = await fileToBase64(previewImg);
    const mime = previewImg.type || 'image/jpeg';
    const raw = await callOpenAI([
      {role:'system', content:'You are an English vocabulary expert. Always respond with valid JSON only, no markdown.'},
      {role:'user', content:[
        {type:'image_url', image_url:{url:`data:${mime};base64,${b64}`}},
        {type:'text', text: WORD_PROMPT}
      ]}
    ]);
    const parsed = JSON.parse(raw.replace(/```json|```/g,'').trim());
    renderWordResults(parsed.words||parsed, '拍照');
  } catch(e){
    document.getElementById('result-area').innerHTML=`<div class="api-prompt"><div class="api-label">❌ ${e.message}</div><button class="btn-secondary" onclick="renderAdd()">重試</button></div>`;
  }
  btn.disabled=false; btn.textContent='🔍 AI 辨識並分析單字';
}

async function analyzeManual(){
  const input = document.getElementById('manual-word').value.trim();
  if(!input) return;
  const words = input.split(/[,，、\s]+/).filter(w=>w.trim());
  const btn = document.getElementById('btn-manual');
  btn.disabled=true; btn.textContent='⏳ 分析中...';
  document.getElementById('result-area').innerHTML = renderLoading(`AI 正在分析 ${words.length} 個單字...`);
  try {
    // analyse each word, or batch if multiple
    const prompt = words.length===1 ? TEXT_PROMPT(words[0]) : PASSAGE_PROMPT(words.join(', '));
    const raw = await callOpenAI([
      {role:'system', content:'You are an English vocabulary expert. Always respond with valid JSON only, no markdown.'},
      {role:'user', content: prompt}
    ]);
    const parsed = JSON.parse(raw.replace(/```json|```/g,'').trim());
    renderWordResults(parsed.words||parsed, '手動');
  } catch(e){
    document.getElementById('result-area').innerHTML=`<div class="api-prompt"><div class="api-label">❌ ${e.message}</div></div>`;
  }
  btn.disabled=false; btn.textContent='🤖 AI 分析單字';
}

async function analyzePassage(){
  const text = document.getElementById('passage-text').value.trim();
  if(!text) return;
  const btn = document.getElementById('btn-passage');
  btn.disabled=true; btn.textContent='⏳ 分析中...';
  document.getElementById('result-area').innerHTML = renderLoading('AI 正在從文章中擷取重要單字...');
  try {
    const raw = await callOpenAI([
      {role:'system', content:'You are an English vocabulary expert. Always respond with valid JSON only, no markdown.'},
      {role:'user', content: PASSAGE_PROMPT(text)}
    ]);
    const parsed = JSON.parse(raw.replace(/```json|```/g,'').trim());
    renderWordResults(parsed.words||parsed, '文章');
  } catch(e){
    document.getElementById('result-area').innerHTML=`<div class="api-prompt"><div class="api-label">❌ ${e.message}</div></div>`;
  }
  btn.disabled=false; btn.textContent='🤖 擷取並分析所有單字';
}

function renderLoading(msg){
  return `<div class="loading-card"><div class="spinner"></div><div class="loading-msg">${msg}</div></div>`;
}

function renderWordResults(words, source){
  const ra = document.getElementById('result-area');
  ra.innerHTML = words.map((w,i) => renderWordCard(w, source, i)).join('');
}

function renderWordCard(w, source, idx){
  const isSaved = library.some(x=>x.word.toLowerCase()===w.word.toLowerCase());
  const roots = (w.roots||[]).map(r=>`
    <div class="root-part root-${r.type}">
      <div class="rp-val">${r.part}</div>
      <div class="rp-mean">${r.meaning}</div>
    </div>
  `).join('');
  const family = (w.family_words||[]).map(fw=>`
    <span class="family-word" onclick="lookupFamily('${fw}')">${fw}</span>
  `).join('');

  return `
    <div style="display:flex;flex-direction:column;gap:10px" id="wc-${idx}">
      <div class="word-detail">
        <div class="wd-tag">
          <span class="tag tag-cat">${w.level||'TOEIC'}</span>
          <span class="tag tag-src">${source}</span>
        </div>
        <div class="wd-word">${w.word}</div>
        <div class="wd-ph">${w.phonetic||''}</div>
        <div class="wd-pos">${w.pos}</div>
        <div class="wd-zh">${w.zh}</div>
        <div class="wd-en">${w.en_def}</div>
        <div class="ex-block">
          <div class="ex-en">${w.example_en}</div>
          <div class="ex-zh">${w.example_zh}</div>
        </div>
        <div class="word-actions">
          <button class="btn-speak" onclick="speak('${w.word.replace(/'/g,"\\'")}')">🔊 單字</button>
          <button class="btn-speak" onclick="speak('${(w.example_en||'').replace(/'/g,"\\'")}')">🔊 例句</button>
        </div>
        <div class="word-actions">
          ${isSaved
            ? `<div style="flex:1;text-align:center;color:var(--muted);font-size:14px;padding:11px">✅ 已在單字庫</div>`
            : `<button class="btn-save-word" onclick="saveWord(${idx})">＋ 加入我的單字庫</button>`
          }
        </div>
      </div>

      ${roots ? `
      <div class="root-card">
        <div class="root-title">🔤 字根字首分析</div>
        <div class="root-parts">${roots}</div>
        ${w.root_tip ? `<div class="tip-card"><div class="tip-label">字根記憶法</div><div class="tip-text">${w.root_tip}</div></div>` : ''}
        ${family ? `<div class="root-family"><div class="root-family-title" style="font-size:12px;color:var(--muted);margin-bottom:8px">🔗 同族單字（點擊查詢）</div><div class="root-family-words">${family}</div></div>` : ''}
      </div>` : ''}

      ${w.memory_tip ? `
      <div class="tip-card">
        <div class="tip-label">💡 記憶技巧</div>
        <div class="tip-text">${w.memory_tip}</div>
      </div>` : ''}
    </div>
  `;
}

// store words pending save indexed by position
let pendingWords = [];
function renderWordResults(words, source){
  pendingWords = words.map(w=>({...w, source}));
  const ra = document.getElementById('result-area');
  ra.innerHTML = '<div style="display:flex;flex-direction:column;gap:14px">' +
    words.map((w,i)=>renderWordCard(w,source,i)).join('') +
    '</div>';
}

function saveWord(idx){
  const w = pendingWords[idx];
  if(!w) return;
  if(library.some(x=>x.word.toLowerCase()===w.word.toLowerCase())){
    toast('這個單字已在單字庫'); return;
  }
  ensureToday();
  library.push({
    word: w.word, phonetic: w.phonetic, pos: w.pos,
    zh: w.zh, en_def: w.en_def,
    example_en: w.example_en, example_zh: w.example_zh,
    roots: w.roots||[], root_tip: w.root_tip||'',
    family_words: w.family_words||[],
    memory_tip: w.memory_tip||'',
    level: w.level||'', source: w.source,
    addedAt: Date.now()
  });
  stats.today++; saveLib(); saveSt();
  toast(`✅「${w.word}」已加入單字庫！`);
  // disable the save button
  const btn = document.querySelector(`#wc-${idx} .btn-save-word`);
  if(btn) btn.outerHTML = `<div style="flex:1;text-align:center;color:var(--muted);font-size:14px;padding:11px">✅ 已儲存</div>`;
}

async function lookupFamily(word){
  document.getElementById('manual-word').value = word;
  document.getElementById('result-area').innerHTML = renderLoading(`查詢「${word}」中...`);
  try {
    const raw = await callOpenAI([
      {role:'system', content:'You are an English vocabulary expert. Always respond with valid JSON only, no markdown.'},
      {role:'user', content: TEXT_PROMPT(word)}
    ]);
    const parsed = JSON.parse(raw.replace(/```json|```/g,'').trim()); const words = parsed.words || parsed;
    renderWordResults(words, '同族查詢');
    document.getElementById('add-wrap').scrollTo({top:99999, behavior:'smooth'});
  } catch(e){ toast('查詢失敗：'+e.message); }
}

// ══════════════════════════════
//  Library
// ══════════════════════════════
function renderLib(){
  const q = (document.getElementById('lib-search')||{}).value || '';
  filterLib(q);
}

function filterLib(q){
  const filtered = q
    ? library.filter(w=>w.word.toLowerCase().includes(q.toLowerCase())||w.zh.includes(q))
    : library;
  const el = document.getElementById('lib-list');
  document.getElementById('lib-count').textContent = `共 ${library.length} 個單字${q?' · 顯示 '+filtered.length+' 個':''}`;

  if(!filtered.length){
    el.innerHTML = `<div class="empty-lib"><div style="font-size:48px">${library.length?'🔍':'📚'}</div><div>${library.length?'找不到符合的單字':'單字庫是空的'}</div><div style="font-size:13px;color:var(--muted)">${library.length?'試試其他關鍵字':'去新增頁面拍照或輸入單字'}</div></div>`;
    return;
  }
  el.innerHTML = [...filtered].reverse().map(w=>`
    <div class="lib-item" onclick="openWordModal('${w.word}')">
      <div style="flex:1">
        <div class="li-word">${w.word}</div>
        <div class="li-info">${w.phonetic||''} · ${w.zh} · ${w.source||''}</div>
      </div>
      <div class="li-actions" onclick="event.stopPropagation()">
        <button class="btn-li-speak" onclick="speak('${w.word.replace(/'/g,"\\'")}')">🔊</button>
        <button class="btn-li-del" onclick="delWord('${w.word}')">🗑</button>
      </div>
    </div>
  `).join('');
}

function delWord(word){
  if(!confirm(`確定刪除「${word}」？`)) return;
  library = library.filter(w=>w.word!==word);
  saveLib(); renderLib(); renderHome();
  toast(`🗑 已刪除「${word}」`);
}

// ══════════════════════════════
//  Word Modal
// ══════════════════════════════
function openWordModal(wordStr){
  const w = library.find(x=>x.word===wordStr);
  if(!w) return;
  const roots = (w.roots||[]).map(r=>`
    <div class="root-part root-${r.type}">
      <div class="rp-val">${r.part}</div>
      <div class="rp-mean">${r.meaning}</div>
    </div>
  `).join('');
  const family = (w.family_words||[]).map(fw=>`<span class="family-word">${fw}</span>`).join('');

  document.getElementById('modal-body').innerHTML = `
    <div class="modal-title">${w.word}</div>
    <div class="wd-ph">${w.phonetic||''}</div>
    <div class="wd-pos" style="margin-top:10px">${w.pos}</div>
    <div class="wd-zh">${w.zh}</div>
    <div class="wd-en">${w.en_def}</div>
    <div class="ex-block">
      <div class="ex-en">${w.example_en}</div>
      <div class="ex-zh">${w.example_zh}</div>
    </div>
    <div class="word-actions">
      <button class="btn-speak" onclick="speak('${w.word.replace(/'/g,"\\'")}')">🔊 朗讀單字</button>
      <button class="btn-speak" onclick="speak('${(w.example_en||'').replace(/'/g,"\\'")}')">🔊 朗讀例句</button>
    </div>
    ${roots?`
    <div class="root-card">
      <div class="root-title">🔤 字根字首</div>
      <div class="root-parts">${roots}</div>
      ${w.root_tip?`<div class="tip-card"><div class="tip-label">字根記憶法</div><div class="tip-text">${w.root_tip}</div></div>`:''}
      ${family?`<div class="root-family"><div class="root-family-title" style="margin-bottom:8px;font-size:12px;color:var(--muted)">同族單字</div><div class="root-family-words">${family}</div></div>`:''}
    </div>`:''}
    ${w.memory_tip?`<div class="tip-card"><div class="tip-label">💡 記憶技巧</div><div class="tip-text">${w.memory_tip}</div></div>`:''}
    <button class="modal-close" onclick="closeModal()">關閉</button>
  `;
  document.getElementById('modal').style.display='flex';
}

function closeModal(e){
  if(!e || e.target===document.getElementById('modal'))
    document.getElementById('modal').style.display='none';
}

// ══════════════════════════════
//  Quiz
// ══════════════════════════════
function renderQuiz(){
  const el = document.getElementById('quiz-content');
  if(library.length < 4){
    el.innerHTML = `<div class="quiz-need-more"><div style="font-size:48px">📚</div><div style="font-size:18px;font-weight:700">單字不夠</div><div style="font-size:14px;color:var(--muted)">至少需要 4 個單字才能測驗<br>目前有 ${library.length} 個</div><button class="btn-primary" style="margin-top:8px" onclick="goTab('add')">去新增單字</button></div>`;
    return;
  }
  quizState.words = shuffle(library).slice(0, Math.min(10, library.length));
  quizState.idx = 0; quizState.score = 0; quizState.answered = false;
  renderQ();
}

function renderQ(){
  const q = quizState.words[quizState.idx];
  if(!q){ renderScore(); return; }

  const wrongs = shuffle(library.filter(w=>w.zh!==q.zh)).slice(0,3).map(w=>w.zh);
  const opts = shuffle([q.zh, ...wrongs]);
  const pct = (quizState.idx / quizState.words.length) * 100;

  document.getElementById('quiz-content').innerHTML = `
    <div class="quiz-prog-bar"><div class="quiz-prog-fill" style="width:${pct}%"></div></div>
    <div style="font-size:12px;color:var(--muted);text-align:right">題目 ${quizState.idx+1} / ${quizState.words.length}</div>
    <div class="quiz-q-card">
      <div class="quiz-ql">這個單字的中文意思是？</div>
      <div class="quiz-word">${q.word}</div>
      <div class="quiz-ph">${q.phonetic||''}</div>
    </div>
    <div class="opts">
      ${opts.map(o=>`
        <button class="opt" onclick="ansQ(this,'${o.replace(/'/g,"\\'")}','${q.zh.replace(/'/g,"\\'")}','${q.word.replace(/'/g,"\\'")}','${(q.example_en||'').replace(/'/g,"\\'")}','${(q.example_zh||'').replace(/'/g,"\\'")}')">
          ${o}
        </button>
      `).join('')}
    </div>
    <div id="qfb" style="display:none"></div>
    <div id="qnxt" style="display:none">
      <button class="btn-nq" onclick="nextQ()">
        ${quizState.idx+1 < quizState.words.length ? '下一題 →' : '查看結果 🎯'}
      </button>
    </div>
  `;
}

function ansQ(btn, chosen, correct, word, ex, exzh){
  if(quizState.answered) return;
  quizState.answered = true;
  document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  if(chosen===correct){ btn.classList.add('ok'); quizState.score++; }
  else { btn.classList.add('no'); document.querySelectorAll('.opt').forEach(b=>{ if(b.textContent.trim()===correct) b.classList.add('ok'); }); }
  speak(word);
  const fb = document.getElementById('qfb');
  fb.style.display = 'block';
  fb.innerHTML = `<div class="explain-box"><div class="exq">${ex}</div><div>${exzh}</div></div>`;
  document.getElementById('qnxt').style.display = 'block';
}

function nextQ(){
  quizState.idx++; quizState.answered = false;
  renderQ();
}

function renderScore(){
  stats.quiz++; saveSt();
  const pct = Math.round((quizState.score/quizState.words.length)*100);
  const e = pct>=80?'🏆':pct>=60?'💪':'📚';
  const m = pct>=80?'太棒了！繼續拍照新增單字！':pct>=60?'不錯！繼續加油！':'多複習收藏的單字！';
  document.getElementById('quiz-content').innerHTML = `
    <div class="score-screen">
      <div class="score-emoji">${e}</div>
      <div class="score-n">${pct}%</div>
      <div class="score-sub">${quizState.score} / ${quizState.words.length} 答對</div>
      <div class="score-msg">${m}</div>
      <button class="btn-retry" onclick="renderQuiz()">再測一次</button>
    </div>
  `;
  renderHome();
}
