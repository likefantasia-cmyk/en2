<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCCl-dmOTiB3FMoavkaA6m_ZAHTPJgxNAs",
    authDomain: "kumoen.firebaseapp.com",
    projectId: "kumoen",
    storageBucket: "kumoen.firebasestorage.app",
    messagingSenderId: "407042193066",
    appId: "1:407042193066:web:f48c1b9ce10019437c42d3"
  };

  const fbApp = initializeApp(firebaseConfig);
  const db    = getFirestore(fbApp);
  const USER_DOC = 'users/kumo';  // 你的私人文件路徑

  // ── 讀取資料 ──
  async function fbLoad(){
    try{
      const snap = await getDoc(doc(db, USER_DOC.split('/')[0], USER_DOC.split('/')[1]));
      if(snap.exists()){
        const data = snap.data();
        window._library = data.library || [];
        window._stats   = data.stats   || {quiz:0,today:0,date:''};
      }
    }catch(e){ console.warn('Firebase load error:', e); }
  }

  // ── 儲存整個單字庫 ──
  async function fbSaveAll(){
    try{
      await setDoc(doc(db, USER_DOC.split('/')[0], USER_DOC.split('/')[1]
      ), { library: window._library, stats: window._stats }, {merge:true});
    }catch(e){ console.warn('Firebase save error:', e); }
  }

  // 掛到 window 讓主程式呼叫
  window.fbLoad    = fbLoad;
  window.fbSaveAll = fbSaveAll;

  // 啟動：先載入資料再初始化 app
  fbLoad().then(()=>{
    window._fbReady = true;
    if(window._onFbReady) window._onFbReady();
  });
</script>

<style>
/* ── Claude 橘白深色主題 ── */

  --s3:#333333;
  --border:#3a3a3a;

.btn-retry{background:var(--accent);color:#fff;border-radius:14px;padding:14px 40px;font-size:16px;font-weight:700;margin-top:8px}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:flex-end;max-width:480px;margin:0 auto}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--s2);border:1px solid var(--border2);color:var(--text);padding:10px 20px;border-radius:20px;font-size:14px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;max-width:320px;text-align:center;white-space:pre-line}
.toast.show{opacity:1}
</style>

async function callAI(messages){
  const r = await fetch('https://api.openai.com/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
    body: JSON.stringify({model:'gpt-4o', max_tokens:4000, response_format:{type:'json_object'}, messages})
  });
  if(!r.ok){ const e=await r.json().catch(()=>({})); throw new Error((e?.error?.message)||'API error '+r.status); }
  const d=await r.json();
  return d.choices[0].message.content;
}

function fileToB64(file){
  // Compress image to max 1280px wide before sending — keeps quality high but reduces token cost
  return new Promise((res,rej)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const MAX=2048;
        let {width:w,height:h}=img;
        if(w>MAX){ h=Math.round(h*MAX/w); w=MAX; }
        const canvas=document.createElement('canvas');
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        const b64=canvas.toDataURL('image/jpeg',0.95).split(',')[1];
        res(b64);
      };
      img.onerror=rej;
      img.src=e.target.result;
    };
    reader.onerror=rej;
    reader.readAsDataURL(file);
  });
}

async function doImg(){
  if(!previewFile) return;
  const isTextbook=document.getElementById('textbook-mode')?.checked||false;
  const btn=document.getElementById('btn-img');
  btn.disabled=true; btn.textContent='⏳ 辨識中...';

  try{
    const b64=await fileToB64(previewFile);

    if(isTextbook){
      // ── 課本模式：兩步驟，先 OCR 再分析 ──
      loading('第 1 步：辨識課本中所有粗體英文單字...');
      const ocrRaw=await callAI([
        {role:'system', content:'You are a precise OCR expert. Your job is to read text from images exactly as written.'},
        {role:'user', content:[
          {type:'image_url', image_url:{url:`data:image/jpeg;base64,${b64}`}},
          {type:'text', text:`This is a textbook vocabulary list page.
TASK: Find and list EVERY English headword entry on this page.
- Headwords are usually in bold, larger font, or appear as numbered/bulleted list items
- Read systematically: top to bottom, left to right, column by column
- Include ALL of them — do not filter, do not skip any
- Include simple words if they appear as headwords
- Exclude: page numbers, chapter titles, Chinese/Japanese characters, pure numbers
Return ONLY JSON: {"detected_words":["word1","word2","word3",...]}
List every headword you can find.`}
        ]}
      ]);

      let words=[];
      try{
        const parsed=JSON.parse(ocrRaw.replace(/\`\`\`json|\`\`\`/g,'').trim());

      }catch(e){ words=[]; }

      if(!words.length) throw new Error('找不到任何單字，請確認圖片清晰且正面朝上');

      loading(`第 2 步：分析 ${words.length} 個單字（字根字首、例句...）約需 15 秒`);

        {role:'system', content:SYS},

請對每一個單字做完整分析，所有單字都要分析，不可跳過。
回傳JSON：{"words":[{"word":"單字","phonetic":"IPA音標","pos":"詞性","zh":"中文意思2-5字","en_def":"英文定義1句","example_en":"TOEIC例句","example_zh":"例句中文翻譯","roots":[{"part":"字根","type":"prefix或root或suffix","meaning":"中文意思"}],"root_tip":"字根記憶法(繁中1-2句)","family_words":["同族1","同族2","同族3"],"memory_tip":"記憶技巧(繁中1句)","level":"TOEIC分數範圍"}]}`}

        {role:'system', content:SYS},
        {role:'user', content:[
          {type:'image_url', image_url:{url:`data:image/jpeg;base64,${b64}`}},
          {type:'text', text:IMG_PROMPT}
        ]}

      const d=JSON.parse(raw.replace(/\`\`\`json|\`\`\`/g,'').trim());
      showResults(d.words||d, '拍照');
    }

  }catch(e){
    document.getElementById('result-area').innerHTML=`<div class="api-box"><div class="api-label">❌ ${e.message}<br><br>建議：圖片清晰、單字正面朝上、光線充足</div><button class="btn-secondary" onclick="renderAdd()">重試</button></div>`;

// ══ Results ══
function showResults(words, source){
  pending = words.map(w=>({...w, source}));
  const newCount = pending.filter(w=>!library.some(l=>l.word.toLowerCase()===w.word.toLowerCase())).length;
  const dupCount = pending.length - newCount;

  const bulkBar = pending.length > 1 ? `
    <div class="bulk-bar">
      <div class="bulk-info">
        找到 ${pending.length} 個單字
        <span>（${newCount} 個新・${dupCount} 個重複）</span>
      </div>
      <button class="btn-bulk" onclick="saveAll()">全部加入 ＋</button>
    </div>` : '';

  document.getElementById('result-area').innerHTML =
    `<div class="result-section">${bulkBar}${pending.map((w,i)=>wordCard(w,i)).join('')}</div>`;
}

function wordCard(w, idx){
  const dup = library.some(l=>l.word.toLowerCase()===w.word.toLowerCase());

  // ── Root parts ──
  const rootParts = (w.roots||[]).map(r=>{
    const cls = r.type==='prefix'?'rp-prefix': r.type==='suffix'?'rp-suffix':'rp-root';
    return `<div class="rp ${cls}"><div class="rp-val">${r.part}</div><div class="rp-mean">${r.meaning}</div></div>`;
  }).join('');

  const familyWords = (w.family_words||[]).map(fw=>
    `<span class="fw" onclick="lookupWord('${fw.replace(/'/g,"\\'")}')">🔗 ${fw}</span>`
  ).join('');

  const hasRoots = rootParts || w.root_tip || familyWords;

  return `
  <div id="wc-${idx}" style="display:flex;flex-direction:column;gap:10px">

    <!-- Word header -->
    <div class="word-header">
      <div class="wtag-row">
        <span class="wtag wtag-lvl">${w.level||'TOEIC'}</span>
        <span class="wtag wtag-src">${w.source}</span>
        ${dup ? '<span class="wtag wtag-dup">⚠️ 已有此單字</span>' : ''}
      </div>
      <div class="w-word">${w.word}</div>
      <div class="w-ph">${w.phonetic||''}</div>
      <div class="w-pos">${w.pos||''}</div>
      <div class="w-zh">${w.zh}</div>
      <div class="w-en">${w.en_def}</div>
      <div class="ex-block">
        <div class="ex-en">${w.example_en}</div>
        <div class="ex-zh">${w.example_zh}</div>
      </div>
      <div class="speak-row">
        <button class="btn-speak" onclick="speak('${w.word.replace(/'/g,"\\'")}')">🔊 單字</button>
        <button class="btn-speak" onclick="speak('${(w.example_en||'').replace(/'/g,"\\'")}')">🔊 例句</button>
      </div>
      <div class="save-row" id="save-row-${idx}">
        ${dup
          ? `<div class="already-saved">✅ 已在單字庫中${dup?'（重複）':''}</div>`
          : `<button class="btn-save-one" onclick="saveOne(${idx})">＋ 加入單字庫</button>`
        }
      </div>
    </div>

    <!-- Root card -->
    ${hasRoots ? `
    <div class="root-card">
      <div class="root-card-title">🔤 字根字首分析</div>
      ${rootParts ? `<div class="root-parts-row">${rootParts}</div>` : ''}
      ${w.root_tip ? `
      <div class="root-tip-box">
        <div class="root-tip-label">字根記憶法</div>
        <div class="root-tip-text">${w.root_tip}</div>
      </div>` : ''}
      ${familyWords ? `
      <div>
        <div class="family-label">同族單字（點擊查詢）</div>
        <div class="family-row">${familyWords}</div>
      </div>` : ''}
    </div>` : ''}

    <!-- Memory tip -->
    ${w.memory_tip ? `
    <div class="mem-card">
      <div class="mem-label">💡 記憶技巧</div>
      <div class="mem-text">${w.memory_tip}</div>
    </div>` : ''}

  </div>`;
}

function saveOne(idx){
  const w=pending[idx]; if(!w) return;
  if(library.some(l=>l.word.toLowerCase()===w.word.toLowerCase())){
    toast(`⚠️「${w.word}」已在單字庫`); return;
  }
  pushToLib(w);
  const row=document.getElementById('save-row-'+idx);
  if(row) row.innerHTML=`<div class="already-saved">✅ 已儲存</div>`;
  toast(`✅「${w.word}」已加入！`);
}

function saveAll(){
  ensureToday();
  let added=0, skipped=[];
  pending.forEach(w=>{
    if(library.some(l=>l.word.toLowerCase()===w.word.toLowerCase())){
      skipped.push(w.word);
    } else {
      pushToLib(w); added++;
    }
  });
  // update all save rows
  pending.forEach((w,i)=>{
    const row=document.getElementById('save-row-'+i);
    if(row) row.innerHTML=`<div class="already-saved">✅ 已儲存</div>`;
  });
  let msg = `✅ 已加入 ${added} 個單字！`;
  if(skipped.length) msg += `\n⚠️ 跳過重複：${skipped.join('、')}`;
  toast(msg, 3500);
  renderHome();
}

function pushToLib(w){
  ensureToday();
  library.push({
    word:w.word, phonetic:w.phonetic||'', pos:w.pos||'',
    zh:w.zh, en_def:w.en_def,
    example_en:w.example_en, example_zh:w.example_zh,
    roots:w.roots||[], root_tip:w.root_tip||'',
    family_words:w.family_words||[], memory_tip:w.memory_tip||'',
    level:w.level||'', source:w.source, addedAt:Date.now()
  });
  stats.today++; save(); saveSt();
}

async function lookupWord(word){
  document.getElementById('result-area').innerHTML=`<div class="spinner-wrap"><div class="spinner"></div><div class="spin-msg">查詢「${word}」的字根字首...</div></div>`;
  try{
    const raw=await callAI([{role:'system',content:SYS},{role:'user',content:WORD_PROMPT(word)}]);
    const d=JSON.parse(raw.replace(/```json|```/g,'').trim());
    showResults(d.words||d, '同族查詢');
    document.getElementById('add-wrap').scrollTo({top:99999,behavior:'smooth'});
  }catch(e){ toast('查詢失敗：'+e.message); }
}

// ══ Library ══
function renderLib(){
  filterLib((document.getElementById('lib-search')||{}).value||'');
}

function filterLib(q){
  const list=q ? library.filter(w=>w.word.toLowerCase().includes(q.toLowerCase())||w.zh.includes(q)) : library;
  document.getElementById('lib-count').textContent=`共 ${library.length} 個單字${q?` · 顯示 ${list.length} 個`:''}`;
  const el=document.getElementById('lib-list');
  if(!list.length){
    el.innerHTML=`<div class="empty-state"><div style="font-size:48px">${library.length?'🔍':'📚'}</div><div>${library.length?'找不到符合的單字':'單字庫是空的'}</div></div>`;
    return;
  }
  el.innerHTML=[...list].reverse().map(w=>`
    <div class="lib-item" onclick="openModal('${w.word.replace(/'/g,"\\'")}')">
      <div style="flex:1">
        <div class="li-word">${w.word}</div>
        <div class="li-info">${w.phonetic||''} · ${w.zh} · <span style="color:var(--accent-light)">${w.source||''}</span></div>
      </div>
      <div class="li-acts" onclick="event.stopPropagation()">
        <button class="btn-speak-sm" onclick="speak('${w.word.replace(/'/g,"\\'")}')">🔊</button>
        <button class="btn-del" onclick="delWord('${w.word.replace(/'/g,"\\'")}')">🗑</button>
      </div>
    </div>`).join('');
}

function delWord(word){
  if(!confirm(`確定刪除「${word}」？`)) return;
  library=library.filter(w=>w.word!==word);
  save(); renderLib(); renderHome();
  toast(`🗑 已刪除「${word}」`);
}

// ══ Modal ══
function openModal(word){
  const w=library.find(x=>x.word===word); if(!w) return;

  const rootParts=(w.roots||[]).map(r=>{
    const cls=r.type==='prefix'?'rp-prefix':r.type==='suffix'?'rp-suffix':'rp-root';
    return `<div class="rp ${cls}"><div class="rp-val">${r.part}</div><div class="rp-mean">${r.meaning}</div></div>`;
  }).join('');

  const familyWords=(w.family_words||[]).map(fw=>`<span class="fw">${fw}</span>`).join('');
  const hasRoots=rootParts||w.root_tip||familyWords;

  document.getElementById('modal-body').innerHTML=`
    <div class="modal-word">${w.word}</div>
    <div class="w-ph">${w.phonetic||''}</div>
    <div class="w-pos" style="margin-top:10px">${w.pos||''}</div>
    <div class="w-zh">${w.zh}</div>
    <div class="w-en">${w.en_def}</div>
    <div class="ex-block">
      <div class="ex-en">${w.example_en}</div>
      <div class="ex-zh">${w.example_zh}</div>
    </div>
    <div class="speak-row">
      <button class="btn-speak" onclick="speak('${w.word.replace(/'/g,"\\'")}')">🔊 朗讀單字</button>
      <button class="btn-speak" onclick="speak('${(w.example_en||'').replace(/'/g,"\\'")}')">🔊 朗讀例句</button>
    </div>
    ${hasRoots?`
    <div class="root-card">
      <div class="root-card-title">🔤 字根字首分析</div>
      ${rootParts?`<div class="root-parts-row">${rootParts}</div>`:''}
      ${w.root_tip?`<div class="root-tip-box"><div class="root-tip-label">字根記憶法</div><div class="root-tip-text">${w.root_tip}</div></div>`:''}
      ${familyWords?`<div><div class="family-label" style="margin-bottom:6px">同族單字</div><div class="family-row">${familyWords}</div></div>`:''}
    </div>`:''}
    ${w.memory_tip?`<div class="mem-card"><div class="mem-label">💡 記憶技巧</div><div class="mem-text">${w.memory_tip}</div></div>`:''}
    <button class="modal-close" onclick="closeModal()">關閉</button>
  `;
  document.getElementById('modal').style.display='flex';
}
function closeModal(){ document.getElementById('modal').style.display='none'; }

// ══ Quiz ══
function renderQuiz(){
  const el=document.getElementById('quiz-content');
  if(library.length<4){
    el.innerHTML=`<div class="empty-state"><div style="font-size:48px">📚</div><div style="font-size:18px;font-weight:700">單字不夠</div><div style="font-size:14px;color:var(--muted)">至少需要 4 個單字<br>目前有 ${library.length} 個</div><button class="btn-primary" style="margin-top:12px" onclick="goTab('add')">去新增單字</button></div>`;
    return;
  }
  quizSt.words=shuffle(library).slice(0,Math.min(10,library.length));
  quizSt.idx=0; quizSt.score=0; quizSt.ans=false;
  renderQ();
}

function renderQ(){
  const q=quizSt.words[quizSt.idx]; if(!q){ renderScore(); return; }
  const wrongs=shuffle(library.filter(w=>w.zh!==q.zh)).slice(0,3).map(w=>w.zh);
  const opts=shuffle([q.zh,...wrongs]);
  const pct=(quizSt.idx/quizSt.words.length)*100;
  document.getElementById('quiz-content').innerHTML=`
    <div class="qprog-bar"><div class="qprog-fill" style="width:${pct}%"></div></div>
    <div style="font-size:12px;color:var(--muted);text-align:right">題目 ${quizSt.idx+1} / ${quizSt.words.length}</div>
    <div class="q-card">
      <div class="q-label">這個單字的中文意思是？</div>
      <div class="q-word">${q.word}</div>
      <div class="q-ph">${q.phonetic||''}</div>
    </div>
    <div class="opts">
      ${opts.map(o=>`<button class="opt" onclick="ansQ(this,'${o.replace(/'/g,"\\'")}','${q.zh.replace(/'/g,"\\'")}','${q.word.replace(/'/g,"\\'")}','${(q.example_en||'').replace(/'/g,"\\'")}','${(q.example_zh||'').replace(/'/g,"\\'")}')">
        ${o}</button>`).join('')}
    </div>
    <div id="qfb" style="display:none"></div>
    <div id="qnxt" style="display:none">
      <button class="btn-nq" onclick="nextQ()">${quizSt.idx+1<quizSt.words.length?'下一題 →':'查看結果 🎯'}</button>
    </div>`;
}

function ansQ(btn,chosen,correct,word,ex,exzh){
  if(quizSt.ans) return; quizSt.ans=true;
  document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  if(chosen===correct){ btn.classList.add('ok'); quizSt.score++; }
  else{ btn.classList.add('no'); document.querySelectorAll('.opt').forEach(b=>{ if(b.textContent.trim()===correct) b.classList.add('ok'); }); }
  speak(word);
  const fb=document.getElementById('qfb');
  fb.style.display='block';
  fb.innerHTML=`<div class="explain-box"><div class="exq">${ex}</div><div>${exzh}</div></div>`;
  document.getElementById('qnxt').style.display='block';
}

function nextQ(){ quizSt.idx++; quizSt.ans=false; renderQ(); }

function renderScore(){
  stats.quiz++; saveSt();
  const pct=Math.round((quizSt.score/quizSt.words.length)*100);
  const e=pct>=80?'🏆':pct>=60?'💪':'📚';
  const m=pct>=80?'太棒了！繼續拍照新增單字！':pct>=60?'不錯！繼續加油！':'多複習收藏的單字！';
  document.getElementById('quiz-content').innerHTML=`
    <div class="score-screen">
      <div class="score-emoji">${e}</div>
      <div class="score-n">${pct}%</div>
      <div class="score-sub">${quizSt.score} / ${quizSt.words.length} 答對</div>
      <div class="score-msg">${m}</div>
      <button class="btn-retry" onclick="renderQuiz()">再測一次</button>
    </div>`;
  renderHome();
}

// ══ Init ══
// 等 Firebase 載入完成再啟動，若超過 3 秒則直接啟動（離線保護）
function startApp(){
  syncFromFb();
  // 隱藏載入畫面
  const ld = document.getElementById('fb-loading');
  if(ld) ld.style.display='none';
  renderHome();
}

if(window._fbReady){
  startApp();
} else {
  window._onFbReady = startApp;
  setTimeout(()=>{ if(!window._fbReady){ console.warn('Firebase timeout, starting offline'); startApp(); }}, 3000);
}
</script>
