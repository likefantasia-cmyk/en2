<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,doc,setDoc,getDoc,getDocs,deleteDoc,collection,writeBatch}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const cfg={apiKey:"AIzaSyCCl-dmOTiB3FMoavkaA6m_ZAHTPJgxNAs",authDomain:"kumoen.firebaseapp.com",projectId:"kumoen",storageBucket:"kumoen.firebasestorage.app",messagingSenderId:"407042193066",appId:"1:407042193066:web:f48c1b9ce10019437c42d3"};
const app=initializeApp(cfg);
const db=getFirestore(app);
const UREF=doc(db,"users","kumo");
const WCOL=collection(db,"users","kumo","words");

// ── localStorage 工具
function lsGet(k){try{return JSON.parse(localStorage.getItem(k)||"null");}catch(e){return null;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function lsBackup(lib,st){
  if(lib&&lib.length>0){lsSet("wl-lib-backup",lib);lsSet("wl-lib-count",lib.length);}
  if(st)lsSet("wl-st-backup",st);
}
function lsRestore(){
  return{lib:lsGet("wl-lib-backup")||[],st:lsGet("wl-st-backup")||{quiz:0,today:0,date:""}};
}

function wordKey(word){return word.toLowerCase().replace(/[^a-z0-9]/g,"_");}

// ── 快速啟動：先用 localStorage，不等 Firebase
function quickStart(){
  const local=lsRestore();
  window._lib=local.lib;
  window._st=local.st;
  window._fbReady=true;
  if(window._onFbReady)window._onFbReady();
}

async function fbLoad(){
  try{
    // 1. 先快速啟動（localStorage）
    quickStart();

    // 2. 背景讀 stats（1次讀取）比對 lastSaved
    const usnap=await getDoc(UREF);
    if(!usnap.exists()){
      // 全新用戶或舊結構未遷移
      const local=lsRestore();
      if(local.lib.length>0){
        // 有本機資料但 Firebase 無主文件 → 可能是全新的 subcollection 架構還沒建立
        // 嘗試讀 subcollection
        const wsnap=await getDocs(WCOL);
        if(wsnap.empty){
          // subcollection 也是空的 → 把本機資料推上去
          console.log("全新遷移：推送本機資料到 Firebase");
          await migrateToSubcollection(local.lib,local.st);
        }
      }
      return;
    }

    const d=usnap.data();
    const fbSt=d.stats||{quiz:0,today:0,date:""};
    const fbLastSaved=d.lastSaved||0;
    const localLastSaved=lsGet("wl-lastSaved")||0;

    // 3. 偵測舊結構（library 陣列在主文件）→ 自動遷移
    if(d.library&&d.library.length>0){
      console.log("偵測到舊結構，開始遷移 "+d.library.length+" 筆...");
      window._lib=d.library;window._st=fbSt;
      lsBackup(d.library,fbSt);
      if(window._onFbReady)window._onFbReady(); // 已在 quickStart 呼叫，這裡只是確保
      migrateToSubcollection(d.library,fbSt).then(function(){
        console.log("遷移完成！");
      });
      return;
    }

    // 4. 比對 lastSaved：一樣 → 用快取，不同 → 重新讀
    if(fbLastSaved&&fbLastSaved===localLastSaved){
      console.log("快取命中，不需重新讀取（lastSaved="+fbLastSaved+"）");
      // stats 可能有更新（quiz次數等）
      window._st=fbSt;lsSet("wl-st-backup",fbSt);
      if(window._onFbReady){}; // 已啟動
      return;
    }

    // 5. lastSaved 不同 → 讀 subcollection（資料有變動）
    console.log("快取過期，重新讀取 subcollection...");
    const wsnap=await getDocs(WCOL);
    const fbLib=[];
    wsnap.forEach(function(d){if(d.data().word)fbLib.push(d.data());});
    fbLib.sort(function(a,b){return(a.addedAt||0)-(b.addedAt||0);});
    console.log("Firebase 回傳筆數："+fbLib.length);

    if(fbLib.length>0){
      window._lib=fbLib;window._st=fbSt;
      lsBackup(fbLib,fbSt);
      lsSet("wl-lastSaved",fbLastSaved);
      // 更新畫面（已啟動後同步）
      if(window.refreshApp)window.refreshApp();
    }
  }catch(e){
    console.warn("fbLoad error",e);
  }
}

// ── 遷移舊結構到 subcollection
async function migrateToSubcollection(oldLib,fbSt){
  try{
    const ts=Date.now();
    var b=writeBatch(db);var cnt=0;var batches=[];
    oldLib.forEach(function(w){
      if(!w.word)return;
      b.set(doc(WCOL,wordKey(w.word)),w);cnt++;
      if(cnt%400===0){batches.push(b);b=writeBatch(db);}
    });
    batches.push(b);
    for(var i=0;i<batches.length;i++){await batches[i].commit();}
    await setDoc(UREF,{stats:fbSt,lastSaved:ts,migrated:true},{merge:true});
    lsSet("wl-lastSaved",ts);
    // 清除舊的 library 陣列
    await setDoc(UREF,{library:[]},{merge:true});
    lsBackup(oldLib,fbSt);
  }catch(e){console.warn("遷移失敗",e);}
}

// ── 新增/更新單一單字
async function fbSaveWord(w){
  if(!w||!w.word)return;
  try{
    const ts=Date.now();
    await setDoc(doc(WCOL,wordKey(w.word)),w);
    await setDoc(UREF,{lastSaved:ts},{merge:true});
    lsSet("wl-lastSaved",ts);
    lsBackup(window._lib||[],window._st||{});
    syncUI&&syncUI(false);
  }catch(e){console.warn("fbSaveWord",e);}
}

// ── 刪除單一單字
async function fbDeleteWord(word){
  if(!word)return;
  try{
    const ts=Date.now();
    await deleteDoc(doc(WCOL,wordKey(word)));
    await setDoc(UREF,{lastSaved:ts},{merge:true});
    lsSet("wl-lastSaved",ts);
    lsBackup(window._lib||[],window._st||{});
  }catch(e){console.warn("fbDeleteWord",e);}
}

// ── 儲存 stats
async function fbSaveSt(st){
  try{
    await setDoc(UREF,{stats:st},{merge:true});
    lsSet("wl-st-backup",st);
  }catch(e){console.warn("fbSaveSt",e);}
}

// ── 相容舊介面
async function fbSave(){
  try{
    const st=window._st||{};
    await setDoc(UREF,{stats:st},{merge:true});
    lsBackup(window._lib||[],st);
  }catch(e){console.warn("fbSave",e);}
}

window.fbSave=fbSave;
window.fbSaveWord=fbSaveWord;
window.fbDeleteWord=fbDeleteWord;
window.fbSaveSt=fbSaveSt;
window.lsBackup=lsBackup;
fbLoad();
</script>

// API
var SYS="You are an English vocabulary and etymology expert. Respond ONLY with valid JSON, no markdown. CRITICAL RULES: (1) In roots array, include ALL morphemes in order, do NOT skip middle roots. For example certificate has 3 parts: cert- then -ific- then -ate. Always decompose fully. 'part' must be the ACTUAL morpheme letters (e.g. cert-, -ific-, -ate), NOT meanings. (2) The fields 'root_tip' and 'memory_tip' MUST be written in Traditional Chinese (繁體中文) ONLY, never in English. (3) Fields 'zh', 'example_zh' must also be Traditional Chinese.";
function callAI(messages){
  return fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":"Bearer "+KEY},
    body:JSON.stringify({model:"gpt-4o",max_tokens:4000,response_format:{type:"json_object"},messages:messages})
  }).then(function(r){
    if(!r.ok)return r.json().then(function(e){throw new Error((e.error&&e.error.message)||"API error "+r.status);});
    return r.json();
  }).then(function(d){return d.choices[0].message.content;});
}
function fileToB64(file){
  return new Promise(function(res,rej){
    var reader=new FileReader();
    reader.onload=function(e){
      var img=new Image();
      img.onload=function(){
        var MAX=2048,w=img.width,h=img.height;
        if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
        var c=document.createElement("canvas");c.width=w;c.height=h;
        c.getContext("2d").drawImage(img,0,0,w,h);
        res(c.toDataURL("image/jpeg",0.95).split(",")[1]);
      };
      img.onerror=rej;img.src=e.target.result;
    };
    reader.onerror=rej;reader.readAsDataURL(file);
  });
}
function parseAI(raw){
  var s=raw.trim();
  var fence=String.fromCharCode(96,96,96);
  if(s.indexOf(fence)>=0){s=s.split(fence+"json").join("").split(fence).join("").trim();}
  var d=JSON.parse(s);
  return Array.isArray(d)?d:(d.words||[]);
}
function wprompt(word){

}
function pprompt(txt){

}
var IMG_P="CRITICAL: root_tip and memory_tip MUST be in Traditional Chinese. Read ALL English words visible. Filter out articles/prepositions/conjunctions. Analyse each remaining word. Return JSON: {\"words\":[{\"word\":\"\",\"phonetic\":\"\",\"pos\":\"\",\"conjugation\":{\"present\":null,\"past\":null,\"pp\":null,\"ing\":null},\"zh\":\"繁中\",\"en_def\":\"\",\"example_en\":\"\",\"example_zh\":\"\",\"roots\":[{\"part\":\"ALL morphemes in order, never skip middle roots. certificate=cert-+-ific-+-ate (3 parts)\",\"type\":\"prefix or root or suffix\",\"meaning\":\"繁體中文\"}],\"root_tip\":\"繁體中文字根記憶法，說明每個詞素意思及組合邏輯\",\"family_words\":[],\"memory_tip\":\"繁體中文記憶技巧\",\"level\":\"\"}]}";
var TB_OCR="This is a textbook vocabulary page. Extract EVERY English headword you can see (bold/larger/numbered). Return as many as you can find, even if not all. Return JSON: {\"detected_words\":[\"word1\",\"word2\"]}";

var PF=null;
function renderAdd(){
  var w=document.getElementById("awrap");w.innerHTML="";
  if(!KEY){
    var hdr=mk("div","slbl","設定 API Key");
    var box=mk("div","apib");
    var lbl=mk("div","apil","輸入你的 OpenAI API Key（sk-...）才能使用 AI 功能。\n前往 platform.openai.com/api-keys 取得");

  // Textbook toggle
  var tbr=mk("div","");tbr.style.cssText="background:var(--s2);border:1px solid var(--bd2);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px";
  var tbi=mk("div","");
  tbi.appendChild(mk("div","","📚 課本單字頁模式"));
  var ts=mk("div","");ts.style.cssText="font-size:11px;color:var(--mu);margin-top:2px";ts.textContent="掃描所有粗體單字（辨識到幾個算幾個）";tbi.appendChild(ts);

  var tbt=mk("span","");tbt.id="tgt";tbt.style.cssText="position:absolute;inset:0;background:var(--bd2);border-radius:12px;transition:.2s;cursor:pointer";

function mk(tag,cls,txt){
  var e=document.createElement(tag);
  if(cls)e.className=cls;
  if(txt!=null)e.textContent=txt;
  return e;
}
function updTog(){

  t.style.background=c.checked?"var(--ac)":"var(--bd2)";h.style.left=c.checked?"23px":"3px";
}
function switchMode(m){
  ["cam","word","passage"].forEach(function(x){
    var el=document.getElementById("m-"+x);if(el)el.style.display=x===m?"flex":"none";
    var t=document.getElementById("mt-"+x);if(t)t.classList.toggle("on",x===m);
  });
}
function submitKey(){
  var k=document.getElementById("ki").value.trim();
  if(!k.startsWith("sk-")){toast("Key 格式不正確");return;}
  saveKey(k);toast("✅ API Key 已儲存！");renderAdd();
}
function resetKey(){if(!confirm("確定重設 API Key？"))return;localStorage.removeItem("wl-key");KEY="";renderAdd();}
function onImg(e){
  var f=e.target.files[0];if(!f)return;PF=f;
  document.getElementById("pi").src=URL.createObjectURL(f);
  document.getElementById("pv").style.display="flex";
  document.getElementById("bia").disabled=false;e.target.value="";
}
function clearImg(){PF=null;document.getElementById("pv").style.display="none";document.getElementById("bia").disabled=true;}
function setLoad(msg){
  var ra=document.getElementById("ra");ra.innerHTML="";
  var b=mk("div","sbox");b.appendChild(mk("div","spin"));b.appendChild(mk("div","smsg",msg));ra.appendChild(b);
}

function doImg(){
  if(!PF)return;
  var isTB=document.getElementById("tbm")&&document.getElementById("tbm").checked;
  var btn=document.getElementById("bia");btn.disabled=true;btn.textContent="⏳ 分析中...";
  fileToB64(PF).then(function(b64){
    if(isTB){
      setLoad("第1步：辨識課本粗體單字...");
      return callAI([
        {role:"system",content:"You are an OCR expert."},
        {role:"user",content:[{type:"image_url",image_url:{url:"data:image/jpeg;base64,"+b64}},{type:"text",text:TB_OCR}]}
      ]).then(function(raw){
        var d=parseAI(raw);var words=Array.isArray(d)?d:(d.detected_words||[]);
        if(!words.length)throw new Error("找不到任何單字，請確認圖片清晰");
        setLoad("第2步：分析 "+words.length+" 個單字...");
        return callAI([{role:"system",content:SYS},{role:"user",content:bprompt(words)}]);
      }).then(function(raw){showRes(parseAI(raw),"課本");});
    } else {
      setLoad("AI 辨識圖片單字...");
      return callAI([
        {role:"system",content:SYS},
        {role:"user",content:[{type:"image_url",image_url:{url:"data:image/jpeg;base64,"+b64}},{type:"text",text:IMG_P}]}
      ]).then(function(raw){showRes(parseAI(raw),"拍照");});
    }
  }).catch(function(e){
    var ra=document.getElementById("ra");ra.innerHTML="";
    var b=mk("div","apib");b.appendChild(mk("div","apil","❌ "+e.message));
    var rb=mk("button","bs","重試");rb.onclick=renderAdd;b.appendChild(rb);ra.appendChild(b);
  }).finally(function(){btn.disabled=false;btn.textContent="🔍 AI 辨識圖片單字";});
}

function doWord(){
  var inp=document.getElementById("wi").value.trim();if(!inp)return;
  var ws=inp.split(/[,，、]+/).map(function(w){return w.trim();}).filter(Boolean);
  var btn=document.getElementById("biw");btn.disabled=true;btn.textContent="⏳ 分析中...";

  // Batch: split into chunks of 8 to avoid token limit
  var CHUNK=8;
  var chunks=[];
  for(var i=0;i<ws.length;i+=CHUNK)chunks.push(ws.slice(i,i+CHUNK));

  var allWords=[];
  var total=ws.length;
  setLoad("分析 "+total+" 個單字（共 "+chunks.length+" 批）...");

  function processChunk(idx){
    if(idx>=chunks.length){
      showRes(allWords,"手動");
      btn.disabled=false;btn.textContent="🤖 AI 分析單字";
      return;
    }
    var chunk=chunks[idx];
    var p=chunk.length===1?wprompt(chunk[0]):bprompt(chunk);
    setLoad("第 "+(idx+1)+" / "+chunks.length+" 批（"+chunk.join("、")+"）...");
    callAI([{role:"system",content:SYS},{role:"user",content:p}])
      .then(function(raw){
        var ws2=parseAI(raw);
        allWords=allWords.concat(ws2);
        processChunk(idx+1);
      })
      .catch(function(e){
        var ra=document.getElementById("ra");ra.innerHTML="";
        ra.appendChild(mk("div","apil","❌ 第"+(idx+1)+"批失敗："+e.message));
        btn.disabled=false;btn.textContent="🤖 AI 分析單字";
      });
  }
  processChunk(0);
}

function doPass(){
  var txt=document.getElementById("pi2").value.trim();if(!txt)return;
  var btn=document.getElementById("bip");btn.disabled=true;btn.textContent="⏳ 分析中...";
  setLoad("擷取重要單字...");
  callAI([{role:"system",content:SYS},{role:"user",content:pprompt(txt)}])
    .then(function(raw){showRes(parseAI(raw),"文章");})
    .catch(function(e){var ra=document.getElementById("ra");ra.innerHTML="";ra.appendChild(mk("div","apil","❌ "+e.message));})
    .finally(function(){btn.disabled=false;btn.textContent="🤖 擷取重要單字";});
}

// Results
function showRes(words,src){
  PEND=words.map(function(w){return Object.assign({},w,{source:src});});
  var newN=PEND.filter(function(w){return!LIB.some(function(l){return l.word.toLowerCase()===w.word.toLowerCase();});}).length;
  var ra=document.getElementById("ra");ra.innerHTML="";
  var wrap=mk("div","rswrap");
  if(PEND.length>1){
    var bar=mk("div","bbar");
    var inf=mk("div","binfo","找到 "+PEND.length+" 個單字");
    var sub=mk("span","bsub","（"+newN+" 個新）");
    inf.appendChild(sub);
    var sab=mk("button","bbtn","全部加入 ＋");sab.onclick=saveAll;
    bar.appendChild(inf);bar.appendChild(sab);wrap.appendChild(bar);
  }
  PEND.forEach(function(w,i){wrap.appendChild(buildWCard(w,i));});
  ra.appendChild(wrap);
}

function buildWCard(w,idx){
  var dup=LIB.some(function(l){return l.word.toLowerCase()===w.word.toLowerCase();});
  var card=mk("div","wcard");
  var tags=mk("div","wtags");
  tags.appendChild(mk("span","wtag tl",w.level||"TOEIC"));
  tags.appendChild(mk("span","wtag ts",w.source));
  if(dup)tags.appendChild(mk("span","wtag td","⚠️ 重複"));
  card.appendChild(tags);
  card.appendChild(mk("div","ww",w.word));
  if(w.phonetic)card.appendChild(mk("div","wph",w.phonetic));
  if(w.pos)card.appendChild(mk("div","wpos",w.pos));
  var conj=w.conjugation;
  if(conj&&(conj.past||conj.pp)){
    var clbl=mk("div","");clbl.style.cssText="font-size:11px;color:var(--mu);text-transform:uppercase;font-weight:700;margin-bottom:6px;margin-top:4px";clbl.textContent="動詞三態";
    var crow=mk("div","crow");
    [[conj.present||w.word,"var(--al)","原"],[conj.past||"-","var(--bl)","過"],[conj.pp||"-","var(--pu)","p.p."],[conj.ing||"-","var(--m2)","-ing"]].forEach(function(f){
      var t=mk("span","ctag",f[2]+" "+f[0]);t.style.color=f[1];crow.appendChild(t);
    });
    card.appendChild(clbl);card.appendChild(crow);
  }
  card.appendChild(mk("div","wzh",w.zh));
  if(w.en_def)card.appendChild(mk("div","wen",w.en_def));
  if(w.example_en){var eb=mk("div","exb");eb.appendChild(mk("div","exen",w.example_en));eb.appendChild(mk("div","exzh",w.example_zh||""));card.appendChild(eb);}
  var sp=mk("div","sprow");
  var bs1=mk("button","bspk","🔊 單字");bs1.onclick=function(){speak(w.word);};sp.appendChild(bs1);
  if(w.example_en){var bs2=mk("button","bspk","🔊 例句");bs2.onclick=function(){speak(w.example_en);};sp.appendChild(bs2);}
  card.appendChild(sp);
  var sr=mk("div","srow");sr.id="sr-"+idx;
  if(dup){sr.appendChild(mk("div","svd","✅ 已在單字庫"));}
  else{var sb=mk("button","bsav","＋ 加入單字庫");sb.onclick=function(){saveOne(idx);};sr.appendChild(sb);}
  card.appendChild(sr);
  var roots=w.roots||[];var hasFam=(w.family_words||[]).length>0;
  if(roots.length||w.root_tip||hasFam){
    var rc=mk("div","rcard");rc.appendChild(mk("div","rtitle","🔤 字根字首分析"));
    if(roots.length){
      var rpr=mk("div","rprow");
      roots.forEach(function(r){
        var cls=r.type==="prefix"?"rp rpp":r.type==="suffix"?"rp rps":"rp rpr";
        var rp=mk("div",cls);rp.appendChild(mk("div","rpv",r.part));rp.appendChild(mk("div","rpm",r.meaning));rpr.appendChild(rp);
      });
      rc.appendChild(rpr);
    }
    if(w.root_tip){var tb=mk("div","tbox");tb.appendChild(mk("div","tlbl","字根記憶法"));tb.appendChild(mk("div","ttxt",w.root_tip));rc.appendChild(tb);}
    if(hasFam){
      rc.appendChild(mk("div","","同族單字"));var fr=mk("div","frow");
      (w.family_words||[]).forEach(function(f){
        var fw=mk("div","fw",f);fw.onclick=function(){lookupWord(f);};fr.appendChild(fw);
      });
      rc.appendChild(fr);
    }
    card.appendChild(rc);
  }
  if(w.memory_tip){var mb=mk("div","tbox");mb.appendChild(mk("div","tlbl","💡 記憶技巧"));mb.appendChild(mk("div","ttxt",w.memory_tip));card.appendChild(mb);}
  return card;
}

function saveOne(idx){
  var w=PEND[idx];if(!w)return;
  if(LIB.some(function(l){return l.word.toLowerCase()===w.word.toLowerCase();})){toast("已在單字庫中");return;}
  pushLib(w);
  var sr=document.getElementById("sr-"+idx);
  if(sr){sr.innerHTML="";sr.appendChild(mk("div","svd","✅ 已儲存！"));}
  toast("✅ 已加入："+w.word);
}
function saveAll(){
  chkDay();var added=0,skipped=[];
  PEND.forEach(function(w,i){
    if(LIB.some(function(l){return l.word.toLowerCase()===w.word.toLowerCase();})){skipped.push(w.word);}
    else{pushLib(w);added++;}
    var sr=document.getElementById("sr-"+i);
    if(sr){sr.innerHTML="";sr.appendChild(mk("div","svd","✅ 已儲存"));}
  });
  var msg="✅ 已加入 "+added+" 個！";
  if(skipped.length)msg+="\n⚠️ 跳過重複："+skipped.join("、");
  toast(msg,3500);renderHome();
}
function pushLib(w){
  chkDay();
  var wobj={word:w.word,phonetic:w.phonetic||"",pos:w.pos||"",conjugation:w.conjugation||null,zh:w.zh,en_def:w.en_def||"",example_en:w.example_en||"",example_zh:w.example_zh||"",roots:w.roots||[],root_tip:w.root_tip||"",family_words:w.family_words||[],memory_tip:w.memory_tip||"",level:w.level||"",source:w.source,addedAt:Date.now()};
  LIB.push(wobj);
  ST.today++;
  lsBackup(LIB,ST);
  if(window.fbSaveWord)window.fbSaveWord(wobj);
  if(window.fbSaveSt)window.fbSaveSt(ST);
}
function lookupWord(word){
  var ra=document.getElementById("ra");ra.innerHTML="";
  var b=mk("div","sbox");b.appendChild(mk("div","spin"));b.appendChild(mk("div","smsg","查詢「"+word+"」中..."));ra.appendChild(b);
  callAI([{role:"system",content:SYS},{role:"user",content:wprompt(word)}])
    .then(function(raw){showRes(parseAI(raw),"查詢");document.getElementById("awrap").scrollTo({top:99999,behavior:"smooth"});})
    .catch(function(e){toast("查詢失敗："+e.message);});
}

// Library
function renderLib(){filterLib(document.getElementById("lsrch").value||"");}
function filterLib(q){
  var list=q?LIB.filter(function(w){return w.word.toLowerCase().includes(q.toLowerCase())||w.zh.includes(q);}):LIB;
  document.getElementById("lcnt").textContent="共 "+LIB.length+" 個單字"+(q?" · 顯示 "+list.length+" 個":"");
  var el=document.getElementById("llist");el.innerHTML="";
  if(!list.length){var e=mk("div","empty");e.textContent=LIB.length?"找不到符合的單字":"單字庫是空的";el.appendChild(e);return;}
  // 顯示順序：由舊到新（按新增順序），最新的在最下面
  var displayList=list.slice().reverse();
  displayList.forEach(function(w,displayIdx){
    // 計算在 LIB 中的真實 index（新增順序）
    var libIdx=LIB.indexOf(w);
    var row=mk("div","li");
    var num=mk("div","");num.style.cssText="font-size:11px;color:var(--mu);min-width:28px;text-align:right;flex-shrink:0";num.textContent=(libIdx+1)+"";
    var inf=mk("div","");inf.style.flex="1";
    inf.appendChild(mk("div","liw",w.word));
    inf.appendChild(mk("div","lii",(w.phonetic||"")+" · "+w.zh+(w.source?" ("+w.source+")":"")));
    var act=mk("div","lact");act.onclick=function(e){e.stopPropagation();};
    var bd=mk("button","bdel","🗑");bd.onclick=(function(word){return function(){delWord(word);};})(w.word);
    var bs=mk("button","bspks","🔊");bs.onclick=(function(word){return function(){speak(word);};})(w.word);
    act.appendChild(bd);act.appendChild(bs);row.appendChild(num);row.appendChild(inf);row.appendChild(act);
    row.onclick=(function(word,idx){return function(){openModalFromLib(word,idx);};})(w.word,libIdx);
    el.appendChild(row);
  });
}
function delWord(word){
  if(!word||word==="null"){toast("⚠️ 無效單字，略過");return;}
  if(!confirm("確定刪除「"+word+"」？"))return;
  LIB=LIB.filter(function(w){return w.word!==word;});
  lsBackup(LIB,ST);
  if(window.fbDeleteWord)window.fbDeleteWord(word);
  renderLib();renderHome();toast("🗑 已刪除「"+word+"」");
}

function openModalFromLib(word,libIdx){
  var mb=document.getElementById("mbody");mb.innerHTML="";
  var w=LIB.find(function(x){return x.word===word;});if(!w)return;

  // ── 固定導覽列（sticky，不隨內容捲動）
  var nav=mk("div","mnav");
  var btnPrev=mk("button","");
  btnPrev.style.cssText="background:var(--s2);border:1px solid var(--bd2);color:var(--m2);border-radius:10px;padding:8px 14px;font-size:20px;line-height:1;flex-shrink:0;cursor:pointer";
  btnPrev.textContent="←";
  var idxLbl=mk("div","");
  idxLbl.style.cssText="font-size:13px;color:var(--mu);flex:1;text-align:center;font-weight:600";
  idxLbl.textContent=(libIdx+1)+" / "+LIB.length;
  var btnNext=mk("button","");
  btnNext.style.cssText="background:var(--ac);border:none;color:#fff;border-radius:10px;padding:8px 14px;font-size:20px;line-height:1;flex-shrink:0;cursor:pointer";
  btnNext.textContent="→";
  // 循環：最後一個按下一個回到第一個，第一個按上一個到最後一個
  btnPrev.onclick=function(){
    var prev=(libIdx-1+LIB.length)%LIB.length;
    openModalFromLib(LIB[prev].word,prev);
  };
  btnNext.onclick=function(){
    var next=(libIdx+1)%LIB.length;
    openModalFromLib(LIB[next].word,next);
  };
  nav.appendChild(btnPrev);nav.appendChild(idxLbl);nav.appendChild(btnNext);
  mb.appendChild(nav);

  // ── 可捲動內容區
  var scroll=mk("div","mbody-scroll");
  _fillModalBody(scroll,w);
  mb.appendChild(scroll);
  // 每次切換重置捲動位置
  scroll.scrollTop=0;

  document.getElementById("modal").style.display="flex";

  // 點擊捲動區上半部：左側1/3 → 上一個，右側1/3 → 下一個
  scroll.addEventListener("click",function(e){
    if(e.target.closest("button,input,a,textarea"))return;
    var rect=scroll.getBoundingClientRect();
    var relX=e.clientX-rect.left;
    var relY=e.clientY-rect.top;
    if(relY>rect.height/2)return;
    var third=rect.width/3;
    if(relX<third){
      var prev=(libIdx-1+LIB.length)%LIB.length;
      openModalFromLib(LIB[prev].word,prev);
    } else if(relX>rect.width-third){
      var next=(libIdx+1)%LIB.length;
      openModalFromLib(LIB[next].word,next);
    }
  });
}
function openModal(word){
  var idx=LIB.findIndex(function(x){return x.word===word;});
  if(idx>=0){openModalFromLib(word,idx);}
}
function _fillModalBody(mb,w){
  mb.appendChild(mk("div","mword",w.word));
  if(w.phonetic)mb.appendChild(mk("div","wph",w.phonetic));
  if(w.pos){var p=mk("div","wpos",w.pos);p.style.marginTop="10px";mb.appendChild(p);}
  var conj=w.conjugation;
  if(conj&&(conj.past||conj.pp)){
    var clbl=mk("div","");clbl.style.cssText="font-size:11px;color:var(--mu);text-transform:uppercase;font-weight:700;margin-bottom:6px;margin-top:4px";clbl.textContent="動詞三態";
    var crow=mk("div","crow");
    [[conj.present||w.word,"var(--al)","原"],[conj.past||"-","var(--bl)","過"],[conj.pp||"-","var(--pu)","p.p."],[conj.ing||"-","var(--m2)","-ing"]].forEach(function(f){
      var t=mk("span","ctag",f[2]+" "+f[0]);t.style.color=f[1];crow.appendChild(t);
    });
    mb.appendChild(clbl);mb.appendChild(crow);
  }
  mb.appendChild(mk("div","wzh",w.zh));
  if(w.en_def)mb.appendChild(mk("div","wen",w.en_def));
  if(w.example_en){var eb=mk("div","exb");eb.appendChild(mk("div","exen",w.example_en));eb.appendChild(mk("div","exzh",w.example_zh||""));mb.appendChild(eb);}
  var sp=mk("div","sprow");
  var bs1=mk("button","bspk","🔊 朗讀單字");bs1.onclick=function(){speak(w.word);};sp.appendChild(bs1);
  if(w.example_en){var bs2=mk("button","bspk","🔊 朗讀例句");bs2.onclick=function(){speak(w.example_en);};sp.appendChild(bs2);}
  mb.appendChild(sp);
  if(!w.phonetic&&!w.en_def&&KEY){
    var eb2=mk("button","bp","🤖 AI 補充完整分析");eb2.onclick=function(){enrichWord(w.word,eb2);};mb.appendChild(eb2);
  }
  var roots=w.roots||[];var hasFam=(w.family_words||[]).length>0;
  if(roots.length||w.root_tip||hasFam){
    var rc=mk("div","rcard");rc.appendChild(mk("div","rtitle","🔤 字根字首分析"));
    if(roots.length){var rpr=mk("div","rprow");roots.forEach(function(r){var cls=r.type==="prefix"?"rp rpp":r.type==="suffix"?"rp rps":"rp rpr";var rp=mk("div",cls);rp.appendChild(mk("div","rpv",r.part));rp.appendChild(mk("div","rpm",r.meaning));rpr.appendChild(rp);});rc.appendChild(rpr);}
    if(w.root_tip){
      var tb=mk("div","tbox");tb.appendChild(mk("div","tlbl","字根記憶法"));
      // 強制顯示中文：若內容全為 ASCII 英文則加提示
      var tipTxt=w.root_tip;
      tb.appendChild(mk("div","ttxt",tipTxt));rc.appendChild(tb);
    }
    if(hasFam){rc.appendChild(mk("div","","同族單字"));var fr=mk("div","frow");(w.family_words||[]).forEach(function(f){fr.appendChild(mk("div","fw",f));});rc.appendChild(fr);}
    mb.appendChild(rc);
  }
  if(w.memory_tip){var mtb=mk("div","tbox");mtb.appendChild(mk("div","tlbl","💡 記憶技巧"));mtb.appendChild(mk("div","ttxt",w.memory_tip));mb.appendChild(mtb);}
  var mc=mk("button","mclose","關閉");mc.onclick=closeModal;mb.appendChild(mc);
}
function closeModal(){document.getElementById("modal").style.display="none";}
function enrichWord(word,btn){
  btn.disabled=true;btn.textContent="分析中...";
  callAI([{role:"system",content:SYS},{role:"user",content:wprompt(word)}])
    .then(function(raw){
      var ws=parseAI(raw);var r=ws[0];if(!r)throw new Error("失敗");
      var w=LIB.find(function(x){return x.word===word;});if(!w)return;
      Object.assign(w,{phonetic:r.phonetic||"",pos:r.pos||"",conjugation:r.conjugation||null,en_def:r.en_def||"",example_en:r.example_en||"",example_zh:r.example_zh||"",roots:r.roots||[],root_tip:r.root_tip||"",family_words:r.family_words||[],memory_tip:r.memory_tip||"",level:r.level||""});
      lsBackup(LIB,ST);
      if(window.fbSaveWord)window.fbSaveWord(w);
      toast("✅ 分析完成："+word);openModal(word);
    })
    .catch(function(e){btn.disabled=false;btn.textContent="🤖 AI 補充完整分析";toast("❌ "+e.message);});
}
</script>

<script>
// Grammar DB
var GDB=[
{id:"g001",cat:"時態",lv:"jh",title:"現在簡單式",formula:"S + V(s/es) / S + am/is/are",note:"表示習慣、事實、規律。第三人稱單數加 s/es。",ex:[{en:"She drinks coffee every morning.",zh:""},{en:"The sun rises in the east.",zh:""},{en:"He does not like spicy food.",zh:""}]},
{id:"g002",cat:"時態",lv:"jh",title:"過去簡單式",formula:"S + V-ed / S + was/were",note:"表示過去已完成的動作。不規則動詞需特別記憶。",ex:[{en:"She visited her grandparents last weekend.",zh:""},{en:"He was very tired after the game.",zh:""},{en:"They did not come to the party.",zh:""}]},
{id:"g003",cat:"時態",lv:"jh",title:"未來式",formula:"S + will + V / S + be going to + V",note:"will 用於臨時決定或預測；be going to 用於計劃或有跡象的預測。",ex:[{en:"I will call you later.",zh:""},{en:"She is going to study abroad next year.",zh:""},{en:"Look at those clouds. It is going to rain.",zh:""}]},
{id:"g004",cat:"時態",lv:"jh",title:"現在進行式",formula:"S + am/is/are + V-ing",note:"表示現在正在進行的動作，或近期計劃。",ex:[{en:"She is talking on the phone right now.",zh:""},{en:"They are watching a movie tonight.",zh:""}]},
{id:"g005",cat:"時態",lv:"jh",title:"現在完成式",formula:"S + have/has + p.p.",note:"表示過去發生、對現在有影響的動作。常與 already、yet、ever、never、since、for 連用。",ex:[{en:"I have already finished my homework.",zh:""},{en:"She has never been to Japan.",zh:""},{en:"He has lived here for ten years.",zh:""}]},
{id:"g006",cat:"時態",lv:"sh",title:"過去完成式",formula:"S + had + p.p.",note:"表示在過去某時間點之前已完成的動作（過去的過去）。",ex:[{en:"When I arrived, she had already left.",zh:""},{en:"He had never eaten sushi before that day.",zh:""}]},
{id:"g007",cat:"時態",lv:"sh",title:"未來完成式",formula:"S + will have + p.p.",note:"表示在未來某時間點之前將已完成的動作。",ex:[{en:"By next year, I will have graduated.",zh:""},{en:"She will have finished the report by Monday.",zh:""}]},
{id:"g010",cat:"被動語態",lv:"jh",title:"現在式被動",formula:"S + am/is/are + p.p. (+ by ...)",note:"強調動作承受者，施事者用 by 引導（可省略）。",ex:[{en:"English is spoken all over the world.",zh:""},{en:"The windows are cleaned every week.",zh:""}]},
{id:"g011",cat:"被動語態",lv:"jh",title:"過去式被動",formula:"S + was/were + p.p. (+ by ...)",note:"表示過去發生的被動動作。",ex:[{en:"The letter was sent yesterday.",zh:""},{en:"The building was destroyed by the earthquake.",zh:""}]},
{id:"g012",cat:"被動語態",lv:"sh",title:"完成式被動",formula:"S + have/has/had + been + p.p.",note:"強調已完成且影響現在；過去完成被動強調過去某點前完成。",ex:[{en:"The project has been completed.",zh:""},{en:"The message had been sent before he arrived.",zh:""}]},
{id:"g020",cat:"比較級",lv:"jh",title:"比較級",formula:"A + adj-er + than + B / A + more + adj + than + B",note:"短形容詞加 -er；長形容詞前加 more。不規則：good>better、bad>worse。",ex:[{en:"She is taller than her brother.",zh:""},{en:"This exam is more difficult than the last one.",zh:""}]},
{id:"g021",cat:"比較級",lv:"jh",title:"最高級",formula:"the + adj-est / the most + adj",note:"最高級前必須加 the，表示在一群中最...的。",ex:[{en:"Mount Everest is the highest mountain in the world.",zh:""},{en:"She is the most talented student in our class.",zh:""}]},
{id:"g022",cat:"比較級",lv:"jh",title:"同級比較",formula:"as + adj/adv + as",note:"表示兩者程度相同。否定用 not as...as。",ex:[{en:"He is as tall as his father.",zh:""},{en:"This movie is not as boring as I thought.",zh:""}]},
{id:"g030",cat:"不定詞/動名詞",lv:"jh",title:"不定詞 to V",formula:"to + 原形動詞",note:"接不定詞的動詞：want、hope、plan、decide、need、agree、refuse、promise。",ex:[{en:"She wants to become a doctor.",zh:""},{en:"He decided to quit his job.",zh:""}]},
{id:"g031",cat:"不定詞/動名詞",lv:"jh",title:"動名詞 V-ing",formula:"V-ing（當名詞用）",note:"接動名詞的動詞：enjoy、finish、keep、mind、avoid、suggest、practice、consider。",ex:[{en:"She enjoys reading novels.",zh:""},{en:"He finished writing the essay.",zh:""}]},
{id:"g032",cat:"不定詞/動名詞",lv:"sh",title:"不定詞 vs 動名詞（意義不同）",formula:"remember/forget/stop/try + to V 或 V-ing",note:"remember to V（記得去做）vs remember V-ing（記得曾做過）。stop to V（停下來去做）vs stop V-ing（停止做）。",ex:[{en:"Remember to lock the door.",zh:""},{en:"He stopped to rest. / He stopped smoking.",zh:""}]},
{id:"g040",cat:"關係子句",lv:"jh",title:"who / which / that",formula:"先行詞 + who/which/that + 子句",note:"who 指人；which 指物；that 指人或物（限定用法）。",ex:[{en:"The man who called you is my uncle.",zh:""},{en:"This is the book which changed my life.",zh:""}]},
{id:"g041",cat:"關係子句",lv:"jh",title:"whose / whom",formula:"先行詞 + whose + 名詞 / 先行詞 + whom + 子句",note:"whose 表所有關係；whom 是 who 的受格（較正式）。",ex:[{en:"The girl whose bag was stolen called the police.",zh:""}]},
{id:"g042",cat:"關係子句",lv:"sh",title:"非限定關係子句",formula:"先行詞, which/who + 子句",note:"加逗號，為補充說明。which 可代替整個前句。",ex:[{en:"My sister, who lives in Tokyo, is a nurse.",zh:""},{en:"He passed the exam, which surprised everyone.",zh:""}]},
{id:"g050",cat:"假設語氣",lv:"sh",title:"與現在事實相反",formula:"If S + V-ed/were..., S + would/could/might + V",note:"表示與現在事實相反的假設。be 動詞一律用 were。",ex:[{en:"If I were you, I would apologize.",zh:""},{en:"If she had more time, she could travel more.",zh:""}]},
{id:"g051",cat:"假設語氣",lv:"sh",title:"與過去事實相反",formula:"If S + had + p.p., S + would/could/might + have + p.p.",note:"表示與過去事實相反的假設，對過去的後悔或遺憾。",ex:[{en:"If I had studied harder, I would have passed.",zh:""}]},
{id:"g060",cat:"分詞構句",lv:"sh",title:"現在分詞構句",formula:"V-ing..., S + V",note:"省略連接詞和主詞，主詞需與主要子句相同。",ex:[{en:"Walking down the street, she met an old friend.",zh:""},{en:"Feeling tired, he went to bed early.",zh:""}]},
{id:"g061",cat:"分詞構句",lv:"sh",title:"過去分詞構句",formula:"p.p...., S + V",note:"過去分詞構句帶有被動或完成的含義。",ex:[{en:"Exhausted from the long journey, he fell asleep immediately.",zh:""}]},
{id:"g070",cat:"倒裝句",lv:"sh",title:"否定副詞倒裝",formula:"否定副詞 + 助動詞 + S + V",note:"never、seldom、hardly、not only 等置於句首時，主詞和助動詞需倒裝。",ex:[{en:"Never have I seen such a beautiful sunset.",zh:""},{en:"Seldom does she complain about her work.",zh:""}]},
{id:"g071",cat:"倒裝句",lv:"sh",title:"only 倒裝",formula:"Only + 副詞子句/片語 + 助動詞 + S + V",note:"only 修飾副詞子句或片語置於句首時，主要子句需倒裝。",ex:[{en:"Only then did I realize my mistake.",zh:""},{en:"Only by working hard can you succeed.",zh:""}]},
{id:"g080",cat:"強調句型",lv:"sh",title:"It is...that 強調句",formula:"It is/was + 強調部分 + that/who + 其餘",note:"可強調主詞、受詞、副詞。強調人時可用 who。",ex:[{en:"It was Tom who broke the window.",zh:""},{en:"It is here that the accident happened.",zh:""}]},
{id:"g090",cat:"使役動詞",lv:"sh",title:"make / let / have",formula:"make/let/have + O + 原形V",note:"make（強迫）、let（允許）、have（使得）後面接原形動詞。",ex:[{en:"She made him apologize to everyone.",zh:""},{en:"He let his children stay up late on weekends.",zh:""}]},
{id:"g091",cat:"使役動詞",lv:"sh",title:"get",formula:"get + O + to V（主動）/ get + O + p.p.（被動）",note:"get 與 make/let/have 不同，主動接 to V，被動接過去分詞。",ex:[{en:"I got him to help me move the furniture.",zh:""},{en:"She got her hair cut yesterday.",zh:""}]},
{id:"g100",cat:"感官動詞",lv:"sh",title:"感官動詞用法",formula:"see/hear/watch/feel/notice + O + 原形V / V-ing",note:"強調完整動作用原形；強調動作進行中用 V-ing。",ex:[{en:"I saw him cross the road.",zh:""},{en:"She heard someone singing in the room.",zh:""}]},
{id:"g110",cat:"條件句",lv:"jh",title:"真實條件句（第一條件）",formula:"If S + V(現在), S + will + V",note:"表示現實可能發生的條件和結果。條件子句不用未來式。",ex:[{en:"If it rains tomorrow, we will cancel the trip.",zh:""},{en:"If you study hard, you will pass the exam.",zh:""}]},
{id:"g120",cat:"時態一致",lv:"sh",title:"間接引語時態退後",formula:"直接引語 → 間接引語：現在→過去，will→would，can→could",note:"主要動詞為過去式時，that 子句的動詞需向過去退一步。科學事實不需退後。",ex:[{en:"'I am tired.' → She said that she was tired.",zh:""},{en:"'I will help you.' → He promised that he would help me.",zh:""}]},
{id:"p001",cat:"片語動詞",lv:"ph",title:"look 系列",formula:"look up / look out / look into / look for / look after / look forward to",note:"常見 look 片語動詞整理。",ex:[{en:"Look up the word in the dictionary. (查詢)",zh:""},{en:"Look out! There is a car coming. (小心)",zh:""},{en:"She looked after her sick mother. (照顧)",zh:""},{en:"I am looking forward to seeing you. (期待)",zh:""}]},
{id:"p002",cat:"片語動詞",lv:"ph",title:"give 系列",formula:"give up / give in / give out / give away / give back",note:"常見 give 片語動詞整理。",ex:[{en:"Never give up on your dreams. (放棄)",zh:""},{en:"He finally gave in to their demands. (屈服)",zh:""},{en:"She gave away all her old clothes. (送出)",zh:""}]},
{id:"p003",cat:"片語動詞",lv:"ph",title:"take 系列",formula:"take off / take over / take up / take in / take out / take care of",note:"常見 take 片語動詞整理。",ex:[{en:"The plane takes off at 8 a.m. (起飛)",zh:""},{en:"She took over the company after her father retired. (接管)",zh:""},{en:"He took up painting as a hobby. (開始從事)",zh:""}]},
{id:"p004",cat:"片語動詞",lv:"ph",title:"put 系列",formula:"put on / put off / put up with / put away / put out / put forward",note:"常見 put 片語動詞整理。",ex:[{en:"Put on your coat. It is cold outside. (穿上)",zh:""},{en:"Do not put off until tomorrow what you can do today. (拖延)",zh:""},{en:"How can you put up with such noise? (忍受)",zh:""}]},
{id:"p005",cat:"片語動詞",lv:"ph",title:"come 系列",formula:"come up with / come across / come down with / come out / come over",note:"常見 come 片語動詞整理。",ex:[{en:"She came up with a brilliant idea. (想出)",zh:""},{en:"I came across an old friend at the market. (偶遇)",zh:""},{en:"He came down with the flu last week. (染上疾病)",zh:""}]},
{id:"p006",cat:"片語動詞",lv:"ph",title:"get 系列",formula:"get along with / get over / get rid of / get through / get away with",note:"常見 get 片語動詞整理。",ex:[{en:"She gets along well with her colleagues. (相處)",zh:""},{en:"It took him months to get over the breakup. (克服)",zh:""},{en:"We need to get rid of these old files. (擺脫)",zh:""}]},
{id:"p007",cat:"片語動詞",lv:"ph",title:"run 系列",formula:"run out of / run into / run over / run away / run for",note:"常見 run 片語動詞整理。",ex:[{en:"We have run out of sugar. (用完)",zh:""},{en:"I ran into my old teacher at the supermarket. (偶遇)",zh:""},{en:"She is running for president. (競選)",zh:""}]},
{id:"p008",cat:"片語動詞",lv:"ph",title:"turn 系列",formula:"turn on / turn off / turn up / turn down / turn out / turn into",note:"常見 turn 片語動詞整理。",ex:[{en:"Turn on the lights, please. (開啟)",zh:""},{en:"She turned down the job offer. (拒絕)",zh:""},{en:"Everything turned out well in the end. (結果是)",zh:""}]},
{id:"p009",cat:"片語動詞",lv:"ph",title:"break 系列",formula:"break down / break up / break out / break in / break through",note:"常見 break 片語動詞整理。",ex:[{en:"My car broke down on the highway. (故障)",zh:""},{en:"They broke up after three years together. (分手)",zh:""},{en:"A fire broke out in the building. (爆發)",zh:""}]},
{id:"g130",cat:"連接詞",lv:"jh",title:"對等連接詞 FANBOYS",formula:"for / and / nor / but / or / yet / so",note:"連接兩個對等的字、片語或子句。記憶口訣：FANBOYS。",ex:[{en:"She is smart and hardworking.",zh:""},{en:"He tried hard, but he failed.",zh:""},{en:"Hurry up, or you will be late.",zh:""}]},
{id:"g131",cat:"連接詞",lv:"jh",title:"從屬連接詞（時間）",formula:"when / while / before / after / since / until / as soon as",note:"引導副詞子句，表示時間關係。時間子句不用未來式。",ex:[{en:"Call me as soon as you arrive.",zh:""},{en:"While she was cooking, he was watching TV.",zh:""}]},
{id:"g132",cat:"連接詞",lv:"sh",title:"從屬連接詞（讓步/對比）",formula:"although / though / even though / even if / whereas / while",note:"表示讓步或對比。although 和 but 不能同時使用。",ex:[{en:"Although it was raining, she went for a run.",zh:""},{en:"Even if I had the money, I would not buy it.",zh:""}]},
{id:"g140",cat:"特殊句型",lv:"jh",title:"so...that / such...that",formula:"so + adj/adv + that / such + (a) + adj + N + that",note:"表示「如此...以至於...」的結果子句。",ex:[{en:"She was so tired that she fell asleep immediately.",zh:""},{en:"It was such a hot day that we stayed indoors.",zh:""}]},
{id:"g141",cat:"特殊句型",lv:"sh",title:"no sooner...than / hardly...when",formula:"No sooner had S + p.p. than... / Hardly had S + p.p. when...",note:"表示「一...就...」，主要子句需倒裝。",ex:[{en:"No sooner had she sat down than the phone rang.",zh:""}]},
{id:"g142",cat:"特殊句型",lv:"sh",title:"with + O + 分詞",formula:"with + O + V-ing / p.p.",note:"表示伴隨狀態，主動用 V-ing，被動用 p.p.。",ex:[{en:"She sat there with her eyes closed.",zh:""},{en:"He walked into the room with music playing.",zh:""}]}
];

var GCATS=["全部","時態","被動語態","比較級","不定詞/動名詞","關係子句","假設語氣","分詞構句","倒裝句","強調句型","使役動詞","感官動詞","條件句","時態一致","片語動詞","連接詞","特殊句型"];
var gCat="全部", gQ="";

function renderGram(){
  var cats=document.getElementById("gcats");cats.innerHTML="";
  GCATS.forEach(function(c){
    var b=document.createElement("button");b.className="gcat"+(c===gCat?" on":"");b.textContent=c;
    b.onclick=function(){gCat=c;document.querySelectorAll(".gcat").forEach(function(x){x.classList.toggle("on",x.textContent===c);});renderGList();};
    cats.appendChild(b);
  });
  renderGList();
}
function filterGram(q){gQ=q.toLowerCase();renderGList();}
function renderGList(){
  var items=GDB;
  if(gCat!=="全部")items=items.filter(function(g){return g.cat===gCat;});
  if(gQ)items=items.filter(function(g){return g.title.includes(gQ)||g.note.includes(gQ)||g.formula.toLowerCase().includes(gQ)||g.ex.some(function(e){return e.en.toLowerCase().includes(gQ);});});
  var el=document.getElementById("glist");el.innerHTML="";
  if(!items.length){var e=document.createElement("div");e.className="empty";e.textContent="找不到符合的文法";el.appendChild(e);return;}
  items.forEach(function(g){
    var card=document.createElement("div");card.className="gc";
    var head=document.createElement("div");head.className="gch";
    var bc=g.lv==="jh"?"bjh":g.lv==="sh"?"bsh":"bph";
    var bt=g.lv==="jh"?"國中":g.lv==="sh"?"高中":"片語";
    var badge=document.createElement("span");badge.className="gbdg "+bc;badge.textContent=bt;
    var title=document.createElement("div");title.className="gtit";title.textContent=g.title;
    var arr=document.createElement("span");arr.className="garr";arr.id="ga-"+g.id;arr.textContent="▼";
    head.appendChild(badge);head.appendChild(title);head.appendChild(arr);
    var body=document.createElement("div");body.className="gbod";body.id="gb-"+g.id;
    var form=document.createElement("div");form.className="gfrm";form.textContent=g.formula;
    var note=document.createElement("div");note.className="gnot";note.textContent=g.note;
    var exs=document.createElement("div");exs.className="gexs";
    g.ex.forEach(function(e){
      var ex=document.createElement("div");ex.className="gex";
      var en=document.createElement("div");en.className="geen";en.textContent=e.en;
      var spk=document.createElement("button");spk.className="gspk";spk.textContent="🔊 朗讀";
      var enT=e.en.split("->")[0].split("(")[0].trim();
      spk.onclick=function(){speak(enT);};
      ex.appendChild(en);ex.appendChild(spk);exs.appendChild(ex);
    });
    body.appendChild(form);body.appendChild(note);body.appendChild(exs);
    head.onclick=function(){var open=body.classList.toggle("open");arr.classList.toggle("open",open);};
    card.appendChild(head);card.appendChild(body);el.appendChild(card);
  });
}

// SRS Quiz
function getSRS(w){return w.srs||{level:0,due:0,skip:false};}
function setSRS(word,ok){
  var w=LIB.find(function(x){return x.word===word;});if(!w)return;
  if(!w.srs)w.srs={level:0,due:0,skip:false};
  var gaps=[0,3600,28800,86400,259200,604800,1209600,2592000,7776000];
  if(ok){w.srs.level=Math.min(w.srs.level+1,8);w.srs.due=Date.now()+(gaps[w.srs.level]||86400)*1000;}
  else{w.srs.level=Math.max(0,w.srs.level-2);w.srs.due=Date.now()+300000;}
  saveD();
}
function setWordFreq(word,action){
  var w=LIB.find(function(x){return x.word===word;});if(!w)return;
  if(!w.srs)w.srs={level:0,due:0,skip:false};
  if(action==="boost"){w.srs.level=0;w.srs.due=0;w.srs.skip=false;toast("\uD83D\uDD25\u300C"+word+"\u300D\u5DF2\u8A2D\u70BA\u512A\u5148\u8907\u7FD2");}
  else if(action==="reduce"){w.srs.level=6;w.srs.due=Date.now()+604800000;w.srs.skip=false;toast("\uD83D\uDE0C\u300C"+word+"\u300D\u5DF2\u8A2D\u70BA\u6E1B\u5C11\u51FA\u73FE");}
  else{w.srs.skip=true;toast("\u23F8\uFE0F\u300C"+word+"\u300D\u5DF2\u505C\u7528\uFF0C\u4E0D\u518D\u51FA\u984C");}
  saveD();
}
function getPool(){
  var now=Date.now();
  var due=LIB.filter(function(w){return!getSRS(w).skip&&getSRS(w).due<=now;});
  var fresh=LIB.filter(function(w){var s=getSRS(w);return!s.skip&&s.level===0&&s.due>now;});
  var rest=LIB.filter(function(w){var s=getSRS(w);return!s.skip&&s.level>0&&s.due>now;});
  return shuffle(due).concat(shuffle(fresh)).concat(shuffle(rest)).slice(0,Math.min(15,LIB.length));
}
function makeQ(w,lib){
  var types=["en2zh","zh2en","example"];
  var type=types[Math.floor(Math.random()*types.length)];
  if(type==="example"&&!w.example_en)type="en2zh";
  var pool=shuffle(lib.filter(function(x){return x.word!==w.word;}));
  if(type==="en2zh"){
    var wr=pool.filter(function(x){return x.zh!==w.zh;}).slice(0,3).map(function(x){return x.zh;});
    if(wr.length<3)type="en2zh";
    return {type:type,word:w.word,prompt:w.word,sub:w.phonetic||"",q:"\u9019\u500B\u55AE\u5B57\u7684\u4E2D\u6587\u610F\u601D\u662F\uFF1F",correct:w.zh,opts:shuffle([w.zh].concat(wr.slice(0,3))),ex:w.example_en,exzh:w.example_zh};
  }
  if(type==="zh2en"){
    var wr2=pool.slice(0,3).map(function(x){return x.word;});
    return {type:type,word:w.word,prompt:w.zh,sub:w.en_def||"",q:"\u54EA\u500B\u82F1\u6587\u55AE\u5B57\u7B26\u5408\u9019\u500B\u610F\u601D\uFF1F",correct:w.word,opts:shuffle([w.word].concat(wr2)),ex:w.example_en,exzh:w.example_zh};
  }
  var blank=(w.example_en||"").replace(new RegExp(w.word,"gi"),"_____");
  var wr3=pool.slice(0,3).map(function(x){return x.word;});
  return {type:type,word:w.word,prompt:blank,sub:w.example_zh||"",q:"\u586B\u5165\u6B63\u78BA\u7684\u55AE\u5B57\uFF1A",correct:w.word,opts:shuffle([w.word].concat(wr3)),ex:w.example_en,exzh:w.example_zh};
}

// 測驗範圍狀態
var QRANGE={from:1,to:0,useRange:false};

function renderQuiz(){
  var el=document.getElementById("qc");el.innerHTML="";
  if(LIB.length<4){
    var skip=LIB.filter(function(w){return getSRS(w).skip;}).length;
    var d=mk("div","empty");
    var icon=mk("div","");icon.style.fontSize="48px";icon.textContent="📚";
    var t=mk("div","");t.style.cssText="font-size:18px;font-weight:700";t.textContent="單字不夠";
    var s=mk("div","");s.style.cssText="font-size:14px;color:var(--mu)";s.textContent="至少需要 4 個可測驗單字\n目前有 "+LIB.length+" 個（"+skip+" 個停用中）";
    var b=mk("button","bp","去新增單字");b.style.marginTop="12px";b.onclick=function(){goTab("add");};
    d.appendChild(icon);d.appendChild(t);d.appendChild(s);d.appendChild(b);el.appendChild(d);return;
  }
  // 若已有進行中的範圍設定，直接繼續；若是從 score 頁的「繼續測驗」進來則沿用
  renderQuizSetup();
}

function renderQuizSetup(){
  var el=document.getElementById("qc");el.innerHTML="";
  var total=LIB.length;
  // 初始化範圍預設值
  if(QRANGE.to===0||QRANGE.to>total)QRANGE.to=total;
  if(QRANGE.from<1)QRANGE.from=1;

  var wrap=mk("div","");wrap.style.cssText="display:flex;flex-direction:column;gap:16px;padding:8px 0";

  // 標題
  var hd=mk("div","");hd.style.cssText="text-align:center";
  var em=mk("div","");em.style.fontSize="48px";em.textContent="✏️";
  var ht=mk("div","");ht.style.cssText="font-size:20px;font-weight:700;margin-top:8px";ht.textContent="選擇測驗模式";
  hd.appendChild(em);hd.appendChild(ht);wrap.appendChild(hd);

  // ── 模式一：SRS 智慧複習
  var card1=mk("div","");card1.style.cssText="background:var(--s1);border:2px solid var(--abr);border-radius:16px;padding:18px;cursor:pointer";
  var c1h=mk("div","");c1h.style.cssText="display:flex;align-items:center;gap:10px;margin-bottom:8px";
  var c1ico=mk("div","");c1ico.style.fontSize="24px";c1ico.textContent="🧠";
  var c1t=mk("div","");c1t.style.cssText="font-size:16px;font-weight:700;color:var(--al)";c1t.textContent="SRS 智慧複習";
  c1h.appendChild(c1ico);c1h.appendChild(c1t);
  var c1d=mk("div","");c1d.style.cssText="font-size:13px;color:var(--mu);line-height:1.6";
  var dueNow=LIB.filter(function(w){return!getSRS(w).skip&&getSRS(w).due<=Date.now();}).length;
  c1d.textContent="依熟悉度自動出題，優先複習待複習單字。\n現在待複習："+dueNow+" 個";
  card1.appendChild(c1h);card1.appendChild(c1d);
  var b1=mk("button","bp","開始 SRS 測驗");b1.style.marginTop="12px";
  b1.onclick=function(){QRANGE.useRange=false;startQuiz(null);};
  card1.appendChild(b1);
  wrap.appendChild(card1);

  // ── 模式二：範圍自選
  var card2=mk("div","");card2.style.cssText="background:var(--s1);border:1px solid var(--bd2);border-radius:16px;padding:18px";
  var c2h=mk("div","");c2h.style.cssText="display:flex;align-items:center;gap:10px;margin-bottom:12px";
  var c2ico=mk("div","");c2ico.style.fontSize="24px";c2ico.textContent="📋";
  var c2t=mk("div","");c2t.style.cssText="font-size:16px;font-weight:700";c2t.textContent="範圍自選";
  c2h.appendChild(c2ico);c2h.appendChild(c2t);
  var c2d=mk("div","");c2d.style.cssText="font-size:13px;color:var(--mu);margin-bottom:12px";c2d.textContent="指定單字範圍（依新增順序），共 "+total+" 個單字";
  card2.appendChild(c2h);card2.appendChild(c2d);

  // 範圍輸入
  var rangeRow=mk("div","");rangeRow.style.cssText="display:flex;align-items:center;gap:10px;margin-bottom:12px";
  var fromInp=mk("input","inp");fromInp.type="number";fromInp.min="1";fromInp.max=total;fromInp.value=QRANGE.from;
  fromInp.style.cssText="width:72px;padding:10px;font-size:16px;text-align:center;background:var(--s2);border:1px solid var(--bd2);border-radius:10px;outline:none;color:var(--tx)";
  var dash=mk("span","");dash.style.cssText="font-size:16px;color:var(--mu);font-weight:700";dash.textContent="～";
  var toInp=mk("input","inp");toInp.type="number";toInp.min="1";toInp.max=total;toInp.value=QRANGE.to;
  toInp.style.cssText="width:72px;padding:10px;font-size:16px;text-align:center;background:var(--s2);border:1px solid var(--bd2);border-radius:10px;outline:none;color:var(--tx)";
  var cntLbl=mk("div","");cntLbl.style.cssText="font-size:13px;color:var(--mu);flex:1;text-align:right";
  function updCnt(){
    var f=parseInt(fromInp.value)||1,t2=parseInt(toInp.value)||total;
    if(f<1)f=1;if(t2>total)t2=total;if(f>t2)f=t2;
    cntLbl.textContent=(t2-f+1)+" 個單字";
  }
  fromInp.oninput=updCnt;toInp.oninput=updCnt;updCnt();
  rangeRow.appendChild(fromInp);rangeRow.appendChild(dash);rangeRow.appendChild(toInp);rangeRow.appendChild(cntLbl);
  card2.appendChild(rangeRow);

  // 快速選擇按鈕
  var presets=mk("div","");presets.style.cssText="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px";
  [[1,50,"前50"],[51,100,"51-100"],[1,total,"全部"]].forEach(function(p){
    var pb=mk("button","");pb.style.cssText="background:var(--s2);border:1px solid var(--bd2);color:var(--m2);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer";
    pb.textContent=p[2];
    pb.onclick=function(){
      fromInp.value=Math.min(p[0],total);
      toInp.value=Math.min(p[1],total);
      updCnt();
    };
    presets.appendChild(pb);
  });
  // 動態加最新 N 個
  var lastBtn=mk("button","");lastBtn.style.cssText="background:var(--s2);border:1px solid var(--bd2);color:var(--m2);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer";
  lastBtn.textContent="最新20個";
  lastBtn.onclick=function(){fromInp.value=Math.max(1,total-19);toInp.value=total;updCnt();};
  presets.appendChild(lastBtn);
  card2.appendChild(presets);

  var b2=mk("button","bp","開始範圍測驗");b2.style.cssText="width:100%;background:var(--s2);border:1px solid var(--bd2);color:var(--tx);border-radius:14px;padding:14px;font-size:15px;font-weight:700;cursor:pointer";
  b2.onclick=function(){
    var f=Math.max(1,parseInt(fromInp.value)||1);
    var t2=Math.min(total,parseInt(toInp.value)||total);
    if(f>t2){toast("範圍錯誤：起始不能大於結束");return;}
    var subset=LIB.slice(f-1,t2); // 以新增順序 slice
    if(subset.length<4){toast("範圍內至少需要 4 個單字（目前 "+subset.length+" 個）");return;}
    QRANGE.useRange=true;QRANGE.from=f;QRANGE.to=t2;
    startQuiz(subset);
  };
  card2.appendChild(b2);
  wrap.appendChild(card2);
  el.appendChild(wrap);
}

function startQuiz(subset){
  var el=document.getElementById("qc");el.innerHTML="";
  var pool;
  if(subset){
    // 範圍模式：直接用 subset，保留 SRS 權重排序
    var now=Date.now();
    var due=subset.filter(function(w){return!getSRS(w).skip&&getSRS(w).due<=now;});
    var fresh=subset.filter(function(w){var s=getSRS(w);return!s.skip&&s.level===0&&s.due>now;});
    var rest=subset.filter(function(w){var s=getSRS(w);return!s.skip&&s.level>0&&s.due>now;});
    pool=shuffle(due).concat(shuffle(fresh)).concat(shuffle(rest)).slice(0,Math.min(15,subset.length));
    if(pool.length<4){pool=shuffle(subset).slice(0,Math.min(15,subset.length));}
  } else {
    pool=getPool();
  }
  QST.qs=pool.map(function(w){return makeQ(w,subset||LIB);}).filter(Boolean);
  QST.idx=0;QST.sc=0;QST.ans=false;QST.wrong=[];QST.subset=subset||null;
  renderQ();
}

function renderQ(){
  var el=document.getElementById("qc");el.innerHTML="";
  var q=QST.qs[QST.idx];if(!q){renderScore();return;}
  var pct=(QST.idx/QST.qs.length)*100;
  var tc=q.type==="en2zh"?"var(--al)":q.type==="zh2en"?"var(--bl)":"var(--pu)";
  var tl=q.type==="en2zh"?"英文→中文":q.type==="zh2en"?"中文→英文":"例句填空";
  var fs=q.type==="example"?"17px":"34px";

  var prog=mk("div","qprog");var fill=mk("div","qfill");fill.style.width=pct+"%";prog.appendChild(fill);
  var info=mk("div","");info.style.cssText="display:flex;justify-content:space-between;align-items:center";
  var tspan=mk("span","");tspan.style.cssText="font-size:11px;font-weight:700;color:"+tc+";letter-spacing:.5px";tspan.textContent=tl;
  var nspan=mk("span","");nspan.style.cssText="font-size:12px;color:var(--mu)";nspan.textContent="第 "+(QST.idx+1)+" / "+QST.qs.length+" 題";
  info.appendChild(tspan);info.appendChild(nspan);

  var card=mk("div","qcard");
  var ql=mk("div","qlbl");ql.textContent=q.q;
  var qw=mk("div","qword");qw.style.cssText="font-size:"+fs+";line-height:1.4";qw.textContent=q.prompt;
  card.appendChild(ql);card.appendChild(qw);
  if(q.sub){var qph=mk("div","qph");qph.style.marginTop="6px";qph.textContent=q.sub;card.appendChild(qph);}

  var opts=mk("div","opts");
  q.opts.forEach(function(o){
    var ob=mk("button","opt");
    var mainSpan=mk("span","opt-main");mainSpan.textContent=o;
    var subSpan=mk("span","opt-sub");subSpan.textContent="";
    ob.appendChild(mainSpan);ob.appendChild(subSpan);
    ob.id="opt-"+o.replace(/[^a-zA-Z0-9]/g,"_");
    ob.onclick=function(){ansQ(ob,o,q);};
    opts.appendChild(ob);
  });

  var fb=mk("div","");fb.id="qfb";fb.style.display="none";
  var nxt=mk("div","");nxt.id="qnxt";nxt.style.display="none";
  var nb=mk("button","bnq");nb.textContent=QST.idx+1<QST.qs.length?"下一題 →":"查看結果 🎯";
  nb.onclick=function(){QST.idx++;QST.ans=false;renderQ();};
  nxt.appendChild(nb);

  el.appendChild(prog);el.appendChild(info);el.appendChild(card);el.appendChild(opts);el.appendChild(fb);el.appendChild(nxt);
}

function ansQ(btn,chosen,q){
  if(QST.ans)return;QST.ans=true;QST.curW=q.word;
  document.querySelectorAll(".opt").forEach(function(b){b.disabled=true;});
  var ok=chosen===q.correct;
  if(ok){btn.classList.add("ok");QST.sc++;}
  else{
    btn.classList.add("no");
    document.querySelectorAll(".opt").forEach(function(b){
      var mainEl=b.querySelector(".opt-main");
      if(mainEl&&mainEl.textContent.trim()===q.correct)b.classList.add("ok");
    });
    QST.wrong.push(q.word);
  }
  setSRS(q.word,ok);speak(q.word);
  // 揭曉每個選項的對應意思
  document.querySelectorAll(".opt").forEach(function(b){
    var mainEl=b.querySelector(".opt-main");
    var subEl=b.querySelector(".opt-sub");
    if(!mainEl||!subEl)return;
    var optTxt=mainEl.textContent.trim();
    var hint="";
    if(q.type==="en2zh"){
      // 選項是中文義 → 顯示對應英文單字
      var match=LIB.find(function(x){return x.zh===optTxt;});
      if(match){hint=match.word;if(match.en_def)hint+="　"+match.en_def;}
    } else {
      // 選項是英文單字 → 顯示中文義
      var match2=LIB.find(function(x){return x.word===optTxt;});
      if(match2){hint=match2.zh;if(match2.en_def)hint+="　"+match2.en_def;}
    }
    subEl.textContent=hint;
    if(!b.classList.contains("ok")&&!b.classList.contains("no"))b.classList.add("revealed");
  });
  var wObj=LIB.find(function(x){return x.word===q.word;})||{};
  var lv=getSRS(wObj).level;
  var fb=document.getElementById("qfb");fb.innerHTML="";fb.style.display="block";

  // ── 結果標題
  var header=mk("div","");
  header.style.cssText="padding:12px 14px;border-radius:12px;margin-bottom:10px;display:flex;align-items:center;gap:8px;"
    +(ok?"background:rgba(34,197,94,.12);border:1px solid var(--gn)":"background:rgba(239,68,68,.12);border:1px solid var(--rd)");
  var icon=mk("span","");icon.style.fontSize="20px";icon.textContent=ok?"✅":"❌";
  var htxt=mk("div","");
  var htitle=mk("div","");htitle.style.cssText="font-size:13px;font-weight:700;color:"+(ok?"var(--gn)":"var(--rd)");
  htitle.textContent=ok?"答對！熟悉度 +1（Lv."+lv+"）":"答錯！熟悉度 -2（Lv."+lv+"）";
  htxt.appendChild(htitle);
  if(!ok){
    var hcor=mk("div","");hcor.style.cssText="font-size:12px;color:var(--m2);margin-top:3px";
    hcor.textContent="正確答案："+q.correct;htxt.appendChild(hcor);
  }
  header.appendChild(icon);header.appendChild(htxt);fb.appendChild(header);

  // ── 完整單字資訊卡（正確時完整顯示，錯誤時也顯示）
  var infoCard=mk("div","wcard");infoCard.style.gap="8px";
  // 單字 + 音標
  var wrow=mk("div","");wrow.style.cssText="display:flex;align-items:baseline;gap:10px";
  var ww=mk("div","ww");ww.style.fontSize="28px";ww.textContent=wObj.word||q.word;
  var wph=mk("div","wph");wph.textContent=wObj.phonetic||"";
  wrow.appendChild(ww);if(wObj.phonetic)wrow.appendChild(wph);infoCard.appendChild(wrow);
  // 詞性
  if(wObj.pos){var wpos=mk("div","wpos");wpos.textContent=wObj.pos;infoCard.appendChild(wpos);}
  // 中文 + 英文定義
  var wzh=mk("div","wzh");wzh.style.fontSize="20px";wzh.textContent=wObj.zh||"";infoCard.appendChild(wzh);
  if(wObj.en_def){var wen=mk("div","wen");wen.textContent=wObj.en_def;infoCard.appendChild(wen);}
  // 例句
  if(wObj.example_en){
    var exb=mk("div","exb");
    var exen=mk("div","exen");exen.textContent=wObj.example_en;
    var exzh=mk("div","exzh");exzh.textContent=wObj.example_zh||"";
    exb.appendChild(exen);exb.appendChild(exzh);infoCard.appendChild(exb);
  }
  // 字根（只顯示第一個，節省空間）
  var roots=wObj.roots||[];
  if(roots.length&&ok){
    var rpr=mk("div","rprow");rpr.style.marginTop="4px";
    roots.slice(0,3).forEach(function(r){
      var cls=r.type==="prefix"?"rp rpp":r.type==="suffix"?"rp rps":"rp rpr";
      var rp=mk("div",cls);
      rp.appendChild(mk("div","rpv",r.part));rp.appendChild(mk("div","rpm",r.meaning));
      rpr.appendChild(rp);
    });
    infoCard.appendChild(rpr);
    if(wObj.root_tip){var tb=mk("div","tbox");tb.style.marginTop="6px";tb.appendChild(mk("div","tlbl","字根記憶法"));tb.appendChild(mk("div","ttxt",wObj.root_tip));infoCard.appendChild(tb);}
  }
  // 記憶技巧（答錯時也顯示）
  if(wObj.memory_tip){
    var mb=mk("div","tbox");mb.style.marginTop="4px";mb.appendChild(mk("div","tlbl","💡 記憶技巧"));mb.appendChild(mk("div","ttxt",wObj.memory_tip));infoCard.appendChild(mb);
  }
  fb.appendChild(infoCard);

  // ── 頻率按鈕
  var freqRow=mk("div","");freqRow.style.cssText="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap";
  var fb2=mk("button","");fb2.style.cssText="background:rgba(217,119,6,.15);border:1px solid var(--abr);color:var(--al);border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:inherit";fb2.textContent="🔥 加強複習";fb2.onclick=function(){setWordFreq(QST.curW,"boost");};
  var fb3=mk("button","");fb3.style.cssText="background:var(--s2);border:1px solid var(--bd2);color:var(--m2);border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:inherit";fb3.textContent="😌 減少出現";fb3.onclick=function(){setWordFreq(QST.curW,"reduce");};
  var fb4=mk("button","");fb4.style.cssText="background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);color:var(--rd);border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:inherit";fb4.textContent="⏸️ 不再出題";fb4.onclick=function(){setWordFreq(QST.curW,"skip");};
  freqRow.appendChild(fb2);freqRow.appendChild(fb3);freqRow.appendChild(fb4);fb.appendChild(freqRow);

  document.getElementById("qnxt").style.display="block";
}

function renderScore(){
  ST.quiz++;saveST();
  var total=QST.qs.length;var pct=Math.round((QST.sc/total)*100);
  var emoji=pct>=80?"🏆":pct>=60?"💪":"📚";
  var msg=pct>=80?"太棒了！繼續保持！":pct>=60?"不錯！繼續加油！":"答錯的單字會優先出現，繼續練習！";
  var dueNow=LIB.filter(function(w){return!getSRS(w).skip&&getSRS(w).due<=Date.now();}).length;
  var dueToday=LIB.filter(function(w){var s=getSRS(w);return!s.skip&&s.due>Date.now()&&s.due<=Date.now()+86400000;}).length;
  var el=document.getElementById("qc");el.innerHTML="";
  var sc=mk("div","score");
  var em=mk("div","");em.style.fontSize="64px";em.textContent=emoji;
  var sn=mk("div","scn");sn.textContent=pct+"%";
  var ss=mk("div","");ss.style.cssText="font-size:15px;color:var(--mu)";ss.textContent=QST.sc+" / "+total+" 答對";
  var sm=mk("div","");sm.style.cssText="font-size:17px;font-weight:700";sm.textContent=msg;
  sc.appendChild(em);sc.appendChild(sn);sc.appendChild(ss);
  if(QST.wrong.length){var wr=mk("div","");wr.style.cssText="font-size:13px;color:var(--rd)";wr.textContent="答錯："+QST.wrong.join("、");sc.appendChild(wr);}
  sc.appendChild(sm);
  var sched=mk("div","sched");
  var sh=mk("div","");sh.style.cssText="font-size:11px;color:var(--mu);margin-bottom:8px;font-weight:700;letter-spacing:.5px;text-transform:uppercase";sh.textContent="複習排程";
  var s1=mk("div","");s1.style.fontSize="14px";s1.textContent="🔴 現在待複習："+dueNow+" 個";
  var s2=mk("div","");s2.style.cssText="font-size:14px;margin-top:4px";s2.textContent="🟡 今日內到期："+dueToday+" 個";
  var s3=mk("div","");s3.style.cssText="font-size:14px;margin-top:4px";s3.textContent="📚 可測驗單字："+LIB.filter(function(w){return!getSRS(w).skip;}).length+" 個";
  sched.appendChild(sh);sched.appendChild(s1);sched.appendChild(s2);sched.appendChild(s3);
  var rb=mk("button","brt","再測一輪");rb.onclick=renderQuizSetup;
  sc.appendChild(sched);sc.appendChild(rb);el.appendChild(sc);renderHome();
}

// Init
function startApp(){
  if(window._lib)LIB=window._lib;
  if(window._st)ST=window._st;
  var ld=document.getElementById("fbld");if(ld)ld.style.display="none";
  syncUI(false);renderHome();
  if(window._dataWarning){
    setTimeout(function(){toast("⚠️ "+window._dataWarning,5000);},800);
    window._dataWarning=null;
  }
}
// 背景同步完成後更新畫面
window.refreshApp=function(){
  if(window._lib)LIB=window._lib;
  if(window._st)ST=window._st;
  renderHome();
  var curLib=document.getElementById("v-lib");
  if(curLib&&curLib.classList.contains("show"))renderLib();
  syncUI(false);
};
if(window._fbReady){startApp();}
else{window._onFbReady=startApp;setTimeout(function(){if(!window._fbReady){console.warn("Firebase timeout");startApp();}},15000);}
</script>
